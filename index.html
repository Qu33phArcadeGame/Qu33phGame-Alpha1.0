<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; touch-action: none; }

    #rotateBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #222;
      color: white;
    }

    #timeline {
      position: absolute;
      top: 10px;
      left: 10%;
      width: 80%;
      height: 6px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: lime;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<button id="rotateBtn">Orientation: vertical</button>
<div id="timeline"><div id="progress"></div></div>

<script>
// ----------------------------
// STEP 1: Set up canvas
// ----------------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ----------------------------
// STEP 2: Declare global variables
// ----------------------------
let gameState = "playing";   // Game state
let current = 0;             // Current marker
let totalScore = 0;          // Score
let highScore = localStorage.getItem("qu33phHigh") || 0;  // High score

// Colors and marker lengths
const colors = ["lime", "red", "blue"];
const lengths = [60, 60, 90];

// Marker positions (starting behind the line)
let markers = [
  { color: "lime", x: canvas.width / 2 - 60, y: canvas.height - 40, radius: 20, waiting: true },
  { color: "red", x: canvas.width / 2, y: canvas.height - 40, radius: 20, waiting: true },
  { color: "blue", x: canvas.width / 2 + 60, y: canvas.height - 40, radius: 20, waiting: true }
];

// ----------------------------
// STEP 3: Input and interactions
// ----------------------------
let dragging = false;
let startX = 0;
let startY = 0;
let currentX = 0;
let currentY = 0;

canvas.addEventListener("pointerdown", e => {
  if (gameState !== "playing") return;
  if (current >= 3) return;
  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
  currentX = startX;
  currentY = startY;
});

canvas.addEventListener("pointermove", e => {
  if (!dragging) return;
  currentX = e.clientX;
  currentY = e.clientY;
});

canvas.addEventListener("pointerup", () => {
  if (!dragging) return;
  dragging = false;
  if (current >= 3) return;

  let dx = currentX - startX;
  let dy = currentY - startY;

  let baseRot =
    currentOrientation === "vertical" ? 0 :
    currentOrientation === "angled" ? Math.PI / 6 :
    Math.PI / 2;

  let base = markers[current];
  base.waiting = false;

  markers[current] = {
    x: base.x,
    y: base.y,
    vx: dx * 0.2,
    vy: dy * 0.2,
    curve: dx * 0.0003,
    angleType: currentOrientation,
    color: colors[current],
    length: lengths[current],
    stopped: false,
    fallen: false,
    trail: [],
    rotation: baseRot,
    spinVelocity:
      currentOrientation === "vertical" ? 0.08 :
      currentOrientation === "angled" ? 0.12 :
      0.18,
    chairBoost: false,
    megaTriggered: false,
    armed: false,
    life: 0
  };

  current++;
});

// ----------------------------
// STEP 4: Game functions
// ----------------------------
// Function for trying to advance round
function tryAdvanceRound() {
  if (gameState !== "playing") return;
  if (current === 3 && markers.every(m => m.stopped || m.fallen)) {
    let g = markers[0];
    let r = markers[1];
    let b = markers[2];

    let roundScore = calculateScore();
    totalScore += roundScore;

    markers = [];
    current = 0;
  }
}

// ----------------------------
// STEP 5: Game loop
// ----------------------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ----------------------------
// STEP 6: Update function (game state)
// ----------------------------
function update() {
  let elapsed = (Date.now() - startTime) / 1000;

  if (elapsed > ROUND_TIME && elapsed <= TOTAL_TIME) {
    suddenDeath = true;
  }
  if (elapsed > TOTAL_TIME) {
    endGame();
  }

  markers.forEach(m => {
    if (m.stopped || m.fallen) return;

    m.life += 1 / 60; // count seconds (roughly)
    if (m.life >= 1) {
      m.stopped = true;
      m.vx = 0;
      m.vy = 0;
    }

    m.vx += m.curve;
    m.x += m.vx * speedMultiplier;
    m.y += m.vy * speedMultiplier;

    m.vx *= 0.94;
    m.vy *= 0.94;

    m.rotation += m.spinVelocity * speedMultiplier;
    m.spinVelocity *= 0.96;

    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 20) m.trail.shift();

    if (m.x < LEFT_EDGE) m.fallen = true;

    if (m.x > RIGHT_WALL) {
      m.x = RIGHT_WALL;
      m.vx *= -0.4;
    }

    if (m.y < END_LINE_Y) {
      m.y = END_LINE_Y;
      m.vy *= -0.2;
    }

    if (Math.abs(m.vx) < 0.05 && Math.abs(m.vy) < 0.05) {
      m.stopped = true;
    }

    let progress = Math.min(elapsed / TOTAL_TIME, 1);
    document.getElementById("progress").style.width = (progress * 100) + "%";
  });
}

// ----------------------------
// STEP 7: Draw function (render to screen)
// ----------------------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = "#222";
  ctx.fillRect(RIGHT_WALL, 0, canvas.width - RIGHT_WALL, canvas.height);
  ctx.fillStyle = "#6ec6ff";
  ctx.fillRect(RIGHT_WALL + 5, END_LINE_Y, canvas.width - RIGHT_WALL - 10, canvas.height - END_LINE_Y);

  // Sun
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(sunPos.x, sunPos.y, 20, 0, Math.PI * 2);
  ctx.fill();

  // Cloud and other objects drawing...

  // Draw markers, explosions, and other gameplay features
  markers.forEach(m => {
    if (m.fallen) return;

    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rotation);

    if (isTouchingAny(m)) {
      ctx.shadowColor = "lime";
      ctx.shadowBlur = 25;
    } else {
      ctx.shadowColor = "red";
      ctx.shadowBlur = 15;
    }

    ctx.fillStyle = m.color;
    ctx.fillRect(-10, -m.length / 2, 20, m.length);

    ctx.restore();
  });

  // Score and UI Text
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  let elapsed = (Date.now() - startTime) / 1000;

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";

  if (!suddenDeath) {
    ctx.fillText("Time: " + Math.max(0, ROUND_TIME - Math.floor(elapsed)), 20, 20);
  } else {
    ctx.fillStyle = "red";
    ctx.fillText("SUDDEN DEATH: " + Math.max(0, TOTAL_TIME - Math.floor(elapsed)), 20, 20);
  }

  ctx.fillStyle = "white";
  ctx.fillText("Score: " + totalScore, 20, 50);
}

// END GAME
function endGame() {
  if (totalScore > highScore) {
    highScore = totalScore;
    localStorage.setItem("qu33phHigh", highScore);
  }
  gameState = "end";
}
</script>
</body>
</html>
