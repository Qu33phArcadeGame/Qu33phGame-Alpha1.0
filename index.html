let dragging=false,startX,startY,currentX,currentY;
const colors=["green","red","blue"];
const lengths=[60,60,90];

canvas.addEventListener("pointerdown",e=>{
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"||gameState==="olympicsResult"){
    if(gameMode==="single"){
      showTitle();
    } else {
      // olympics: go back to bracket or result
      showTitle();
    }
    return;
  }

  if(gameState!=="playing") return;

  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    tryAdvanceRound();
    return;
  }

  if(current>=3 && markers.length===0) return;

  dragging=true;
  startX=e.clientX;
  startY=e.clientY;
  currentX=startX;
  currentY=startY;
});

canvas.addEventListener("pointermove",e=>{
  if(!dragging) return;
  currentX=e.clientX;
  currentY=e.clientY;
});

canvas.addEventListener("pointerup",()=>{
  if(!dragging) return;
  dragging=false;

  if(gameState!=="playing") return;
  if(current>=3) return;

  let dx=currentX-startX;
  let dy=currentY-startY;

  let baseRot=
    currentOrientation==="vertical"?Math.PI/3:
    currentOrientation==="angled"?Math.PI/2:
    0;

  markers.push({
    x:canvas.width/2,
    y:canvas.height-50,
    usedPreview:current,
    vx:dx*0.2,
    vy:dy*0.2,
    curve:dx*0.0003,
    angleType:currentOrientation,
    color:colors[current],
    length:lengths[current],
    stopped:false,
    fallen:false,
    trail:[],
    rotation:baseRot,
    spinVelocity:
      currentOrientation==="vertical"?0.08:
      currentOrientation==="angled"?0.12:0.18,
    chairBoost:false,
    megaTriggered:false,
    armed:false,
    life:0,
    passedDestiny:false,  // crossed the AC unit line
    deducted:false,       // PEEF deduction already applied
  });

  current++;
  previewMarkers[current-1].used=true;
});

// ─── HELPERS ──────────────────────────────────────────────────────────────
function touching(a,b){ return Math.hypot(a.x-b.x,a.y-b.y)<45; }
function isTouchingAny(m){ return markers.some(n=>n!==m&&!n.fallen&&touching(m,n)); }
function touchingChair(m){ return Math.hypot(m.x-chair.x,m.y-chair.y)<chair.radius; }
function addShake(amount){ shake=Math.max(shake,amount); }

function triggerMegaQu33ph(m){
  m.x=redDot.x; m.y=redDot.y;
  m.vx=0; m.vy=0; m.stopped=true;
  totalScore+=10;
  addShake(20);
  explosions.push({x:redDot.x,y:redDot.y,radius:10,life:30,text:"MEGA QU33PH",mega:true});
}

// ─── ROUND SYSTEM ─────────────────────────────────────────────────────────
function tryAdvanceRound(){
  if(gameState!=="playing") return;
  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    let g=markers[0], r=markers[1], b=markers[2];

    // ── DEDUCTION: Blue marker must pass the chair during sudden death ──
    if(b && !b.fallen && suddenDeath){
      // chair.y is near top of screen (low y = far up field)
      // blue passes chair if its final y < chair.y
      if(b.y > chair.y){
        totalScore = totalScore - 2;
        scorePopups.push({x:(LEFT_EDGE+RIGHT_WALL)/2, y:canvas.height*0.45, text:"PEEF", life:55, peef:true, shakeAmt:7});
        scorePopups.push({x:(LEFT_EDGE+RIGHT_WALL)/2, y:canvas.height*0.45+30, text:"-2 BLUE MISSED CHAIR", life:55, peef:true, shakeAmt:4});
        addShake(8);
      }
    }

    let roundScore=calculateScore();
    totalScore+=roundScore;
    scorePopups.push({x:canvas.width/2,y:canvas.height/2,text:"+"+roundScore,life:40});
    if(g&&r&&b&&touching(g,r)&&touching(r,b)&&touching(g,b)){
      explosions.push({x:(g.x+r.x+b.x)/3,y:(g.y+r.y+b.y)/3,radius:10,life:20,text:"QU33PH"});
      addShake(8);
    }
    markers=[];
    current=0;
    previewMarkers=[
      {color:"green",x:0,used:false},
      {color:"red",x:0,used:false},
      {color:"blue",x:0,used:false}
    ];
  }
}

function calculateScore(){
  if(markers.length<3) return 0;
  let g=markers[0],r=markers[1],b=markers[2];
  if(!g||!r||!b) return 0;
  if(!(g.armed&&r.armed&&b.armed)) return 0;
  let gr=touching(g,r), rb=touching(r,b), gb=touching(g,b);
  if(suddenDeath){
    if(gr&&rb&&gb) return 10;
    if(rb) return 5;
    if(gb) return 5;
    if(gr) return 3;
    return 0;
  } else {
    if(gr&&rb&&gb) return 3;
    if(rb) return 2;
    if(gb) return 2;
    if(gr) return 0.5;
    return 0;
  }
}

// ─── SKY ──────────────────────────────────────────────────────────────────
// Window panel is the vertical strip from RIGHT_WALL to screen right edge.
// Sky goes top to bottom inside that strip.
let clouds=[];
let trees=[];

function randomizeSky(){
  let wx = RIGHT_WALL + 5;
  let ww = canvas.width - wx;

  clouds=[];
  for(let i=0;i<5;i++){
    clouds.push({
      // x stays within RIGHT_WALL..canvas.width, y within the sky portion of the window
      x: wx + Math.random()*ww,
      y: END_LINE_Y + Math.random() * (canvas.height * 0.55 - END_LINE_Y),
      w: 30 + Math.random()*50,
      speed: 0.05 + Math.random()*0.08,
      wx, ww  // store bounds for clamping drift
    });
  }

  trees=[];
  for(let i=0;i<8;i++){
    trees.push({
      x: wx + Math.random()*ww,
      h: canvas.height * (0.07 + Math.random()*0.09)
    });
  }
}

function lerpRGB(a,b,t){
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}

function drawWindowScene(elapsed){
  let t = Math.min(elapsed/TOTAL_TIME, 1);
  let wx = RIGHT_WALL + 10;
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // Glass area starts below the white wall panel (~52% down)
  let glassTop = wh * 0.58 + 10;
  // Horizon is a VERTICAL line — sky on RIGHT, ground on LEFT
  let horizonX = wx + ww * 0.45;

  // ── ground — LEFT portion (bottom of real window) ──
  let groundColor = t<0.66
    ? lerpRGB([55,105,45],[30,60,25],t/0.66)
    : lerpRGB([30,60,25],[12,22,10],(t-0.66)/0.34);
  ctx.fillStyle=`rgb(${groundColor})`;
  ctx.fillRect(wx, glassTop, horizonX-wx, wh-glassTop);

  // ── sky — RIGHT portion (top of real window) ──
  let skyTop2, skyBot2;
  if(t < 0.66){
    let d=t/0.66;
    skyTop2=lerpRGB([82,148,210],[210,130,50],d);
    skyBot2=lerpRGB([140,195,235],[240,180,80],d);
  } else {
    let d=(t-0.66)/0.34;
    skyTop2=lerpRGB([210,130,50],[15,8,35],d);
    skyBot2=lerpRGB([240,180,80],[160,45,20],d);
  }
  let skyGrad = ctx.createLinearGradient(horizonX, 0, canvas.width, 0);
  skyGrad.addColorStop(0, `rgb(${skyBot2})`);
  skyGrad.addColorStop(1, `rgb(${skyTop2})`);
  ctx.fillStyle=skyGrad;
  ctx.fillRect(horizonX, glassTop, canvas.width-horizonX, wh-glassTop);

  // ── sun — starts far right (high noon), moves LEFT as time passes (= setting) ──
  let sunX = canvas.width - (canvas.width - horizonX) * (0.15 + t * 0.7);
  let sunY = glassTop + (wh-glassTop)*0.25;
  let sunR = t<0.66 ? 12 : 9;
  let glowG = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*4);
  glowG.addColorStop(0, t<0.66?`rgba(255,240,120,0.3)`:`rgba(200,50,10,0.35)`);
  glowG.addColorStop(1,`rgba(0,0,0,0)`);
  ctx.fillStyle=glowG;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t<0.66?`rgba(255,245,170,0.95)`:`rgba(215,70,30,0.9)`;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

  // ── tree silhouette — VERTICAL band at horizon (horizontal in the room) ──
  let treeW = ww * 0.2;
  let treeL = horizonX - treeW*0.55;
  let treGrad = ctx.createLinearGradient(treeL, 0, treeL+treeW, 0);
  treGrad.addColorStop(0, `rgba(0,0,0,0)`);
  treGrad.addColorStop(0.2, t<0.66?`rgba(22,55,18,0.85)`:`rgba(8,14,6,0.9)`);
  treGrad.addColorStop(0.8, t<0.66?`rgba(28,65,22,0.95)`:`rgba(10,18,8,0.97)`);
  treGrad.addColorStop(1, `rgba(0,0,0,0)`);
  ctx.fillStyle=treGrad;
  ctx.fillRect(treeL, glassTop, treeW, wh-glassTop);
  ctx.fillStyle=t<0.66?`rgba(22,55,18,0.88)`:`rgba(8,14,6,0.92)`;
  for(let ty=glassTop; ty<wh; ty+=6){
    let bump=Math.sin(ty*0.4)*3+Math.sin(ty*0.8)*2;
    ctx.fillRect(horizonX-treeW*0.22+bump, ty, treeW*0.22-bump+2, 6);
  }

  // ── clouds — drift TOP→BOTTOM on canvas (= left→right in real room) ──
  ctx.save();
  ctx.beginPath(); ctx.rect(horizonX+2, glassTop, canvas.width-horizonX-2, wh-glassTop); ctx.clip();
  let cloudCol = t<0.66
    ? `rgba(255,255,255,${0.75-(t/0.66)*0.25})`
    : `rgba(190,110,70,${Math.max(0,0.4-(t-0.66)/0.34*0.3)})`;
  clouds.forEach(c=>{
    // Use c.x as the vertical position (top→bottom), remap to glass area
    let cy2 = glassTop + (c.x - wx) / (canvas.width - wx) * (wh - glassTop);
    // Horizontal scatter within sky portion
    let cx2 = horizonX + 10 + (c.w % (canvas.width - horizonX - 20));
    let cw2 = c.w * 0.55;
    ctx.fillStyle=cloudCol;
    ctx.beginPath(); ctx.ellipse(cx2, cy2, cw2*0.22, cw2*0.5, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+cw2*0.06, cy2-cw2*0.22, cw2*0.16, cw2*0.3, 0,0,Math.PI*2); ctx.fill();
    // Drift downward (top→bottom on canvas)
    c.x += c.speed;
    if(c.x > canvas.width + c.w) c.x = wx - c.w;
  });
  ctx.restore();

}

function drawWindowFrame(){
  let wx = RIGHT_WALL;
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // Sections top→bottom in window strip:
  // 1. Slim wall strip  (8%)  — small strip next to green cabinet
  // 2. Blinds           (30%) — the main blind area
  // 3. White wall       (20%) — thicker wall below blinds
  // 4. Glass            (42%) — sky/trees/clouds
  let slimH    = wh * 0.08;
  let blindTop = slimH;
  let blindBot = slimH + wh * 0.30;
  let wallTop  = blindBot;
  let wallBot  = wallTop + wh * 0.20;
  let glassTop2 = wallBot;

  // ── 1. SLIM WALL STRIP at very top ──
  ctx.fillStyle="#cdc8bc";
  ctx.fillRect(wx+10, 0, ww-10, slimH);

  // ── 2. BLINDS ──
  let blindGrad = ctx.createLinearGradient(0,blindTop,0,blindBot);
  blindGrad.addColorStop(0,"#a89878");
  blindGrad.addColorStop(1,"#988868");
  ctx.fillStyle=blindGrad;
  let blindH = blindBot - blindTop;
  ctx.fillRect(wx+10, blindTop, ww-10, blindH);
  // Vertical slat lines
  ctx.strokeStyle="rgba(60,45,25,0.5)"; ctx.lineWidth=2;
  for(let sx=wx+10+8; sx<canvas.width; sx+=8){
    ctx.beginPath(); ctx.moveTo(sx,blindTop); ctx.lineTo(sx,blindBot); ctx.stroke();
  }
  ctx.strokeStyle="rgba(200,185,155,0.4)"; ctx.lineWidth=1;
  for(let sx=wx+10+8; sx<canvas.width; sx+=8){
    ctx.beginPath(); ctx.moveTo(sx-2,blindTop); ctx.lineTo(sx-2,blindBot); ctx.stroke();
  }
  ctx.fillStyle="#7a7060";
  ctx.fillRect(wx+10, blindBot-5, ww-10, 7);

  // ── 3. WHITE WALL PANEL ──
  let wallGrad = ctx.createLinearGradient(0,wallTop,0,wallBot);
  wallGrad.addColorStop(0,"#edeae4");
  wallGrad.addColorStop(1,"#e0ddd6");
  ctx.fillStyle=wallGrad;
  ctx.fillRect(wx+10, wallTop, ww-10, wallBot-wallTop);

  // ── outer left frame (full height) ──
  ctx.fillStyle="#181818";
  ctx.fillRect(wx, 0, 10, wh);

  // ── frame bar between wall and glass ──
  ctx.fillRect(wx+10, wallBot, ww-10, 10);

  // ── bottom frame bar ──
  ctx.fillRect(wx+10, wh-8, ww-10, 8);

  // ── vertical mullions (glass only) ──
  let col1 = wx + ww*0.38;
  let col2 = wx + ww*0.72;
  ctx.fillRect(col1-4, glassTop2, 8, wh-glassTop2);
  ctx.fillRect(col2-4, glassTop2, 8, wh-glassTop2);

  // ── mid-rail in glass ──
  ctx.fillRect(wx+10, glassTop2+(wh-glassTop2)*0.5, ww-10, 7);
}

// ─── UPDATE ───────────────────────────────────────────────────────────────
function update(){
  if(gameState!=="playing") return;

  if(shake>0){ shake*=0.9; if(shake<0.05) shake=0; }

  let elapsed=(Date.now()-startTime)/1000;

  if(elapsed>ROUND_TIME&&elapsed<=TOTAL_TIME){ suddenDeath=true; }
  if(!chairLocked&&suddenDeath){ chairLocked=true; chair.x=(LEFT_EDGE+RIGHT_WALL)/2; chair.y=END_LINE_Y+90; }
  if(elapsed>TOTAL_TIME){ endGame(); return; }

  markers.forEach(m=>{
    if(m.stopped||m.fallen) return;
    m.life+=1/60;
    if(m.life>=1){ m.stopped=true; m.vx=0; m.vy=0; }
    m.vx+=m.curve;
    m.x+=m.vx*speedMultiplier;
    m.y+=m.vy*speedMultiplier;
    if(!m.armed&&m.y<START_LINE_Y) m.armed=true;
    m.vx*=0.94; m.vy*=0.94;
    m.rotation+=m.spinVelocity*speedMultiplier;
    m.spinVelocity*=0.96;
    if(suddenDeath&&!m.megaTriggered&&touchingChair(m)){
      if(Math.random()<0.25) triggerMegaQu33ph(m);
      m.megaTriggered=true;
    }
    m.trail.push({x:m.x,y:m.y});
    if(m.trail.length>20) m.trail.shift();

    // Fallen off left edge — always a PEEF regardless of position
    if(m.x<LEFT_EDGE){
      if(!m.deducted){
        let deduction = suddenDeath ? 5 : 2;
        totalScore = totalScore - deduction; // can go negative
        m.deducted=true;
        addShake(12);
        scorePopups.push({
          x: LEFT_EDGE + 80 + Math.random()*40,
          y: Math.min(Math.max(m.y, END_LINE_Y+40), canvas.height*0.8),
          text:"PEEF",
          life:55, peef:true, shakeAmt:9,
        });
        scorePopups.push({
          x: LEFT_EDGE + 80 + Math.random()*40,
          y: Math.min(Math.max(m.y+30, END_LINE_Y+70), canvas.height*0.8+30),
          text:"-"+deduction,
          life:50, peef:true, shakeAmt:5,
        });
      }
      m.fallen=true;
    }
    if(m.x>RIGHT_WALL){ m.x=RIGHT_WALL; m.vx*=-0.4; }
    if(m.y<END_LINE_Y){ m.y=END_LINE_Y; m.vy*=-0.2; }
    if(Math.abs(m.vx)<0.05&&Math.abs(m.vy)<0.05) m.stopped=true;

    let progress=Math.min(elapsed/TOTAL_TIME,1);
    document.getElementById("progress").style.width=(progress*100)+"%";
    if(elapsed>ROUND_TIME) document.getElementById("progress").style.background="red";
  });

  explosions.forEach(e=>{ e.radius+=e.mega?6:4; e.life--; });
  explosions=explosions.filter(e=>e.life>0);
  scorePopups.forEach(p=>{ p.y -= p.peef ? 0.8 : 1; p.life--; });
  scorePopups=scorePopups.filter(p=>p.life>0);

  if(current===3&&markers.every(m=>m.stopped||m.fallen)) tryAdvanceRound();
}

// ─── END GAME ─────────────────────────────────────────────────────────────
function endGame(){
  shake=0;
  if(totalScore>highScore){
    highScore=totalScore;
    localStorage.setItem("qu33phHigh",highScore);
  }
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";

  if(gameMode==="olympics" || gameMode==="specialolympics"){
    const os=olympicsState;
    let oppScore=simulatedScore();
    // ensure no tie
    while(oppScore===totalScore) oppScore=simulatedScore();

    if(os.round===1){
      // QF4: player vs n[6]
      os.qf4Score=totalScore; os.qf4Opp=oppScore;
      // also sim SF1 now
      os.sf1s1=simulatedScore(); os.sf1s2=simulatedScore();
      while(os.sf1s1===os.sf1s2) os.sf1s2=simulatedScore();
      if(totalScore<=oppScore){ os.playerEliminated=true; }
      os.round=2;
    } else if(os.round===2){
      // SF2: QF3w vs QF4w(player)
      os.sf2Score=totalScore; os.sf2Opp=oppScore;
      if(totalScore<=oppScore){ os.playerEliminated=true; }
      os.round=3;
    } else if(os.round===3){
      // Final
      os.finScore=totalScore; os.finOpp=oppScore;
      os.champion=totalScore>oppScore?"player":"cpu";
    }

    gameState="end";
    showBracket();
    return;
  }

  gameState="end";
}

// ─── DRAW MARKER ──────────────────────────────────────────────────────────
function drawMarker(m){
  if(m.trail&&m.trail.length>1){
    let tw=m.color==="red"?3:m.color==="green"?4:6;
    ctx.beginPath();
    ctx.moveTo(m.trail[0].x,m.trail[0].y);
    for(let i=1;i<m.trail.length;i++) ctx.lineTo(m.trail[i].x,m.trail[i].y);
    ctx.strokeStyle=m.color;
    ctx.lineWidth=tw;
    ctx.globalAlpha=0.6;
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  const img=getMarkerImg(m.color);
  if(!img||!img.complete||!img.naturalWidth) return;
  ctx.save();
  ctx.translate(m.x,m.y);
  ctx.rotate(m.rotation);
  let w=50,h=50;
  if(m.color==="blue"){w=80;h=50;}
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw(){
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="top";
    ctx.fillStyle="#fff";
    ctx.font="bold 60px 'Courier New',monospace";
    ctx.fillText("Qu33ph",canvas.width/2,130);
    ctx.font="22px 'Courier New',monospace";
    ctx.fillStyle="#aaa";
    ctx.fillText("SCORE: "+totalScore,canvas.width/2,210);
    ctx.fillStyle="#555";
    ctx.fillText("HIGH SCORE: "+highScore,canvas.width/2,244);
    ctx.fillStyle="#333";
    ctx.font="16px 'Courier New',monospace";
    ctx.fillText("tap anywhere to return to menu",canvas.width/2,310);
    return;
  }

  if(gameState==="olympicsResult"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillStyle="#fff";
    ctx.font="bold 28px 'Courier New',monospace";
    ctx.fillText(olympicsResultMsg,canvas.width/2,canvas.height/2-30);
    if(olympicsResultSub){
      ctx.fillStyle="#555";
      ctx.font="16px 'Courier New',monospace";
      ctx.fillText(olympicsResultSub,canvas.width/2,canvas.height/2+20);
    }
    ctx.fillStyle="#333";
    ctx.font="14px 'Courier New',monospace";
    ctx.fillText("tap to return to menu",canvas.width/2,canvas.height/2+70);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  let elapsed=(Date.now()-startTime)/1000;
  let shakeX=(Math.random()-0.5)*shake;
  let shakeY=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // ── 1. BACKGROUND BASE ──
  ctx.fillStyle="#d8cfc4"; // cream/beige room
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── OLYMPICS HEADER in cream strip above teal cabinet ──
  if((gameMode==="olympics"||gameMode==="specialolympics") && olympicsState){
    let headerY = canvas.height*0.03; // centre of cream strip
    ctx.fillStyle="#3d4a44";
    ctx.font="bold 13px 'Courier New',monospace";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    let headerText = gameMode==="specialolympics"
      ? "QU33PH SPECIAL OLYMPICS"
      : "QU33PH OLYMPICS";
    ctx.fillText(headerText, (LEFT_EDGE+RIGHT_WALL)/2, headerY);
  }

  // ── 2. WINDOW SCENE (right strip, behind frame) ──
  drawWindowScene(elapsed);
  drawWindowFrame();

  // ── 3. CREAM WALL — removed stray sliver ──

  // ── 4. TEAL LEFT WALL PANEL ──
  ctx.fillStyle="#3d6b62";
  ctx.fillRect(0, 0, LEFT_EDGE, canvas.height);
  // No highlight strip — was causing uneven left line

  // ── 5. COUNTER SURFACE — nearly full screen height ──
  let cLeft  = LEFT_EDGE;
  let cRight = RIGHT_WALL;
  let cTop   = canvas.height * 0.06;
  let cBot   = canvas.height * 0.97;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cLeft, cTop);
  ctx.lineTo(cRight, cTop);
  ctx.lineTo(cRight, cBot);
  ctx.lineTo(cLeft, cBot);
  ctx.closePath();

  // Light blue-grey laminate
  let surfGrad = ctx.createLinearGradient(0, cTop, 0, cBot);
  surfGrad.addColorStop(0, "#8fa8a4");   // slightly darker at far end
  surfGrad.addColorStop(0.3, "#9ab4af");
  surfGrad.addColorStop(0.7, "#a8bebb");
  surfGrad.addColorStop(1, "#b0c4c1");   // lighter near player
  ctx.fillStyle = surfGrad;
  ctx.fill();

  // Subtle surface sheen
  let sheenGrad = ctx.createLinearGradient(cLeft, 0, cRight, 0);
  sheenGrad.addColorStop(0,"rgba(255,255,255,0)");
  sheenGrad.addColorStop(0.4,"rgba(255,255,255,0.07)");
  sheenGrad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=sheenGrad;
  ctx.fill();

  ctx.restore();

  // ── 6. COUNTER FRONT FACE (thin strip at bottom of surface) ──
  let faceTop = cBot;
  let faceBot = cBot + canvas.height*0.025;
  let faceGrad = ctx.createLinearGradient(0,faceTop,0,faceBot);
  faceGrad.addColorStop(0,"#7a9490");
  faceGrad.addColorStop(0.5,"#8ea8a4");
  faceGrad.addColorStop(1,"#5a7470");
  ctx.fillStyle=faceGrad;
  ctx.fillRect(cLeft, faceTop, cRight-cLeft, faceBot-faceTop);
  // aluminium trim strip at very top of front face
  ctx.fillStyle="#b8c8c4";
  ctx.fillRect(cLeft, faceTop, cRight-cLeft, 3);

  // ── 7. BOTTOM AREA — plain light blue-grey counter color ──
  ctx.fillStyle="#a8bebb";
  ctx.fillRect(cLeft, cBot, cRight-cLeft, canvas.height-cBot);
  ctx.fillStyle="#b8c8c4";
  ctx.fillRect(cLeft, cBot, cRight-cLeft, 3);

  // ── 8. BEIGE FLOOR below counter ──
  ctx.fillStyle="#c8b89a";
  ctx.fillRect(0, canvas.height*0.97, canvas.width, canvas.height*0.03);

  // ── 9. TEAL GREEN CABINET — tiny strip at very TOP ──
  ctx.fillStyle="#3d6b62";
  ctx.fillRect(cLeft, cTop, cRight-cLeft, canvas.height*0.05);
  ctx.fillStyle="#4a7d73";
  ctx.fillRect(cLeft, cTop, cRight-cLeft, 3);

  // ── 10. BROWN AC UNIT — contained rectangle, left side, with grouped slats ──
  let acBrownR = cRight; // extends to windowsill
  let acT2 = cTop  + (cBot-cTop)*0.77;
  let acB2 = cTop  + (cBot-cTop)*0.93;
  let acH2 = acB2 - acT2;
  let acTotalW = acBrownR - cLeft;

  // Outer shadow
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(cLeft-2, acT2-3, acTotalW+4, acH2+6);

  // Full brown rectangle
  let acGrad = ctx.createLinearGradient(0, acT2, 0, acB2);
  acGrad.addColorStop(0,"#b89878");
  acGrad.addColorStop(0.5,"#c0a085");
  acGrad.addColorStop(1,"#907060");
  ctx.fillStyle=acGrad;
  ctx.fillRect(cLeft, acT2, acTotalW, acH2);

  // Inset border
  ctx.strokeStyle="rgba(70,48,28,0.7)"; ctx.lineWidth=2;
  ctx.strokeRect(cLeft+3, acT2+3, acTotalW-6, acH2-6);
  ctx.strokeStyle="rgba(180,150,110,0.2)"; ctx.lineWidth=1;
  ctx.strokeRect(cLeft+5, acT2+5, acTotalW-10, acH2-10);

  // Slat section — left ~30% of unit
  let slatSectionR = cLeft + acTotalW*0.30;
  ctx.fillStyle="#2a1c10";
  ctx.fillRect(cLeft+6, acT2+6, slatSectionR-cLeft-6, acH2-12);

  // Grouped slats with HORIZONTAL GAPS between groups
  // Each group: several vertical slats side by side, then a tan horizontal bar
  let numGroups = 5;
  let groupH = (acH2-12) / numGroups;
  let gapH = groupH * 0.18; // horizontal gap between groups
  let slatAreaT = acT2+6;
  let slatAreaL = cLeft+7;
  let slatAreaR = slatSectionR-4;
  let slatAreaW = slatAreaR - slatAreaL;

  for(let gi=0; gi<numGroups; gi++){
    let gy = slatAreaT + gi*groupH;
    let gSlatsT = gy + gapH*0.5;
    let gSlatsB = gy + groupH - gapH*0.5;
    let gSlatsH = gSlatsB - gSlatsT;

    // horizontal gap (tan/brown) between groups
    ctx.fillStyle="#a07858";
    ctx.fillRect(slatAreaL, gy, slatAreaW, gapH*0.5);

    // vertical slats within this group
    let slatW=4, slatGap=3;
    for(let sx=slatAreaL+2; sx<slatAreaR-2; sx+=slatW+slatGap){
      let sg=ctx.createLinearGradient(sx,0,sx+slatW,0);
      sg.addColorStop(0,"#4a2e14");
      sg.addColorStop(0.4,"#7a5030");
      sg.addColorStop(1,"#4a2e14");
      ctx.fillStyle=sg;
      ctx.fillRect(sx, gSlatsT, slatW, gSlatsH);
      ctx.fillStyle="rgba(0,0,0,0.55)";
      ctx.fillRect(sx+slatW, gSlatsT, slatGap-1, gSlatsH);
    }
  }
  // bottom gap
  ctx.fillStyle="#a07858";
  ctx.fillRect(slatAreaL, slatAreaT+(numGroups-1)*groupH+groupH-gapH*0.5, slatAreaW, gapH*0.5);

  // Border lines top/bottom
  ctx.strokeStyle="rgba(60,40,20,0.45)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cLeft,acT2); ctx.lineTo(acBrownR,acT2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cLeft,acB2); ctx.lineTo(acBrownR,acB2); ctx.stroke();

  // ── 11. BLACK STRIP at RIGHT_WALL (vertical, full counter height) ──
  ctx.fillStyle="#0e0e0e";
  ctx.fillRect(RIGHT_WALL, cTop, 13, cBot-cTop);

  // ── SLIM CREAM WALL BORDER — tiny strip at very top only, next to teal cabinet ──
  let wallStripX = RIGHT_WALL + 13;
  let wallStripW = canvas.width - wallStripX;
  let wallStripBot = cTop + canvas.height * 0.08; // only the slim wall height
  ctx.fillStyle="#cdc8bc";
  ctx.fillRect(wallStripX, cTop, wallStripW, wallStripBot - cTop);

  // ── 12. RED DOT — on black strip, slightly into the blinds section ──
  let dotCX = redDot.x;
  let dotCY = redDot.y;
  let dotR = 7;

  // White index card — rectangular, portrait orientation
  let cardW = dotR*2 + 10;
  let cardH = dotR*3 + 14;
  ctx.fillStyle="#f5f5f0";
  ctx.fillRect(dotCX - cardW/2, dotCY - cardH/2, cardW, cardH);
  // subtle card border
  ctx.strokeStyle="rgba(180,175,165,0.6)"; ctx.lineWidth=1;
  ctx.strokeRect(dotCX - cardW/2, dotCY - cardH/2, cardW, cardH);

  // Dark ring
  ctx.fillStyle="#111";
  ctx.beginPath(); ctx.arc(dotCX, dotCY, dotR+2, 0, Math.PI*2); ctx.fill();

  // Red gradient
  let rg = ctx.createRadialGradient(dotCX-2, dotCY-2, 1, dotCX, dotCY, dotR);
  rg.addColorStop(0,"#ff5555");
  rg.addColorStop(0.5,"#dd1111");
  rg.addColorStop(1,"#990000");
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.arc(dotCX, dotCY, dotR, 0, Math.PI*2); ctx.fill();

  // Specular
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.beginPath(); ctx.arc(dotCX-2, dotCY-2, dotR*0.35, 0, Math.PI*2); ctx.fill();

  // ── 13. END LINE ──
  ctx.fillStyle="rgba(255,255,255,0.15)";
  ctx.fillRect(cLeft, cTop+32, cRight-cLeft, 2);

  // ── OLYMPICS MEDAL BORDER ──
  if(gameMode==="olympics" && olympicsState){
    let round = olympicsState.round;
    let borderColor, glowColor, borderW;
    if(round===1){
      borderColor="#cd7f32"; glowColor="rgba(205,127,50,0.4)"; borderW=4; // bronze
    } else if(round===2){
      borderColor="#c0c0c0"; glowColor="rgba(192,192,192,0.4)"; borderW=5; // silver
    } else {
      borderColor="#ffd700"; glowColor="rgba(255,215,0,0.5)"; borderW=6; // gold
    }
    // Glow
    ctx.save();
    ctx.shadowColor=glowColor; ctx.shadowBlur=18;
    ctx.strokeStyle=borderColor; ctx.lineWidth=borderW;
    ctx.strokeRect(cLeft+2, cTop+2, cRight-cLeft-4, cBot-cTop-4);
    ctx.restore();

    // Gold sparkles — stars travelling along the border rectangle
    if(round===3){
      let t=Date.now()/1000;
      let numStars=16;
      // Border rect: cLeft,cTop → cRight,cBot
      let bLeft=cLeft+3, bRight=cRight-3, bTop=cTop+3, bBot=cBot-3;
      let perimeter = 2*((bRight-bLeft)+(bBot-bTop));

      for(let i=0;i<numStars;i++){
        // Each star travels along the perimeter at a fixed offset
        let dist = ((i/numStars)*perimeter + t*120) % perimeter;
        let px,py;
        let top=bRight-bLeft, right=bBot-bTop, bottom=bRight-bLeft, left=bBot-bTop;
        if(dist<top){ px=bLeft+dist; py=bTop; }
        else if(dist<top+right){ px=bRight; py=bTop+(dist-top); }
        else if(dist<top+right+bottom){ px=bRight-(dist-top-right); py=bBot; }
        else { px=bLeft; py=bBot-(dist-top-right-bottom); }

        let pulse=0.5+0.5*Math.sin(t*4+i*1.1);
        let size=3+pulse*4;
        ctx.save();
        ctx.globalAlpha=0.5+pulse*0.5;
        ctx.fillStyle="#ffd700";
        ctx.shadowColor="#ffd700"; ctx.shadowBlur=12;
        ctx.translate(px,py); ctx.rotate(t*2+i);
        ctx.beginPath();
        for(let p=0;p<5;p++){
          let a=p*Math.PI*2/5-Math.PI/2;
          let b=a+Math.PI/5;
          p===0?ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size):ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);
          ctx.lineTo(Math.cos(b)*size*0.4,Math.sin(b)*size*0.4);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // Round label — drawn INSIDE the dark green cabinet at top
    let medalEmoji = round===1?"🥉":round===2?"🥈":"🥇";
    let roundName = round===1?"QUARTER-FINAL":round===2?"SEMI-FINAL":"GRAND FINAL";
    let prefix = gameMode==="specialolympics" ? "SPECIAL · " : "";
    let cabMidY = cTop + canvas.height*0.025;
    ctx.fillStyle=borderColor;
    ctx.font="bold 12px 'Courier New',monospace";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(medalEmoji+" "+prefix+roundName+" "+medalEmoji, (cLeft+cRight)/2, cabMidY);
  }

  // ADVANCE PROMPT
  if(current===3&&markers.every(m=>m.stopped||m.fallen)){
    ctx.fillStyle="white";
    ctx.font="bold 24px 'Courier New',monospace";
    ctx.textAlign="center";
    ctx.textBaseline="bottom";
    ctx.fillText("tap anywhere on field to advance",(LEFT_EDGE+RIGHT_WALL)/2,END_LINE_Y-20);
  }

  ctx.restore();

  // CHAIR
  if(suddenDeath){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.translate(chair.x, chair.y);
    if(chairImg.complete && chairImg.naturalWidth){
      let cw=50, ch=50;
      ctx.drawImage(chairImg, -cw/2, -ch/2, cw, ch);
    }
    ctx.restore();
  }

  // EXPLOSIONS
  explosions.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.globalAlpha=e.life/30;
    ctx.stroke();
    ctx.globalAlpha=e.life/30;
    ctx.fillStyle="white";
    ctx.font=e.mega?"bold 50px Arial":"bold 60px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(e.text||"QU33PH",e.x,e.y);
    ctx.globalAlpha=1;
  });

  // SCORE POPUPS
  scorePopups.forEach(p=>{
    ctx.save();
    if(p.peef){
      // PEEF — red, shaking, no fade as fast
      let shake2 = p.shakeAmt ? (Math.random()-0.5)*p.shakeAmt*(p.life/55) : 0;
      ctx.globalAlpha = Math.min(1, p.life/25);
      ctx.fillStyle="#ff2222";
      ctx.font=`bold ${p.text==="PEEF"?"36px":"18px"} 'Courier New',monospace`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.text, p.x + shake2, p.y + shake2*0.5);
    } else {
      ctx.globalAlpha=p.life/40;
      ctx.fillStyle="white";
      ctx.font="bold 30px 'Courier New',monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.text,p.x,p.y);
    }
    ctx.restore();
  });

  // The marker images are drawn horizontally by default (0° = flat/horizontal)
  // So: vertical = 90°, angled = 60°, horizontal = 0°
  let previewAngleStd =
    currentOrientation==="vertical"   ? Math.PI/3 :
    currentOrientation==="angled"     ? Math.PI/2 :
    0;
  // Blue is wider so needs extra rotation to look the same angle as green/red
  let previewAngleBlue =
    currentOrientation==="vertical"   ? Math.PI/3 + Math.PI/4 :
    currentOrientation==="angled"     ? Math.PI/2 + Math.PI/4 :
    0;

  previewMarkers.forEach((p,i)=>{
    if(p.used) return;
    const img = getMarkerImg(p.color);
    if(!img||!img.complete||!img.naturalWidth) return;
    let cx = (LEFT_EDGE+RIGHT_WALL)/2;
    let cy = START_LINE_Y - 55 - i*58;
    let pw = p.color==="blue" ? 80 : 50;
    let ph = 50;
    let angle = p.color==="blue" ? previewAngleBlue : previewAngleStd;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.drawImage(img, -pw/2, -ph/2, pw, ph);
    ctx.restore();
    ctx.globalAlpha = 1;
  });

  // MARKERS
  markers.forEach(m=>{
    if(m.fallen) return;
    ctx.shadowColor=isTouchingAny(m)?"lime":"red";
    ctx.shadowBlur=20;
    drawMarker(m);
    ctx.shadowBlur=0;
  });

  // UI TEXT
  ctx.setTransform(1,0,0,1,0,0);
  ctx.textAlign="left";
  ctx.textBaseline="top";

  // "Time" label then value below
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.font="11px 'Courier New',monospace";
  ctx.fillText("Time",20,16);
  if(!suddenDeath){
    ctx.fillStyle="white";
    ctx.font="bold 18px 'Courier New',monospace";
    ctx.fillText(Math.max(0,ROUND_TIME-Math.floor(elapsed)),20,30);
  } else {
    ctx.fillStyle="red";
    ctx.font="bold 16px 'Courier New',monospace";
    ctx.fillText("SD:"+Math.max(0,TOTAL_TIME-Math.floor(elapsed)),20,30);
  }

  // "Score" label then value below
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.font="11px 'Courier New',monospace";
  ctx.fillText("Score",20,52);
  ctx.fillStyle="white";
  ctx.font="bold 18px 'Courier New',monospace";
  ctx.fillText(totalScore,20,66);

  // Coin display below score
  if(coinImg.complete && coinImg.naturalWidth){
    let coinSize = Math.round(LEFT_EDGE * 0.5);
    let coinX = (LEFT_EDGE - coinSize) / 2;
    let coinY = 94;
    ctx.drawImage(coinImg, coinX, coinY, coinSize, coinSize);
    ctx.fillStyle="#ffd700";
    ctx.font=`bold ${Math.round(LEFT_EDGE*0.26)}px 'Courier New',monospace`;
    ctx.textAlign="center";
    ctx.fillText(coins, LEFT_EDGE/2, coinY + coinSize + 4);
    ctx.textAlign="left";
  }

  // Olympics mode: show round in the left teal cabinet — rotated vertically, lower down
  if((gameMode==="olympics"||gameMode==="specialolympics")&&olympicsState){
    let rLabel = olympicsState.round===1?"QF":olympicsState.round===2?"SEMI":"FINAL";
    let modeLabel = gameMode==="specialolympics"?"SPECIAL":"OLYMPICS";
    ctx.save();
    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.font="bold 10px 'Courier New',monospace";
    ctx.textAlign="center";
    ctx.translate(LEFT_EDGE*0.5, canvas.height*0.78);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(modeLabel+" · "+rLabel, 0, 0);
    ctx.restore();
  }
}

// ─── INIT & LOOP ──────────────────────────────────────────────────────────
randomizeSky();
showTitle();

function loop(){
  update();
  draw();
  if(gameState==="playing"){
    applyThemeOverlay();

    // ── COMIC: redraw ALL thrown markers using EXACT m.rotation ──
    if(currentTheme==="cartoon"){
      markers.forEach(m=>{
        if(m.fallen) return;
        const img=cartoonImages[m.color];
        if(!img||!img.complete||!img.naturalWidth) return;
        ctx.save();
        ctx.translate(m.x,m.y);
        ctx.rotate(m.rotation); // use exact same rotation as drawMarker
        let w=m.color==="blue"?80:50, h=50;
        ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.globalCompositeOperation="screen";
        ctx.globalAlpha=0.25;
        ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.restore();
      });
      // Preview markers — use same angle logic as main draw
      let stdA = currentOrientation==="vertical"?Math.PI/3:currentOrientation==="angled"?Math.PI/2:0;
      let blueA = currentOrientation==="vertical"?Math.PI/3+Math.PI/4:currentOrientation==="angled"?Math.PI/2+Math.PI/4:0;
      previewMarkers.forEach((p,i)=>{
        if(p.used) return;
        const img=cartoonImages[p.color];
        if(!img||!img.complete||!img.naturalWidth) return;
        let cx=(LEFT_EDGE+RIGHT_WALL)/2, cy=START_LINE_Y-55-i*58;
        let pw=p.color==="blue"?80:50, ph=50;
        let angle=p.color==="blue"?blueA:stdA;
        ctx.save();
        ctx.translate(cx,cy); ctx.rotate(angle);
        ctx.globalAlpha=1;
        ctx.drawImage(img,-pw/2,-ph/2,pw,ph);
        ctx.globalCompositeOperation="screen";
        ctx.globalAlpha=0.3;
        ctx.drawImage(img,-pw/2,-ph/2,pw,ph);
        ctx.restore();
      });
      // Keep red dot red — redraw it on top
      let dotCX=redDot.x, dotCY=redDot.y, dotR=7;
      ctx.save();
      ctx.fillStyle="#111";
      ctx.beginPath(); ctx.arc(dotCX,dotCY,dotR+2,0,Math.PI*2); ctx.fill();
      let rg=ctx.createRadialGradient(dotCX-2,dotCY-2,1,dotCX,dotCY,dotR);
      rg.addColorStop(0,"#ff5555"); rg.addColorStop(0.5,"#dd1111"); rg.addColorStop(1,"#990000");
      ctx.fillStyle=rg;
      ctx.beginPath(); ctx.arc(dotCX,dotCY,dotR,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.5)";
      ctx.beginPath(); ctx.arc(dotCX-2,dotCY-2,dotR*0.35,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Redraw chair in red during sudden death
      if(suddenDeath && chairImg.complete && chairImg.naturalWidth){
        ctx.save();
        // Tint red by drawing red rect with multiply then chair on top
        ctx.translate(chair.x, chair.y);
        ctx.shadowColor="#ff2200"; ctx.shadowBlur=15;
        ctx.drawImage(chairImg,-25,-25,50,50);
        ctx.restore();
      }
    }

    // ── NEON: intense glow on markers always + previews ──
    if(currentTheme==="neon"){
      let stdA = currentOrientation==="vertical"?Math.PI/3:currentOrientation==="angled"?Math.PI/2:0;
      let blueA = currentOrientation==="vertical"?Math.PI/3+Math.PI/4:currentOrientation==="angled"?Math.PI/2+Math.PI/4:0;
      // Preview markers with intense neon glow
      previewMarkers.forEach((p,i)=>{
        if(p.used) return;
        const img=getMarkerImg(p.color);
        if(!img||!img.complete) return;
        let gc=p.color==="red"?"#ff0044":p.color==="green"?"#00ff88":"#0099ff";
        let cx=(LEFT_EDGE+RIGHT_WALL)/2, cy=START_LINE_Y-55-i*58;
        let pw=p.color==="blue"?80:50, ph=50;
        let angle=p.color==="blue"?blueA:stdA;
        ctx.save();
        ctx.shadowColor=gc; ctx.shadowBlur=60;
        ctx.translate(cx,cy); ctx.rotate(angle);
        ctx.globalAlpha=1; ctx.drawImage(img,-pw/2,-ph/2,pw,ph);
        ctx.globalAlpha=0.7; ctx.drawImage(img,-pw/2,-ph/2,pw,ph);
        ctx.globalAlpha=0.5; ctx.drawImage(img,-pw/2,-ph/2,pw,ph);
        ctx.restore();
      });
      // Thrown markers — blaze with own color, lime when touching
      markers.forEach(m=>{
        if(m.fallen) return;
        const img=getMarkerImg(m.color);
        if(!img||!img.complete) return;
        let gc=m.color==="red"?"#ff0044":m.color==="green"?"#00ff88":"#0099ff";
        let touching=isTouchingAny(m);
        ctx.save();
        ctx.shadowColor=touching?"#00ff00":gc;
        ctx.shadowBlur=touching?80:70;
        ctx.translate(m.x,m.y); ctx.rotate(m.rotation);
        let w=m.color==="blue"?80:50, h=50;
        ctx.globalAlpha=1;   ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.globalAlpha=0.7; ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.globalAlpha=0.5; ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.globalAlpha=0.3; ctx.drawImage(img,-w/2,-h/2,w,h);
        ctx.restore();
      });
    }

    // ── GOLDEN HOUR: gold tip at LEFT end of marker (actual tip) ──
    if(currentTheme==="sunset"){
      markers.forEach(m=>{
        if(m.fallen) return;
        let tipX = m.color==="blue" ? -35 : -20;
        ctx.save();
        ctx.translate(m.x,m.y); ctx.rotate(m.rotation);
        ctx.shadowColor="#ffd700"; ctx.shadowBlur=24;
        ctx.fillStyle="#ffd700"; ctx.globalAlpha=0.95;
        ctx.beginPath(); ctx.arc(tipX, 0, 4, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.3;
        ctx.beginPath(); ctx.arc(tipX, 0, 9, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      });
      let stdA2 = currentOrientation==="vertical"?Math.PI/3:currentOrientation==="angled"?Math.PI/2:0;
      let blueA2 = currentOrientation==="vertical"?Math.PI/3+Math.PI/4:currentOrientation==="angled"?Math.PI/2+Math.PI/4:0;
      previewMarkers.forEach((p,i)=>{
        if(p.used) return;
        let cx=(LEFT_EDGE+RIGHT_WALL)/2, cy=START_LINE_Y-55-i*58;
        let tipX = p.color==="blue" ? -35 : -20;
        let angle=p.color==="blue"?blueA2:stdA2;
        ctx.save();
        ctx.translate(cx,cy); ctx.rotate(angle);
        ctx.shadowColor="#ffd700"; ctx.shadowBlur=18;
        ctx.fillStyle="#ffd700"; ctx.globalAlpha=0.9;
        ctx.beginPath(); ctx.arc(tipX, 0, 4, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.3;
        ctx.beginPath(); ctx.arc(tipX, 0, 9, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
  }
  requestAnimationFrame(loop);
}
loop();
</script>
