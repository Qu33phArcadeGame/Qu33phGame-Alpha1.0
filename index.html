<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; touch-action:none; }

#rotateBtn, #skipBtn {
  position:absolute;
  bottom:20px;
  padding:12px 16px;
  border-radius:10px;
  border:none;
  font-size:14px;
  color:white;
}

#rotateBtn {
  left:20px;
  background:#222;
}

#skipBtn {
  right:20px;
  background:#444;
}

#timeline {
  position:absolute;
  top:10px;
  left:10%;
  width:80%;
  height:6px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

#progress {
  height:100%;
  width:0%;
  background:lime;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<button id="rotateBtn">Rotate</button>
<button id="skipBtn">⏩ Skip</button>

<div id="timeline"><div id="progress"></div></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --------------------
// LAYOUT
// --------------------
const LEFT_EDGE = canvas.width * 0.2;
const RIGHT_WALL = canvas.width * 0.75;
const END_LINE_Y = canvas.height * 0.2;

// --------------------
// STATE
// --------------------
let markers = [];
let current = 0;

let startTime = Date.now();
let suddenDeath = false;

let speedMultiplier = 1;
let megaPop = 0;

// --------------------
// SETTINGS
// --------------------
const ROUND_TIME = 30;
const TOTAL_TIME = 45;

const colors = ["lime","red","blue"];
const lengths = [60,60,90];

// --------------------
// ROTATION
// --------------------
const orientations = ["vertical","angled","horizontal"];
let index = 0;
let currentOrientation = "vertical";

document.getElementById("rotateBtn").onclick = () => {
  index = (index + 1) % orientations.length;
  currentOrientation = orientations[index];
};

// --------------------
// SKIP
// --------------------
const skipBtn = document.getElementById("skipBtn");

skipBtn.onpointerdown = () => speedMultiplier = 4;
skipBtn.onpointerup = () => speedMultiplier = 1;
skipBtn.onpointerleave = () => speedMultiplier = 1;

// --------------------
// INPUT
// --------------------
let dragging=false,startX,startY,currentX,currentY;

// --------------------
// THROW
// --------------------
canvas.addEventListener("pointerdown", e=>{
  if(current >= 3) return;

  dragging = true;
  startX = e.clientX;
  startY = e.clientY;
  currentX = startX;
  currentY = startY;
});

canvas.addEventListener("pointermove", e=>{
  if(!dragging) return;
  currentX = e.clientX;
  currentY = e.clientY;
});

canvas.addEventListener("pointerup", ()=>{
  if(!dragging) return;
  dragging = false;

  if(current >= 3) return;

  let dx = currentX - startX;
  let dy = currentY - startY;

  let baseRot =
    currentOrientation === "vertical" ? 0 :
    currentOrientation === "angled" ? Math.PI/6 :
    Math.PI/2;

  markers.push({
    x: canvas.width/2,
    y: canvas.height-50,
    vx: dx * 0.2,
    vy: dy * 0.2,
    curve: dx * 0.0003,

    color: colors[current],
    length: lengths[current],

    rotation: baseRot,
    spinVelocity:
      currentOrientation === "vertical" ? 0.08 :
      currentOrientation === "angled" ? 0.12 :
      0.18,

    stopped:false,
    fallen:false,
    chairBoost:false
  });

  current++;
});

// --------------------
// UPDATE
// --------------------
function update(){

  let elapsed = (Date.now()-startTime)/1000;

  if(elapsed > ROUND_TIME && elapsed <= TOTAL_TIME){
    suddenDeath = true;
  }

  if(elapsed > TOTAL_TIME){
    markers = [];
    current = 0;
    startTime = Date.now();
    suddenDeath = false;
  }

  markers.forEach(m=>{

    if(m.fallen) return;

    // movement
    m.vx += m.curve;
    m.x += m.vx * speedMultiplier;
    m.y += m.vy * speedMultiplier;

    m.vx *= 0.94;
    m.vy *= 0.94;

    // spin
    m.rotation += m.spinVelocity * speedMultiplier;
    m.spinVelocity *= 0.96;

    // walls
    if(m.x < LEFT_EDGE) m.fallen = true;

    if(m.x > RIGHT_WALL){
      m.x = RIGHT_WALL;
      m.vx *= -0.4;
    }

    if(m.y < END_LINE_Y){
      m.y = END_LINE_Y;
      m.vy *= -0.2;
    }

    // --------------------
    // CHAIR BOOST (1 IN 3)
    // --------------------
    if(suddenDeath && !m.chairBoost && !m.fallen){

      if(Math.random() < 1/3){

        let tx = RIGHT_WALL + 10;
        let ty = END_LINE_Y + 40;

        let dx = tx - m.x;
        let dy = ty - m.y;

        let d = Math.max(1, Math.sqrt(dx*dx + dy*dy));

        dx /= d;
        dy /= d;

        m.vx += dx * 6;
        m.vy += dy * 6;

        m.chairBoost = true;
      }
    }

    // --------------------
    // MEGA QU33PH DETECTION
    // --------------------
    let dx = (RIGHT_WALL + 10) - m.x;
    let dy = (END_LINE_Y + 40) - m.y;

    if(Math.hypot(dx,dy) < 15 && m.chairBoost){
      megaPop = 60;

      canvas.style.transform =
        `translate(${Math.random()*6-3}px,${Math.random()*6-3}px)`;

      setTimeout(()=>canvas.style.transform="none",100);

      m.chairBoost = false;
    }

  });

  // timeline
  let progress = Math.min(((Date.now()-startTime)/1000)/TOTAL_TIME,1);
  document.getElementById("progress").style.width =
    (progress*100)+"%";
}

// --------------------
// DRAW
// --------------------
function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // wall
  ctx.fillStyle="#222";
  ctx.fillRect(RIGHT_WALL,0,canvas.width,canvas.height);

  // sky
  ctx.fillStyle="#6ec6ff";
  ctx.fillRect(RIGHT_WALL,END_LINE_Y,canvas.width,canvas.height);

  // red dot
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(RIGHT_WALL+10, END_LINE_Y+40, 10,0,Math.PI*2);
  ctx.fill();

  // MARKERS
  markers.forEach(m=>{
    if(m.fallen) return;

    ctx.save();
    ctx.translate(m.x,m.y);
    ctx.rotate(m.rotation);

    ctx.fillStyle=m.color;
    ctx.shadowColor = m.chairBoost ? "lime" : "red";
    ctx.shadowBlur = 15;

    ctx.fillRect(-10,-m.length/2,20,m.length);

    ctx.restore();
  });

  // MEGA QU33PH TEXT
  if(megaPop > 0){
    ctx.save();
    ctx.textAlign="center";
    ctx.fillStyle="white";
    ctx.font="bold 70px Arial";
    ctx.shadowColor="lime";
    ctx.shadowBlur=40;

    ctx.fillText("MEGA QU33PH", canvas.width/2, canvas.height/2);
    ctx.restore();

    megaPop--;
  }

  // UI
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Score: 0",20,40);

  if(suddenDeath){
    ctx.fillStyle="red";
    ctx.fillText("SUDDEN DEATH",20,70);
  }
}

// --------------------
// LOOP
// --------------------
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
