<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qu33ph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin:0; overflow:hidden; background:#111; font-family: 'Courier New', monospace; }
    canvas { display:block; touch-action:none; }

    #rotateBtn {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 20px;
      border-radius:10px;
      border:2px solid #444;
      font-size:14px;
      font-family: 'Courier New', monospace;
      background:#1a1a1a;
      color:#ccc;
      letter-spacing:1px;
      display:none;
    }
    #timeline {
      position:absolute;
      top:10px;
      left:10%;
      width:80%;
      height:6px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
      display:none;
    }
    #progress {
      height:100%;
      width:0%;
      background:lime;
      transition: background 0.5s;
    }

    /* TITLE SCREEN */
    #titleScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#0a0a0a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:100;
    }
    .title-logo {
      font-size: clamp(48px, 12vw, 90px);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #fff;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(255,255,255,0.15);
    }
    .title-sub {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #555;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 60px;
    }
    .mode-btn {
      width: min(340px, 80vw);
      padding: 18px 24px;
      margin: 10px 0;
      border: 1px solid #333;
      background: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: clamp(14px, 3.5vw, 18px);
      letter-spacing: 2px;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .mode-btn:hover, .mode-btn:active {
      background: #1e1e1e;
      border-color: #666;
      color: #fff;
    }
    .mode-icon { font-size: 24px; flex-shrink:0; }
    .mode-text { display:flex; flex-direction:column; gap:4px; }
    .mode-name { font-weight:bold; }
    .mode-desc { font-size: 10px; color: #555; letter-spacing: 1px; }
    .high-score-title {
      margin-top: 48px;
      font-size: 11px;
      color: #333;
      letter-spacing: 3px;
    }

    /* OLYMPICS BRACKET SCREEN — full screen canvas, no scroll */
    #bracketScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#08080a;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      overflow:hidden;
      z-index:100;
    }
    #bracketCanvas {
      flex:1; width:100%; display:block;
    }
    .bracket-play-btn {
      width:100%;
      padding:0 24px 32px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      flex-shrink:0;
    }
    #playNextBtn {
      width:min(360px,88vw);
      padding:17px;
      background:#ffffff;
      color:#000;
      font-family:'Courier New',monospace;
      font-size:15px;
      font-weight:bold;
      letter-spacing:2px;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }
    #playNextBtn:active { background:#e0e0e0; }
    #playNextBtn.elim { background:#181818; color:#333; cursor:default; }
    #bracketRoundLabel {
      font-size:10px;
      color:#333;
      letter-spacing:3px;
      font-family:'Courier New',monospace;
    }
    /* MEDAL SCREEN */
    #medalScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#08080a; display:none; flex-direction:column;
      align-items:center; justify-content:center; z-index:100;
    }
    #medalCanvas { width:100%; flex:1; display:block; }
    .medal-btn {
      width:min(360px,88vw); padding:17px; margin:0 0 32px;
      background:#fff; color:#000; font-family:'Courier New',monospace;
      font-size:15px; font-weight:bold; letter-spacing:2px;
      border:none; border-radius:4px; cursor:pointer; flex-shrink:0;
    }
    .medal-btn:active { background:#e0e0e0; }
    #nationScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#08080a; display:none; flex-direction:column;
      align-items:center; z-index:100; overflow-y:auto;
      padding-bottom:20px;
    }
    .nation-header {
      width:100%; text-align:center; padding:24px 0 12px;
      font-family:'Courier New',monospace;
    }
    .nation-title {
      font-size:clamp(18px,5vw,26px); color:#fff;
      letter-spacing:4px; font-weight:bold; display:block;
    }
    .nation-sub {
      font-size:10px; color:#444; letter-spacing:3px; display:block; margin-top:4px;
    }
    .nation-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:8px; width:min(400px,92vw); margin-top:16px;
    }
    .nation-btn {
      display:flex; flex-direction:column; align-items:center;
      gap:4px; padding:14px 8px; background:#0e0e0e;
      border:1px solid #222; border-radius:6px; cursor:pointer;
      font-family:'Courier New',monospace; color:#888;
      transition:all 0.12s; font-size:11px; letter-spacing:1px;
    }
    .nation-btn:hover, .nation-btn:active {
      background:#1a1a1a; border-color:#888; color:#fff;
    }
    .nation-btn.selected {
      background:#1a1a1a; border-color:#c8a840; color:#c8a840;
    }
    .nation-flag { font-size:28px; line-height:1; }
    .nation-name { font-size:10px; text-align:center; line-height:1.3; }
    .nation-confirm {
      width:min(400px,92vw); margin-top:16px;
      padding:16px; background:#c8a840; color:#000;
      font-family:'Courier New',monospace; font-size:15px;
      font-weight:bold; letter-spacing:2px; border:none;
      border-radius:4px; cursor:pointer; display:none;
    }
    .nation-confirm:active { background:#a88830; }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<button id="rotateBtn">Orientation: vertical</button>
<div id="timeline"><div id="progress"></div></div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
  <div class="title-logo">Qu33ph</div>
  <div class="title-sub">arcade edition</div>

  <button class="mode-btn" id="btn1Round" onclick="startMode('single')">
    <span class="mode-icon">🎯</span>
    <span class="mode-text">
      <span class="mode-name">QUICK GAME</span>
      <span class="mode-desc">one round · 45 seconds · go for high score</span>
    </span>
  </button>

  <button class="mode-btn" id="btnOlympics" onclick="startMode('olympics')">
    <span class="mode-icon">🏆</span>
    <span class="mode-text">
      <span class="mode-name">QU33PH OLYMPICS</span>
      <span class="mode-desc">tournament bracket · 8 nations · 3 rounds</span>
    </span>
  </button>

  <div class="high-score-title" id="titleHighScore"></div>
</div>

<!-- NATION SELECT SCREEN -->
<div id="nationScreen">
  <div class="nation-header">
    <span class="nation-title">CHOOSE YOUR NATION</span>
    <span class="nation-sub">QU33PH OLYMPICS</span>
  </div>
  <div class="nation-grid" id="nationGrid"></div>
  <button class="nation-confirm" id="nationConfirm" onclick="confirmNation()">ENTER TOURNAMENT →</button>
</div>

<!-- MEDAL SCREEN -->
<div id="medalScreen">
  <canvas id="medalCanvas"></canvas>
  <button class="medal-btn" onclick="showTitle()">← BACK TO MENU</button>
</div>

<!-- OLYMPICS BRACKET SCREEN -->
<div id="bracketScreen" style="display:none; flex-direction:column;">
  <canvas id="bracketCanvas"></canvas>
  <div class="bracket-play-btn">
    <button id="playNextBtn">PLAY →</button>
    <div id="bracketRoundLabel"></div>
  </div>
</div>

<script>
// ─── IMAGES ───────────────────────────────────────────────────────────────
const markerImages = { red:new Image(), green:new Image(), blue:new Image() };
markerImages.red.src="red.png";
markerImages.green.src="green.png";
markerImages.blue.src="blue.png";

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// ─── LAYOUT ───────────────────────────────────────────────────────────────
const LEFT_EDGE=canvas.width*0.2;
const RIGHT_WALL=canvas.width*0.75;
const END_LINE_Y=canvas.height*0.11;
const START_LINE_Y=canvas.height-80;

// LINE OF DESTINY = AC unit position in game coords
// AC band is at 77% of counter height (cTop to cBot)
// cTop = canvas.height*0.06, cBot = canvas.height*0.97
const LINE_OF_DESTINY = canvas.height*0.06 + (canvas.height*0.97 - canvas.height*0.06)*0.77;

const redDot={x:RIGHT_WALL+6,y:canvas.height*0.11};
const chair={x:(LEFT_EDGE+RIGHT_WALL)/2,y:canvas.height*0.13,radius:35};

// ─── GAME MODE STATE ──────────────────────────────────────────────────────
let gameMode = null;
let olympicsState = null;
let playerNation = null; // chosen nation
let selectedNationIdx = -1;

// ─── NATION SELECT ────────────────────────────────────────────────────────
function showNationSelect(){
  document.getElementById("titleScreen").style.display="none";
  document.getElementById("nationScreen").style.display="flex";
  selectedNationIdx = -1;
  document.getElementById("nationConfirm").style.display="none";

  const grid = document.getElementById("nationGrid");
  grid.innerHTML = "";
  NATIONS.forEach((n,i)=>{
    const btn = document.createElement("button");
    btn.className="nation-btn";
    btn.innerHTML=`<span class="nation-flag">${n.flag}</span><span class="nation-name">${n.name}</span>`;
    btn.onclick=()=>{
      document.querySelectorAll(".nation-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedNationIdx=i;
      document.getElementById("nationConfirm").style.display="block";
    };
    grid.appendChild(btn);
  });
}

function confirmNation(){
  if(selectedNationIdx<0) return;
  playerNation = { ...NATIONS[selectedNationIdx], isPlayer:true };
  document.getElementById("nationScreen").style.display="none";
  olympicsState=buildOlympicsState();
  showBracket();
}

// ─── NATIONS / STEPLADDER ─────────────────────────────────────────────────
const NATIONS = [
  { name:"Ireland",      flag:"🇮🇪" },
  { name:"Israel",       flag:"🇮🇱" },
  { name:"USA",          flag:"🇺🇸" },
  { name:"South Africa", flag:"🇿🇦" },
  { name:"England",      flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { name:"Scotland",     flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  { name:"Norway",       flag:"🇳🇴" },
  { name:"Japan",        flag:"🇯🇵" },
  { name:"Germany",      flag:"🇩🇪" },
  { name:"Brazil",       flag:"🇧🇷" },
  { name:"Australia",    flag:"🇦🇺" },
  { name:"Canada",       flag:"🇨🇦" },
  { name:"France",       flag:"🇫🇷" },
  { name:"Netherlands",  flag:"🇳🇱" },
  { name:"Sweden",       flag:"🇸🇪" },
  { name:"Russia",       flag:"🇷🇺" },
  { name:"Iran",         flag:"🇮🇷" },
  { name:"China",        flag:"🇨🇳" },
];

// playerNation is set at nation select time

// 8-team single elimination bracket
// QF1: n0 vs n1   QF2: n2 vs n3   QF3: n4 vs n5   QF4: n6 vs PLAYER
// SF1: QF1w vs QF2w    SF2: QF3w vs QF4w
// Final: SF1w vs SF2w
// Player plays QF4, then SF2 if they win, then Final if they win

function buildOlympicsState(){
  // Use chosen playerNation, remove it from pool if it's in NATIONS
  let pool = NATIONS.filter(n=>n.name!==playerNation.name);
  shuffle(pool);
  let nations = pool.slice(0,7);

  let qf1s1=simulatedScore(), qf1s2=simulatedScore();
  let qf2s1=simulatedScore(), qf2s2=simulatedScore();
  let qf3s1=simulatedScore(), qf3s2=simulatedScore();
  if(qf1s1===qf1s2) qf1s2++;
  if(qf2s1===qf2s2) qf2s2++;
  if(qf3s1===qf3s2) qf3s2++;

  return {
    n: [...nations, playerNation], // n[7] = player
    qf1s1,qf1s2,qf2s1,qf2s2,qf3s1,qf3s2,
    qf4Score:null,qf4Opp:null,
    sf2Score:null,sf2Opp:null,
    finScore:null,finOpp:null,
    sf1s1:null,sf1s2:null,
    round:1,
    playerEliminated:false,
    champion:null,
  };
}

function getQFWinner(os, qf){
  if(qf===1) return os.qf1s1>os.qf1s2 ? os.n[0] : os.n[1];
  if(qf===2) return os.qf2s1>os.qf2s2 ? os.n[2] : os.n[3];
  if(qf===3) return os.qf3s1>os.qf3s2 ? os.n[4] : os.n[5];
  if(qf===4) return os.qf4Score!==null && os.qf4Score>os.qf4Opp ? playerNation : os.n[6];
}
function getSF1Winner(os){ return os.sf1s1>os.sf1s2 ? getQFWinner(os,1) : getQFWinner(os,2); }
function getSF2Winner(os){ return os.sf2Score!==null && os.sf2Score>os.sf2Opp ? playerNation : (os.qf4Score!==null?getQFWinner(os,3):null); }

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function simulatedScore(){
  // Competitive AI — scores between 85-130, weighted toward 95-115
  let base = 85 + Math.floor(Math.random()*45); // 85-129
  // 70% chance of being in the 95-115 sweet spot
  if(Math.random()<0.7) base = 90 + Math.floor(Math.random()*30);
  return base;
}

// ─── GAME STATE ────────────────────────────────────────────────────────────
let speedMultiplier=1;
let gameState="title"; // "title"|"playing"|"end"|"bracket"
let markers=[];
let current=0;
let totalScore=0;
let highScore=localStorage.getItem("qu33phHigh")||0;
let chairLocked=false;
let startTime=Date.now();
let suddenDeath=false;
let explosions=[];
let scorePopups=[];
let previewMarkers=[
  {color:"green",x:0,used:false},
  {color:"red",x:0,used:false},
  {color:"blue",x:0,used:false}
];
let shake=0;

const ROUND_TIME=30;
const TOTAL_TIME=45;

const orientations=["vertical","angled","horizontal"];
let orientationIndex=0;
let currentOrientation="vertical";

// ─── TITLE SCREEN ─────────────────────────────────────────────────────────
let titleUnlockedAt = 0;

function showTitle(){
  gameState="title";
  titleUnlockedAt = Date.now() + 800; // 800ms buffer before buttons work
  document.getElementById("titleScreen").style.display="flex";
  document.getElementById("bracketScreen").style.display="none";
  document.getElementById("nationScreen").style.display="none";
  document.getElementById("bracketScreen").style.display="none";
  document.getElementById("medalScreen").style.display="none";
  if(window._medalAnimId){ cancelAnimationFrame(window._medalAnimId); window._medalAnimId=null; }
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";
  let hs=localStorage.getItem("qu33phHigh")||0;
  document.getElementById("titleHighScore").innerText=
    hs>0?"HIGH SCORE: "+hs:"";
}

function startMode(mode){
  if(Date.now() < titleUnlockedAt) return;
  gameMode=mode;
  document.getElementById("titleScreen").style.display="none";
  if(mode==="single"){
    startGame();
  } else {
    showNationSelect();
  }
}

// ─── BRACKET SCREEN ────────────────────────────────────────────────────────
function showBracket(){
  gameState="bracket";
  document.getElementById("bracketScreen").style.display="flex";
  document.getElementById("bracketScreen").style.flexDirection="column";
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";
  renderBracket();
}

function renderBracket(){
  const os = olympicsState;

  // ── Check if tournament is over — show medal screen instead ──
  if(os.champion!==null || os.playerEliminated){
    showMedalScreen(); return;
  }

  const bc = document.getElementById("bracketCanvas");
  const bw = window.innerWidth;
  const bh = window.innerHeight * 0.80;
  bc.width = bw; bc.height = bh;
  const bx = bc.getContext("2d");
  bx.fillStyle="#08080a"; bx.fillRect(0,0,bw,bh);

  // ── HEADER ──
  bx.textAlign="center"; bx.textBaseline="top";
  bx.fillStyle="#ffffff";
  bx.font=`bold ${Math.round(bw*0.07)}px 'Courier New',monospace`;
  bx.fillText("QU33PH",bw/2,10);
  bx.fillStyle="#c8a840";
  bx.font=`bold ${Math.round(bw*0.045)}px 'Courier New',monospace`;
  bx.fillText("OLYMPICS",bw/2,10+bw*0.076);
  bx.fillStyle="#c8a840";
  bx.fillRect(bw*0.15, 10+bw*0.128, bw*0.7, 2);

  // ── LAYOUT: vertical bracket on portrait ──
  // Left col = QF1,QF2 (cpu matches)   Right col = QF3, QF4(player)
  // Middle col = SF1, SF2
  // Bottom centre = FINAL
  const PAD = 6;
  const topY = bh*0.20;
  const colW = bw*0.30;           // each match box width
  const rH = Math.round(bh*0.055); // row height per player
  const mH = rH*2+1;              // match total height
  const lx = PAD;                 // left col x
  const rx = bw-PAD-colW;        // right col x
  const mx = (bw-colW)/2;        // middle col x

  // Vertical spacing
  const qfGap = bh*0.06;
  const qf1y = topY;
  const qf2y = topY + mH + qfGap;
  const sf1y = topY + (mH+qfGap)/2; // vertically centred between qf1 and qf2
  const qf3y = topY;
  const qf4y = topY + mH + qfGap;
  const sf2y = sf1y;
  const finy = qf2y + mH + qfGap*0.8;

  const labelSz = Math.round(bw*0.025);
  const nameSz  = Math.round(bw*0.028);
  const scoreSz = Math.round(bw*0.03);

  function truncate(n, maxChars){
    if(!n) return "TBD";
    return n.length > maxChars ? n.slice(0,maxChars) : n;
  }

  function drawMatch(x,y,p1,p2,s1,s2,active,label){
    let done = s1!==null && s2!==null;
    let winIdx = done ? (s1>s2?0:1) : -1;

    // label
    if(label){
      bx.fillStyle=active?"#fff":"#444";
      bx.font=`${labelSz}px 'Courier New',monospace`;
      bx.textAlign="left"; bx.textBaseline="bottom";
      bx.fillText(label, x, y-2);
    }

    // border
    bx.strokeStyle=active?"#fff":done?"#444":"#222";
    bx.lineWidth=active?2:1;
    bx.strokeRect(x,y,colW,mH);

    [p1,p2].forEach((p,pi)=>{
      let ry = y + pi*(rH+1);
      let isWin  = done && winIdx===pi;
      let isLoss = done && winIdx!==pi;
      let isYou  = p && p.isPlayer;
      let isPending = !p; // TBD slot

      // row bg — subtle green tint for your row
      if(isYou && !isLoss){
        bx.fillStyle="rgba(68,238,68,0.06)";
        bx.fillRect(x+1, ry+1, colW-2, rH-1);
      }

      // name — flag + short name, all in one colour
      let nameStr = "TBD";
      if(p){
        let short = p.name.length>6 ? p.name.slice(0,6) : p.name;
        nameStr = p.flag+" "+short+(p.isPlayer?" 🎮(you)":"");
      }

      // colour: winner=green, loser=red, you pending=green, cpu pending=grey, TBD=dark grey
      let nameColor;
      if(isPending)        nameColor="#2a2a2a";
      else if(isWin)       nameColor="#44ee44";
      else if(isLoss)      nameColor="#cc3333";
      else if(isYou)       nameColor="#44ee44"; // your slot always green when pending
      else                 nameColor="#777";

      bx.fillStyle=nameColor;
      bx.font=`${nameSz}px 'Courier New',monospace`;
      bx.textAlign="left"; bx.textBaseline="middle";
      bx.fillText(nameStr, x+4, ry+rH/2);

      // score — right aligned
      if(done){
        let sc = pi===0 ? s1 : s2;
        bx.fillStyle = isWin?"#44ee44":"#cc3333";
        bx.font=`bold ${scoreSz}px 'Courier New',monospace`;
        bx.textAlign="right";
        bx.fillText(sc, x+colW-4, ry+rH/2);
      }
    });

    // divider between rows
    bx.strokeStyle="#1a1a1a"; bx.lineWidth=1;
    bx.beginPath(); bx.moveTo(x+1,y+rH); bx.lineTo(x+colW-1,y+rH); bx.stroke();
  }

  function connector(x1,y1,x2,y2){
    bx.strokeStyle="#2a2a2a"; bx.lineWidth=1.5;
    let midX=(x1+x2)/2;
    bx.beginPath();
    bx.moveTo(x1,y1); bx.lineTo(midX,y1); bx.lineTo(midX,y2); bx.lineTo(x2,y2);
    bx.stroke();
  }

  // ── Determine winners ──
  let qf1w = os.qf1s1>os.qf1s2 ? os.n[0] : os.n[1];
  let qf2w = os.qf2s1>os.qf2s2 ? os.n[2] : os.n[3];
  let qf3w = os.qf3s1>os.qf3s2 ? os.n[4] : os.n[5];
  let qf4done = os.qf4Score!==null;
  let qf4w = qf4done ? (os.qf4Score>os.qf4Opp ? playerNation : os.n[6]) : null;
  let sf1done = os.sf1s1!==null;
  let sf1w = sf1done ? (os.sf1s1>os.sf1s2 ? qf1w : qf2w) : null;
  let sf2done = os.sf2Score!==null;
  let sf2w = sf2done ? (os.sf2Score>os.sf2Opp ? playerNation : qf3w) : null;
  let finDone = os.finScore!==null;

  // ── DRAW MATCHES ──
  drawMatch(lx, qf1y, os.n[0],os.n[1], os.qf1s1,os.qf1s2, false,"QF1");
  drawMatch(lx, qf2y, os.n[2],os.n[3], os.qf2s1,os.qf2s2, false,"QF2");

  // SF1 — show both QF winners (cpu matches always pre-resolved), show scores once played
  drawMatch(mx, sf1y, qf1w, qf2w, os.sf1s1, os.sf1s2, false,"SF1");

  drawMatch(rx, qf3y, os.n[4],os.n[5], os.qf3s1,os.qf3s2, false,"QF3");
  drawMatch(rx, qf4y, os.n[6],playerNation, qf4done?os.qf4Opp:null, qf4done?os.qf4Score:null,
    os.round===1,"QF4");

  // SF2 — p1=QF3 winner (always known), p2=TBD until player wins QF4
  let sf2p2 = qf4done ? qf4w : null;
  drawMatch(mx, sf2y, qf3w, sf2p2, sf2done?os.sf2Opp:null, sf2done?os.sf2Score:null,
    os.round===2&&!os.playerEliminated,"SF2");

  // FINAL — both TBD until SFs resolved
  let finp1 = sf1done ? sf1w : null;
  let finp2 = sf2done ? sf2w : null;
  drawMatch(mx, finy, finp1, finp2, finDone?os.finOpp:null, finDone?os.finScore:null,
    os.round===3&&!os.playerEliminated,"FINAL");

  // ── CONNECTORS ──
  connector(lx+colW, qf1y+rH, mx, sf1y+rH);
  connector(lx+colW, qf2y+rH, mx, sf1y+rH);
  connector(rx,      qf3y+rH, mx+colW, sf2y+rH);
  connector(rx,      qf4y+rH, mx+colW, sf2y+rH);
  connector(mx+colW, sf1y+rH, mx, finy+rH);
  connector(mx,      sf2y+rH, mx+colW, finy+rH);

  // ── BUTTON ──
  const playBtn=document.getElementById("playNextBtn");
  const roundLabel=document.getElementById("bracketRoundLabel");
  playBtn.className="";
  let lbl=os.round===1?"PLAY QF4 →":os.round===2?"PLAY SEMI-FINAL →":"PLAY GRAND FINAL →";
  playBtn.innerText=lbl;
  playBtn.onclick=()=>{document.getElementById("bracketScreen").style.display="none";startGame();};
  roundLabel.innerText=os.round===1?"QUARTER-FINAL":os.round===2?"SEMI-FINAL":"GRAND FINAL";
}

function showMedalScreen(){
  const os = olympicsState;
  document.getElementById("bracketScreen").style.display="none";
  document.getElementById("medalScreen").style.display="flex";

  let medal, medalText, medalColor, bgColor;
  if(os.champion==="player"){
    medal="🥇"; medalText="GOLD MEDAL"; medalColor="#ffd700"; bgColor="rgba(255,215,0,";
  } else if(os.playerEliminated && os.round<=2){
    medal="🥉"; medalText="BRONZE MEDAL"; medalColor="#cd7f32"; bgColor="rgba(205,127,50,";
  } else {
    medal="🥈"; medalText="SILVER MEDAL"; medalColor="#c0c0c0"; bgColor="rgba(192,192,192,";
  }

  const mc = document.getElementById("medalCanvas");
  const mw = window.innerWidth;
  const mh = window.innerHeight * 0.82;
  mc.width=mw; mc.height=mh;
  const mx2 = mc.getContext("2d");

  let particles = [];
  for(let i=0;i<28;i++){
    particles.push({
      x: mw*0.2 + Math.random()*mw*0.6,
      y: mh*0.1 + Math.random()*mh*0.7,
      vx: (Math.random()-0.5)*1.2,
      vy: -0.5-Math.random()*1.5,
      size: 3+Math.random()*6,
      life: Math.random(),
      speed: 0.008+Math.random()*0.012,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.15,
    });
  }

  let frame=0;
  let animId;

  function drawMedal(){
    mx2.fillStyle="#08080a"; mx2.fillRect(0,0,mw,mh);
    frame++;

    // Outer glow rings
    for(let r=3;r>=1;r--){
      let pulse = 0.5+0.5*Math.sin(frame*0.04);
      let radius = mw*0.28 + r*18 + pulse*12;
      let grad = mx2.createRadialGradient(mw/2,mh*0.42,0,mw/2,mh*0.42,radius);
      grad.addColorStop(0, bgColor+(0.08*r*pulse)+")");
      grad.addColorStop(1, "rgba(0,0,0,0)");
      mx2.fillStyle=grad; mx2.beginPath();
      mx2.arc(mw/2,mh*0.42,radius,0,Math.PI*2); mx2.fill();
    }

    // Medal emoji
    mx2.font=`${Math.round(mw*0.42)}px Arial`;
    mx2.textAlign="center"; mx2.textBaseline="middle";
    let bounce = Math.sin(frame*0.05)*6;
    mx2.fillText(medal, mw/2, mh*0.42+bounce);

    // Shiny sweep line
    let sweepX = mw/2 + Math.cos(frame*0.03)*mw*0.12;
    let sweepGrad = mx2.createLinearGradient(sweepX-40,0,sweepX+40,0);
    sweepGrad.addColorStop(0,"rgba(255,255,255,0)");
    sweepGrad.addColorStop(0.5,"rgba(255,255,255,0.18)");
    sweepGrad.addColorStop(1,"rgba(255,255,255,0)");
    mx2.save();
    mx2.beginPath();
    mx2.arc(mw/2,mh*0.42,mw*0.2,0,Math.PI*2);
    mx2.clip();
    mx2.fillStyle=sweepGrad;
    mx2.fillRect(sweepX-40,mh*0.25,80,mh*0.35);
    mx2.restore();

    // Text
    mx2.fillStyle=medalColor;
    mx2.font=`bold ${Math.round(mw*0.07)}px 'Courier New',monospace`;
    mx2.textAlign="center"; mx2.textBaseline="top";
    mx2.fillText(medalText, mw/2, mh*0.72);

    mx2.fillStyle="#fff";
    mx2.font=`bold ${Math.round(mw*0.045)}px 'Courier New',monospace`;
    mx2.fillText(playerNation.flag+" "+playerNation.name, mw/2, mh*0.72+mw*0.08);

    if(os.champion==="player"){
      mx2.fillStyle="#888";
      mx2.font=`${Math.round(mw*0.032)}px 'Courier New',monospace`;
      mx2.fillText("QU33PH OLYMPIC CHAMPION", mw/2, mh*0.72+mw*0.14);
    }

    // Sparkle particles
    particles.forEach(p=>{
      p.life += p.speed;
      if(p.life>1){ p.life=0; p.x=mw*0.1+Math.random()*mw*0.8; p.y=mh*0.15+Math.random()*mh*0.6; }
      p.x += p.vx; p.y += p.vy;
      p.angle += p.spin;
      let alpha = Math.sin(p.life*Math.PI);

      mx2.save();
      mx2.globalAlpha=alpha*0.9;
      mx2.translate(p.x,p.y);
      mx2.rotate(p.angle);
      mx2.fillStyle=medalColor;
      mx2.shadowColor=medalColor; mx2.shadowBlur=8;
      // 4-point star
      mx2.beginPath();
      let s=p.size;
      mx2.moveTo(0,-s); mx2.lineTo(s*0.25,-s*0.25);
      mx2.lineTo(s,0);  mx2.lineTo(s*0.25,s*0.25);
      mx2.lineTo(0,s);  mx2.lineTo(-s*0.25,s*0.25);
      mx2.lineTo(-s,0); mx2.lineTo(-s*0.25,-s*0.25);
      mx2.closePath(); mx2.fill();
      mx2.restore();
    });

    animId = requestAnimationFrame(drawMedal);
  }

  // Stop animation when leaving
  document.getElementById("medalScreen").dataset.animId = "";
  if(window._medalAnimId) cancelAnimationFrame(window._medalAnimId);
  drawMedal();
  window._medalAnimId = animId;
}

// ─── GAME START ────────────────────────────────────────────────────────────
function startGame(){
  markers=[];
  current=0;
  totalScore=0;
  startTime=Date.now();
  suddenDeath=false;
  chairLocked=false;
  explosions=[];
  scorePopups=[];
  previewMarkers=[
    {color:"green",x:0,used:false},
    {color:"red",x:0,used:false},
    {color:"blue",x:0,used:false}
  ];
  shake=0;
  orientationIndex=0;
  currentOrientation="vertical";
  document.getElementById("rotateBtn").style.display="block";
  document.getElementById("rotateBtn").innerText="Orientation: vertical";
  document.getElementById("timeline").style.display="block";
  document.getElementById("progress").style.width="0%";
  document.getElementById("progress").style.background="lime";
  randomizeSky();
  gameState="playing";
}

// ─── ORIENTATION BTN ──────────────────────────────────────────────────────
document.getElementById("rotateBtn").onclick=()=>{
  orientationIndex=(orientationIndex+1)%orientations.length;
  currentOrientation=orientations[orientationIndex];
  document.getElementById("rotateBtn").innerText="Orientation: "+currentOrientation;
};

// ─── INPUT ────────────────────────────────────────────────────────────────
let dragging=false,startX,startY,currentX,currentY;
const colors=["green","red","blue"];
const lengths=[60,60,90];

canvas.addEventListener("pointerdown",e=>{
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"||gameState==="olympicsResult"){
    if(gameMode==="single"){
      showTitle();
    } else {
      // olympics: go back to bracket or result
      showTitle();
    }
    return;
  }

  if(gameState!=="playing") return;

  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    tryAdvanceRound();
    return;
  }

  if(current>=3 && markers.length===0) return;

  dragging=true;
  startX=e.clientX;
  startY=e.clientY;
  currentX=startX;
  currentY=startY;
});

canvas.addEventListener("pointermove",e=>{
  if(!dragging) return;
  currentX=e.clientX;
  currentY=e.clientY;
});

canvas.addEventListener("pointerup",()=>{
  if(!dragging) return;
  dragging=false;

  if(gameState!=="playing") return;
  if(current>=3) return;

  let dx=currentX-startX;
  let dy=currentY-startY;

  let baseRot=
    currentOrientation==="vertical"?0:
    currentOrientation==="angled"?Math.PI/6:
    Math.PI/2;

  markers.push({
    x:canvas.width/2,
    y:canvas.height-50,
    usedPreview:current,
    vx:dx*0.2,
    vy:dy*0.2,
    curve:dx*0.0003,
    angleType:currentOrientation,
    color:colors[current],
    length:lengths[current],
    stopped:false,
    fallen:false,
    trail:[],
    rotation:baseRot,
    spinVelocity:
      currentOrientation==="vertical"?0.08:
      currentOrientation==="angled"?0.12:0.18,
    chairBoost:false,
    megaTriggered:false,
    armed:false,
    life:0,
    passedDestiny:false,  // crossed the AC unit line
    deducted:false,       // PEEF deduction already applied
  });

  current++;
  previewMarkers[current-1].used=true;
});

// ─── HELPERS ──────────────────────────────────────────────────────────────
function touching(a,b){ return Math.hypot(a.x-b.x,a.y-b.y)<45; }
function isTouchingAny(m){ return markers.some(n=>n!==m&&!n.fallen&&touching(m,n)); }
function touchingChair(m){ return Math.hypot(m.x-chair.x,m.y-chair.y)<chair.radius; }
function addShake(amount){ shake=Math.max(shake,amount); }

function triggerMegaQu33ph(m){
  m.x=redDot.x; m.y=redDot.y;
  m.vx=0; m.vy=0; m.stopped=true;
  totalScore+=10;
  addShake(20);
  explosions.push({x:redDot.x,y:redDot.y,radius:10,life:30,text:"MEGA QU33PH",mega:true});
}

// ─── ROUND SYSTEM ─────────────────────────────────────────────────────────
function tryAdvanceRound(){
  if(gameState!=="playing") return;
  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    let g=markers[0], r=markers[1], b=markers[2];

    // ── DEDUCTION: Blue marker must pass the chair during sudden death ──
    if(b && !b.fallen && suddenDeath){
      // chair.y is near top of screen (low y = far up field)
      // blue passes chair if its final y < chair.y
      if(b.y > chair.y){
        totalScore = Math.max(0, totalScore - 2);
        scorePopups.push({x:(LEFT_EDGE+RIGHT_WALL)/2, y:canvas.height*0.45, text:"PEEF", life:55, peef:true, shakeAmt:7});
        scorePopups.push({x:(LEFT_EDGE+RIGHT_WALL)/2, y:canvas.height*0.45+30, text:"-2 BLUE MISSED CHAIR", life:55, peef:true, shakeAmt:4});
        addShake(8);
      }
    }

    let roundScore=calculateScore();
    totalScore+=roundScore;
    scorePopups.push({x:canvas.width/2,y:canvas.height/2,text:"+"+roundScore,life:40});
    if(g&&r&&b&&touching(g,r)&&touching(r,b)&&touching(g,b)){
      explosions.push({x:(g.x+r.x+b.x)/3,y:(g.y+r.y+b.y)/3,radius:10,life:20,text:"QU33PH"});
      addShake(8);
    }
    markers=[];
    current=0;
    previewMarkers=[
      {color:"green",x:0,used:false},
      {color:"red",x:0,used:false},
      {color:"blue",x:0,used:false}
    ];
  }
}

function calculateScore(){
  if(markers.length<3) return 0;
  let g=markers[0],r=markers[1],b=markers[2];
  if(!g||!r||!b) return 0;
  if(!(g.armed&&r.armed&&b.armed)) return 0;
  let gr=touching(g,r), rb=touching(r,b), gb=touching(g,b);
  if(suddenDeath){
    if(gr&&rb&&gb) return 10;
    if(rb) return 5;
    if(gb) return 5;
    if(gr) return 3;
    return 0;
  } else {
    if(gr&&rb&&gb) return 3;
    if(rb) return 2;
    if(gb) return 2;
    if(gr) return 0.5;
    return 0;
  }
}

// ─── SKY ──────────────────────────────────────────────────────────────────
// Window panel is the vertical strip from RIGHT_WALL to screen right edge.
// Sky goes top to bottom inside that strip.
let clouds=[];
let trees=[];

function randomizeSky(){
  let wx = RIGHT_WALL + 5;
  let ww = canvas.width - wx;

  clouds=[];
  for(let i=0;i<5;i++){
    clouds.push({
      // x stays within RIGHT_WALL..canvas.width, y within the sky portion of the window
      x: wx + Math.random()*ww,
      y: END_LINE_Y + Math.random() * (canvas.height * 0.55 - END_LINE_Y),
      w: 30 + Math.random()*50,
      speed: 0.05 + Math.random()*0.08,
      wx, ww  // store bounds for clamping drift
    });
  }

  trees=[];
  for(let i=0;i<8;i++){
    trees.push({
      x: wx + Math.random()*ww,
      h: canvas.height * (0.07 + Math.random()*0.09)
    });
  }
}

function lerpRGB(a,b,t){
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}

function drawWindowScene(elapsed){
  let t = Math.min(elapsed/TOTAL_TIME, 1);
  let wx = RIGHT_WALL + 10; // inside frame
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // Window fills the ENTIRE right strip top to bottom
  // Sky takes top 60%, ground takes bottom 40%
  let horizonY = wh * 0.6;

  // ── sky gradient ──
  let skyTop, skyBot;
  if(t < 0.66){
    let d = t/0.66;
    skyTop = lerpRGB([82,148,210],[210,130,50],d);
    skyBot = lerpRGB([140,195,235],[240,180,80],d);
  } else {
    let d = (t-0.66)/0.34;
    skyTop = lerpRGB([210,130,50],[15,8,35],d);
    skyBot = lerpRGB([240,180,80],[160,45,20],d);
  }
  let grad = ctx.createLinearGradient(0,0,0,horizonY);
  grad.addColorStop(0, `rgb(${skyTop})`);
  grad.addColorStop(1, `rgb(${skyBot})`);
  ctx.fillStyle = grad;
  ctx.fillRect(wx, 0, ww, horizonY);

  // ── ground / greenery ──
  let groundColor = t<0.66
    ? lerpRGB([55,105,45],[30,60,25],t/0.66)
    : lerpRGB([30,60,25],[12,22,10],(t-0.66)/0.34);
  ctx.fillStyle=`rgb(${groundColor})`;
  ctx.fillRect(wx, horizonY, ww, wh - horizonY);

  // ── sun ──
  let sunY = wh * (0.06 + t*0.22);
  let sunX = wx + ww*0.7;
  let sunR = t<0.66 ? 14 : 11;
  let glowR = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*4);
  glowR.addColorStop(0, t<0.66?`rgba(255,240,120,0.3)`:`rgba(200,50,10,0.35)`);
  glowR.addColorStop(1,`rgba(0,0,0,0)`);
  ctx.fillStyle=glowR;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t<0.66?`rgba(255,245,170,0.95)`:`rgba(215,70,30,0.9)`;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

  // ── trees — horizontal dark bands at horizon (perpendicular/flat view) ──
  trees.forEach(tr=>{
    let bandY = horizonY - tr.h * 0.7;
    let bandH = tr.h * 0.85;
    let treGrad = ctx.createLinearGradient(0, bandY, 0, bandY+bandH);
    treGrad.addColorStop(0, `rgba(0,0,0,0)`);
    treGrad.addColorStop(0.25, t<0.66?`rgba(25,62,19,0.88)`:`rgba(8,15,6,0.92)`);
    treGrad.addColorStop(0.75, t<0.66?`rgba(28,65,22,0.95)`:`rgba(10,18,8,0.97)`);
    treGrad.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle=treGrad;
    ctx.fillRect(tr.x, bandY, tr.h * 2.2, bandH);
  });

  // ── railing ──
  let railY = horizonY + (wh-horizonY)*0.06;
  let railColor = t<0.66 ? `rgba(15,25,15,0.75)` : `rgba(8,8,8,0.85)`;
  ctx.strokeStyle=railColor; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(wx,railY); ctx.lineTo(canvas.width,railY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx,railY+18); ctx.lineTo(canvas.width,railY+18); ctx.stroke();
  ctx.lineWidth=1.5;
  for(let bx=wx+4; bx<canvas.width; bx+=14){
    ctx.beginPath(); ctx.moveTo(bx,railY-8); ctx.lineTo(bx,railY+22); ctx.stroke();
  }

  // ── clouds clipped to sky portion only ──
  ctx.save();
  ctx.beginPath();
  ctx.rect(wx, 0, ww, horizonY * 0.85);
  ctx.clip();
  let cloudCol = t<0.66
    ? `rgba(255,255,255,${0.75-(t/0.66)*0.25})`
    : `rgba(190,110,70,${Math.max(0,0.4-(t-0.66)/0.34*0.3)})`;
  clouds.forEach(c=>{
    // keep clouds in sky band
    let cy = Math.min(c.y, horizonY * 0.75);
    ctx.fillStyle=cloudCol;
    ctx.beginPath(); ctx.ellipse(c.x, cy, c.w*0.5, c.w*0.2, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.22, cy+c.w*0.05, c.w*0.3, c.w*0.16, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.22, cy+c.w*0.03, c.w*0.28, c.w*0.14, 0,0,Math.PI*2); ctx.fill();
    c.x += c.speed;
    if(c.x - c.w > canvas.width) c.x = wx - c.w;
    if(c.x + c.w < wx) c.x = canvas.width + c.w;
  });
  ctx.restore();
}

function drawWindowFrame(){
  let wx = RIGHT_WALL;
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // ── roller blind at very top ──
  let blindH = wh * 0.07;
  let blindGrad = ctx.createLinearGradient(0,0,0,blindH);
  blindGrad.addColorStop(0,"#d5cfc6");
  blindGrad.addColorStop(1,"#bfb9b0");
  ctx.fillStyle=blindGrad;
  ctx.fillRect(wx+10, 0, ww-10, blindH);
  ctx.strokeStyle="rgba(150,144,136,0.4)"; ctx.lineWidth=1;
  for(let sy=5;sy<blindH;sy+=6){
    ctx.beginPath(); ctx.moveTo(wx+10,sy); ctx.lineTo(canvas.width,sy); ctx.stroke();
  }
  ctx.fillStyle="#a8a29a";
  ctx.fillRect(wx+10, blindH-3, ww-10, 5);

  // ── outer left frame (full height dark strip) ──
  let frameColor="#181818";
  ctx.fillStyle=frameColor;
  ctx.fillRect(wx, 0, 10, wh);

  // ── top frame bar ──
  ctx.fillRect(wx+10, blindH, ww-10, 8);

  // ── bottom frame bar (very bottom of screen) ──
  ctx.fillRect(wx+10, wh-8, ww-10, 8);

  // ── vertical mullions (2 dividers, full height) ──
  let col1 = wx + ww*0.38;
  let col2 = wx + ww*0.72;
  ctx.fillRect(col1-4, blindH, 8, wh - blindH);
  ctx.fillRect(col2-4, blindH, 8, wh - blindH);

  // ── horizontal mid-rails — 2 of them to make proper grid panes ──
  ctx.fillRect(wx+10, wh*0.35, ww-10, 7);
  ctx.fillRect(wx+10, wh*0.62, ww-10, 7);
}

// ─── UPDATE ───────────────────────────────────────────────────────────────
function update(){
  if(gameState!=="playing") return;

  if(shake>0){ shake*=0.9; if(shake<0.05) shake=0; }

  let elapsed=(Date.now()-startTime)/1000;

  if(elapsed>ROUND_TIME&&elapsed<=TOTAL_TIME){ suddenDeath=true; }
  if(!chairLocked&&suddenDeath){ chairLocked=true; chair.x=(LEFT_EDGE+RIGHT_WALL)/2; chair.y=END_LINE_Y+90; }
  if(elapsed>TOTAL_TIME){ endGame(); return; }

  markers.forEach(m=>{
    if(m.stopped||m.fallen) return;
    m.life+=1/60;
    if(m.life>=1){ m.stopped=true; m.vx=0; m.vy=0; }
    m.vx+=m.curve;
    m.x+=m.vx*speedMultiplier;
    m.y+=m.vy*speedMultiplier;
    if(!m.armed&&m.y<START_LINE_Y) m.armed=true;
    m.vx*=0.94; m.vy*=0.94;
    m.rotation+=m.spinVelocity*speedMultiplier;
    m.spinVelocity*=0.96;
    if(suddenDeath&&!m.megaTriggered&&touchingChair(m)){
      if(Math.random()<0.25) triggerMegaQu33ph(m);
      m.megaTriggered=true;
    }
    m.trail.push({x:m.x,y:m.y});
    if(m.trail.length>20) m.trail.shift();

    // Track if marker has crossed the Line of Destiny (AC unit)
    if(!m.passedDestiny && m.y < LINE_OF_DESTINY) m.passedDestiny=true;

    // Fallen off left edge
    if(m.x<LEFT_EDGE){
      if(!m.deducted && m.passedDestiny){
        // PEEF — deduct points for falling off after the line of destiny
        let deduction = suddenDeath ? 5 : 2;
        totalScore = Math.max(0, totalScore - deduction);
        m.deducted=true;
        addShake(12);
        // PEEF popup — shaking red text, no circle
        scorePopups.push({
          x: LEFT_EDGE + 60,
          y: m.y,
          text:"PEEF",
          life:50,
          peef:true,
          shakeAmt:8,
        });
        scorePopups.push({
          x: LEFT_EDGE + 60,
          y: m.y + 28,
          text:"-"+deduction,
          life:50,
          peef:true,
          shakeAmt:5,
        });
      }
      m.fallen=true;
    }
    if(m.x>RIGHT_WALL){ m.x=RIGHT_WALL; m.vx*=-0.4; }
    if(m.y<END_LINE_Y){ m.y=END_LINE_Y; m.vy*=-0.2; }
    if(Math.abs(m.vx)<0.05&&Math.abs(m.vy)<0.05) m.stopped=true;

    let progress=Math.min(elapsed/TOTAL_TIME,1);
    document.getElementById("progress").style.width=(progress*100)+"%";
    if(elapsed>ROUND_TIME) document.getElementById("progress").style.background="red";
  });

  explosions.forEach(e=>{ e.radius+=e.mega?6:4; e.life--; });
  explosions=explosions.filter(e=>e.life>0);
  scorePopups.forEach(p=>{ p.y -= p.peef ? 0.8 : 1; p.life--; });
  scorePopups=scorePopups.filter(p=>p.life>0);

  if(current===3&&markers.every(m=>m.stopped||m.fallen)) tryAdvanceRound();
}

// ─── END GAME ─────────────────────────────────────────────────────────────
function endGame(){
  shake=0;
  if(totalScore>highScore){
    highScore=totalScore;
    localStorage.setItem("qu33phHigh",highScore);
  }
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";

  if(gameMode==="olympics"){
    const os=olympicsState;
    let oppScore=simulatedScore();
    // ensure no tie
    while(oppScore===totalScore) oppScore=simulatedScore();

    if(os.round===1){
      // QF4: player vs n[6]
      os.qf4Score=totalScore; os.qf4Opp=oppScore;
      // also sim SF1 now
      os.sf1s1=simulatedScore(); os.sf1s2=simulatedScore();
      while(os.sf1s1===os.sf1s2) os.sf1s2=simulatedScore();
      if(totalScore<=oppScore){ os.playerEliminated=true; }
      os.round=2;
    } else if(os.round===2){
      // SF2: QF3w vs QF4w(player)
      os.sf2Score=totalScore; os.sf2Opp=oppScore;
      if(totalScore<=oppScore){ os.playerEliminated=true; }
      os.round=3;
    } else if(os.round===3){
      // Final
      os.finScore=totalScore; os.finOpp=oppScore;
      os.champion=totalScore>oppScore?"player":"cpu";
    }

    gameState="end";
    showBracket();
    return;
  }

  gameState="end";
}

// ─── DRAW MARKER ──────────────────────────────────────────────────────────
function drawMarker(m){
  if(m.trail&&m.trail.length>1){
    let tw=m.color==="red"?3:m.color==="green"?4:6;
    ctx.beginPath();
    ctx.moveTo(m.trail[0].x,m.trail[0].y);
    for(let i=1;i<m.trail.length;i++) ctx.lineTo(m.trail[i].x,m.trail[i].y);
    ctx.strokeStyle=m.color;
    ctx.lineWidth=tw;
    ctx.globalAlpha=0.6;
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  const img=markerImages[m.color];
  if(!img||!img.complete||!img.naturalWidth) return;
  ctx.save();
  ctx.translate(m.x,m.y);
  ctx.rotate(m.rotation);
  let w=50,h=50;
  if(m.color==="blue"){w=80;h=50;}
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw(){
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="top";
    ctx.fillStyle="#fff";
    ctx.font="bold 60px 'Courier New',monospace";
    ctx.fillText("Qu33ph",canvas.width/2,130);
    ctx.font="22px 'Courier New',monospace";
    ctx.fillStyle="#aaa";
    ctx.fillText("SCORE: "+totalScore,canvas.width/2,210);
    ctx.fillStyle="#555";
    ctx.fillText("HIGH SCORE: "+highScore,canvas.width/2,244);
    ctx.fillStyle="#333";
    ctx.font="16px 'Courier New',monospace";
    ctx.fillText("tap anywhere to return to menu",canvas.width/2,310);
    return;
  }

  if(gameState==="olympicsResult"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillStyle="#fff";
    ctx.font="bold 28px 'Courier New',monospace";
    ctx.fillText(olympicsResultMsg,canvas.width/2,canvas.height/2-30);
    if(olympicsResultSub){
      ctx.fillStyle="#555";
      ctx.font="16px 'Courier New',monospace";
      ctx.fillText(olympicsResultSub,canvas.width/2,canvas.height/2+20);
    }
    ctx.fillStyle="#333";
    ctx.font="14px 'Courier New',monospace";
    ctx.fillText("tap to return to menu",canvas.width/2,canvas.height/2+70);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  let elapsed=(Date.now()-startTime)/1000;
  let shakeX=(Math.random()-0.5)*shake;
  let shakeY=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // ── 1. BACKGROUND BASE ──
  ctx.fillStyle="#d8cfc4"; // cream/beige room
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── 2. WINDOW SCENE (right strip, behind frame) ──
  drawWindowScene(elapsed);
  drawWindowFrame();

  // ── 3. CREAM WALL (right of counter, left of window) ──
  // This is the wall panel visible to the right of the playing field
  ctx.fillStyle="#cdc8bc";
  ctx.fillRect(RIGHT_WALL, END_LINE_Y, canvas.width*0.01, canvas.height-END_LINE_Y);

  // ── 4. TEAL LEFT WALL PANEL ──
  ctx.fillStyle="#3d6b62";
  ctx.fillRect(0, 0, LEFT_EDGE, canvas.height);
  ctx.fillStyle="#4a7d73";
  ctx.fillRect(LEFT_EDGE-4, 0, 4, canvas.height);

  // ── 5. COUNTER SURFACE — nearly full screen height ──
  let taper = canvas.width * 0.02;
  let cLeft  = LEFT_EDGE;
  let cRight = RIGHT_WALL;
  let cTop   = canvas.height * 0.06;  // tiny gap at top for cabinet
  let cBot   = canvas.height * 0.97;  // nearly full screen

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cLeft + taper, cTop);
  ctx.lineTo(cRight - taper*0.3, cTop);
  ctx.lineTo(cRight, cBot);
  ctx.lineTo(cLeft, cBot);
  ctx.closePath();

  // Light blue-grey laminate
  let surfGrad = ctx.createLinearGradient(0, cTop, 0, cBot);
  surfGrad.addColorStop(0, "#8fa8a4");   // slightly darker at far end
  surfGrad.addColorStop(0.3, "#9ab4af");
  surfGrad.addColorStop(0.7, "#a8bebb");
  surfGrad.addColorStop(1, "#b0c4c1");   // lighter near player
  ctx.fillStyle = surfGrad;
  ctx.fill();

  // Subtle surface sheen
  let sheenGrad = ctx.createLinearGradient(cLeft, 0, cRight, 0);
  sheenGrad.addColorStop(0,"rgba(255,255,255,0)");
  sheenGrad.addColorStop(0.4,"rgba(255,255,255,0.07)");
  sheenGrad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=sheenGrad;
  ctx.fill();

  // Panel seam line (like real photo)
  ctx.strokeStyle="rgba(0,0,0,0.12)"; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo((cLeft+cRight)*0.48, cTop);
  ctx.lineTo((cLeft+cRight)*0.5, cBot);
  ctx.stroke();

  ctx.restore();

  // ── 6. COUNTER FRONT FACE (thin strip at bottom of surface) ──
  let faceTop = cBot;
  let faceBot = cBot + canvas.height*0.025;
  let faceGrad = ctx.createLinearGradient(0,faceTop,0,faceBot);
  faceGrad.addColorStop(0,"#7a9490");
  faceGrad.addColorStop(0.5,"#8ea8a4");
  faceGrad.addColorStop(1,"#5a7470");
  ctx.fillStyle=faceGrad;
  ctx.fillRect(cLeft, faceTop, cRight-cLeft, faceBot-faceTop);
  // aluminium trim strip at very top of front face
  ctx.fillStyle="#b8c8c4";
  ctx.fillRect(cLeft, faceTop, cRight-cLeft, 3);

  // ── 7. BOTTOM AREA — plain light blue-grey counter color ──
  ctx.fillStyle="#a8bebb";
  ctx.fillRect(cLeft, cBot, cRight-cLeft, canvas.height-cBot);
  ctx.fillStyle="#b8c8c4";
  ctx.fillRect(cLeft, cBot, cRight-cLeft, 3);

  // ── 8. BEIGE FLOOR below counter ──
  ctx.fillStyle="#c8b89a";
  ctx.fillRect(0, canvas.height*0.97, canvas.width, canvas.height*0.03);

  // ── 9. TEAL GREEN CABINET — tiny strip at very TOP ──
  ctx.fillStyle="#3d6b62";
  ctx.fillRect(cLeft, cTop, cRight-cLeft, canvas.height*0.05);
  ctx.fillStyle="#4a7d73";
  ctx.fillRect(cLeft, cTop, cRight-cLeft, 3);

  // ── 10. BROWN AC UNIT — contained rectangle, left side, with grouped slats ──
  let acBrownR = cRight; // extends to windowsill
  let acT2 = cTop  + (cBot-cTop)*0.77;
  let acB2 = cTop  + (cBot-cTop)*0.93;
  let acH2 = acB2 - acT2;
  let acTotalW = acBrownR - cLeft;

  // Outer shadow
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.fillRect(cLeft-2, acT2-3, acTotalW+4, acH2+6);

  // Full brown rectangle
  let acGrad = ctx.createLinearGradient(0, acT2, 0, acB2);
  acGrad.addColorStop(0,"#b89878");
  acGrad.addColorStop(0.5,"#c0a085");
  acGrad.addColorStop(1,"#907060");
  ctx.fillStyle=acGrad;
  ctx.fillRect(cLeft, acT2, acTotalW, acH2);

  // Inset border
  ctx.strokeStyle="rgba(70,48,28,0.7)"; ctx.lineWidth=2;
  ctx.strokeRect(cLeft+3, acT2+3, acTotalW-6, acH2-6);
  ctx.strokeStyle="rgba(180,150,110,0.2)"; ctx.lineWidth=1;
  ctx.strokeRect(cLeft+5, acT2+5, acTotalW-10, acH2-10);

  // Slat section — left ~30% of unit
  let slatSectionR = cLeft + acTotalW*0.30;
  ctx.fillStyle="#2a1c10";
  ctx.fillRect(cLeft+6, acT2+6, slatSectionR-cLeft-6, acH2-12);

  // Grouped slats with HORIZONTAL GAPS between groups
  // Each group: several vertical slats side by side, then a tan horizontal bar
  let numGroups = 5;
  let groupH = (acH2-12) / numGroups;
  let gapH = groupH * 0.18; // horizontal gap between groups
  let slatAreaT = acT2+6;
  let slatAreaL = cLeft+7;
  let slatAreaR = slatSectionR-4;
  let slatAreaW = slatAreaR - slatAreaL;

  for(let gi=0; gi<numGroups; gi++){
    let gy = slatAreaT + gi*groupH;
    let gSlatsT = gy + gapH*0.5;
    let gSlatsB = gy + groupH - gapH*0.5;
    let gSlatsH = gSlatsB - gSlatsT;

    // horizontal gap (tan/brown) between groups
    ctx.fillStyle="#a07858";
    ctx.fillRect(slatAreaL, gy, slatAreaW, gapH*0.5);

    // vertical slats within this group
    let slatW=4, slatGap=3;
    for(let sx=slatAreaL+2; sx<slatAreaR-2; sx+=slatW+slatGap){
      let sg=ctx.createLinearGradient(sx,0,sx+slatW,0);
      sg.addColorStop(0,"#4a2e14");
      sg.addColorStop(0.4,"#7a5030");
      sg.addColorStop(1,"#4a2e14");
      ctx.fillStyle=sg;
      ctx.fillRect(sx, gSlatsT, slatW, gSlatsH);
      ctx.fillStyle="rgba(0,0,0,0.55)";
      ctx.fillRect(sx+slatW, gSlatsT, slatGap-1, gSlatsH);
    }
  }
  // bottom gap
  ctx.fillStyle="#a07858";
  ctx.fillRect(slatAreaL, slatAreaT+(numGroups-1)*groupH+groupH-gapH*0.5, slatAreaW, gapH*0.5);

  // Border lines top/bottom
  ctx.strokeStyle="rgba(60,40,20,0.45)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cLeft,acT2); ctx.lineTo(acBrownR,acT2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cLeft,acB2); ctx.lineTo(acBrownR,acB2); ctx.stroke();

  // ── 11. BLACK STRIP at RIGHT_WALL (vertical, full counter height) ──
  ctx.fillStyle="#0e0e0e";
  ctx.fillRect(RIGHT_WALL, cTop, 13, cBot-cTop);

  // ── 12. RED DOT — exactly where MEGA QU33PH lands (redDot position) ──
  let dotCX = redDot.x;
  let dotCY = redDot.y;
  let dotR = 7;

  // White card
  ctx.fillStyle="#f5f5f0";
  ctx.fillRect(dotCX-dotR-3, dotCY-dotR-3, dotR*2+6, dotR*2+6);

  // Dark ring
  ctx.fillStyle="#111";
  ctx.beginPath(); ctx.arc(dotCX, dotCY, dotR+2, 0, Math.PI*2); ctx.fill();

  // Red gradient
  let rg = ctx.createRadialGradient(dotCX-2, dotCY-2, 1, dotCX, dotCY, dotR);
  rg.addColorStop(0,"#ff5555");
  rg.addColorStop(0.5,"#dd1111");
  rg.addColorStop(1,"#990000");
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.arc(dotCX, dotCY, dotR, 0, Math.PI*2); ctx.fill();

  // Specular
  ctx.fillStyle="rgba(255,255,255,0.5)";
  ctx.beginPath(); ctx.arc(dotCX-2, dotCY-2, dotR*0.35, 0, Math.PI*2); ctx.fill();

  // ── 13. END LINE ──
  ctx.fillStyle="rgba(255,255,255,0.15)";
  ctx.fillRect(cLeft, cTop+32, cRight-cLeft, 2);

  // ── OLYMPICS MEDAL BORDER ──
  if(gameMode==="olympics" && olympicsState){
    let round = olympicsState.round;
    let borderColor, glowColor, borderW;
    if(round===1){
      borderColor="#cd7f32"; glowColor="rgba(205,127,50,0.4)"; borderW=4; // bronze
    } else if(round===2){
      borderColor="#c0c0c0"; glowColor="rgba(192,192,192,0.4)"; borderW=5; // silver
    } else {
      borderColor="#ffd700"; glowColor="rgba(255,215,0,0.5)"; borderW=6; // gold
    }
    // Glow
    ctx.save();
    ctx.shadowColor=glowColor; ctx.shadowBlur=18;
    ctx.strokeStyle=borderColor; ctx.lineWidth=borderW;
    ctx.strokeRect(cLeft+2, cTop+2, cRight-cLeft-4, cBot-cTop-4);
    ctx.restore();

    // Gold sparkles for the final
    if(round===3){
      let t=Date.now()/1000;
      for(let i=0;i<14;i++){
        let angle = (i/14)*Math.PI*2 + t*0.8;
        let rad = Math.min(cRight-cLeft, cBot-cTop)*0.48;
        let cx2 = (cLeft+cRight)/2 + Math.cos(angle)*rad*0.92;
        let cy2 = (cTop+cBot)/2   + Math.sin(angle)*rad*0.72;
        let pulse = 0.5+0.5*Math.sin(t*3+i*0.9);
        let size = 3+pulse*4;
        ctx.save();
        ctx.globalAlpha=0.4+pulse*0.6;
        ctx.fillStyle="#ffd700";
        ctx.shadowColor="#ffd700"; ctx.shadowBlur=10;
        // star shape
        ctx.translate(cx2,cy2); ctx.rotate(t+i);
        ctx.beginPath();
        for(let p=0;p<5;p++){
          let a=p*Math.PI*2/5-Math.PI/2;
          let b=a+Math.PI/5;
          p===0?ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size):ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);
          ctx.lineTo(Math.cos(b)*size*0.4,Math.sin(b)*size*0.4);
        }
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }

    // Round label — drawn INSIDE the dark green cabinet at top
    let medalEmoji = round===1?"🥉":round===2?"🥈":"🥇";
    let roundName = round===1?"QUARTER-FINAL":round===2?"SEMI-FINAL":"GRAND FINAL";
    // Cabinet runs from cTop to cTop+canvas.height*0.05
    let cabMidY = cTop + canvas.height*0.025;
    ctx.fillStyle=borderColor;
    ctx.font="bold 13px 'Courier New',monospace";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(medalEmoji+" "+roundName+" "+medalEmoji, (cLeft+cRight)/2, cabMidY);
  }

  // ADVANCE PROMPT
  if(current===3&&markers.every(m=>m.stopped||m.fallen)){
    ctx.fillStyle="white";
    ctx.font="bold 24px 'Courier New',monospace";
    ctx.textAlign="center";
    ctx.textBaseline="bottom";
    ctx.fillText("tap anywhere on field to advance",(LEFT_EDGE+RIGHT_WALL)/2,END_LINE_Y-20);
  }

  ctx.restore();

  // CHAIR
  if(suddenDeath){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.translate(chair.x,chair.y);
    ctx.rotate(Math.PI);
    ctx.font="30px Arial";
    ctx.fillText("🪑",-15,10);
    ctx.restore();
  }

  // EXPLOSIONS
  explosions.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.globalAlpha=e.life/30;
    ctx.stroke();
    ctx.globalAlpha=e.life/30;
    ctx.fillStyle="white";
    ctx.font=e.mega?"bold 50px Arial":"bold 60px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(e.text||"QU33PH",e.x,e.y);
    ctx.globalAlpha=1;
  });

  // SCORE POPUPS
  scorePopups.forEach(p=>{
    ctx.save();
    if(p.peef){
      // PEEF — red, shaking, no fade as fast
      let shake2 = p.shakeAmt ? (Math.random()-0.5)*p.shakeAmt*(p.life/55) : 0;
      ctx.globalAlpha = Math.min(1, p.life/25);
      ctx.fillStyle="#ff2222";
      ctx.font=`bold ${p.text==="PEEF"?"36px":"18px"} 'Courier New',monospace`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.text, p.x + shake2, p.y + shake2*0.5);
    } else {
      ctx.globalAlpha=p.life/40;
      ctx.fillStyle="white";
      ctx.font="bold 30px 'Courier New',monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(p.text,p.x,p.y);
    }
    ctx.restore();
  });

  // PREVIEW MARKERS
  previewMarkers.forEach((p,i)=>{
    if(p.used) return;
    const img=markerImages[p.color];
    if(!img||!img.complete) return;
    let x=(LEFT_EDGE+RIGHT_WALL)/2;
    let y=START_LINE_Y-60-i*60;
    ctx.globalAlpha=0.5;
    ctx.drawImage(img,x-25,y-25,50,50);
    ctx.globalAlpha=1;
  });

  // MARKERS
  markers.forEach(m=>{
    if(m.fallen) return;
    ctx.shadowColor=isTouchingAny(m)?"lime":"red";
    ctx.shadowBlur=20;
    drawMarker(m);
    ctx.shadowBlur=0;
  });

  // UI TEXT
  ctx.setTransform(1,0,0,1,0,0);
  ctx.textAlign="left";
  ctx.textBaseline="top";
  ctx.fillStyle="white";
  ctx.font="20px 'Courier New',monospace";
  if(!suddenDeath){
    ctx.fillText("Time: "+Math.max(0,ROUND_TIME-Math.floor(elapsed)),20,20);
  } else {
    ctx.fillStyle="red";
    ctx.fillText("SUDDEN DEATH: "+Math.max(0,TOTAL_TIME-Math.floor(elapsed)),20,20);
  }
  ctx.fillStyle="white";
  ctx.fillText("Score: "+totalScore,20,50);

  // Olympics mode: show round indicator
  if(gameMode==="olympics"&&olympicsState){
    ctx.fillStyle="#555";
    ctx.font="13px 'Courier New',monospace";
    let rLabel=olympicsState.round===1?"SEMIFINAL B":olympicsState.round===2?"SEMIFINAL A":"GRAND FINAL";
    ctx.fillText("OLYMPICS · "+rLabel,20,80);
  }
}

// ─── INIT & LOOP ──────────────────────────────────────────────────────────
randomizeSky();
showTitle();

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
