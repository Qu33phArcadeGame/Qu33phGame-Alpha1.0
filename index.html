<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qu33ph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin:0; overflow:hidden; background:#111; font-family: 'Courier New', monospace; }
    canvas { display:block; touch-action:none; }

    #rotateBtn {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 20px;
      border-radius:10px;
      border:2px solid #444;
      font-size:14px;
      font-family: 'Courier New', monospace;
      background:#1a1a1a;
      color:#ccc;
      letter-spacing:1px;
      display:none;
    }
    #timeline {
      position:absolute;
      top:10px;
      left:10%;
      width:80%;
      height:6px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
      display:none;
    }
    #progress {
      height:100%;
      width:0%;
      background:lime;
      transition: background 0.5s;
    }

    /* TITLE SCREEN */
    #titleScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#0a0a0a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:100;
    }
    .title-logo {
      font-size: clamp(48px, 12vw, 90px);
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #fff;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(255,255,255,0.15);
    }
    .title-sub {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #555;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 60px;
    }
    .mode-btn {
      width: min(340px, 80vw);
      padding: 18px 24px;
      margin: 10px 0;
      border: 1px solid #333;
      background: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: clamp(14px, 3.5vw, 18px);
      letter-spacing: 2px;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .mode-btn:hover, .mode-btn:active {
      background: #1e1e1e;
      border-color: #666;
      color: #fff;
    }
    .mode-icon { font-size: 24px; flex-shrink:0; }
    .mode-text { display:flex; flex-direction:column; gap:4px; }
    .mode-name { font-weight:bold; }
    .mode-desc { font-size: 10px; color: #555; letter-spacing: 1px; }
    .high-score-title {
      margin-top: 48px;
      font-size: 11px;
      color: #333;
      letter-spacing: 3px;
    }

    /* OLYMPICS BRACKET SCREEN */
    #bracketScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#0a0a0a;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding: 20px;
      overflow-y: auto;
      z-index:100;
    }
    .bracket-title {
      font-size: clamp(20px, 5vw, 32px);
      font-family:'Courier New',monospace;
      color:#fff;
      letter-spacing:4px;
      margin-bottom:4px;
      margin-top:10px;
    }
    .bracket-sub {
      font-size:11px;
      color:#444;
      letter-spacing:3px;
      margin-bottom:24px;
    }
    .bracket-round-label {
      font-size:10px;
      color:#555;
      letter-spacing:3px;
      text-transform:uppercase;
      margin-bottom:10px;
      align-self:flex-start;
    }
    .bracket-match {
      width:min(380px,90vw);
      border:1px solid #222;
      border-radius:4px;
      margin-bottom: 12px;
      overflow:hidden;
    }
    .bracket-match.active-match {
      border-color:#fff;
    }
    .bracket-player {
      display:flex;
      align-items:center;
      padding: 12px 16px;
      gap:12px;
      background:#111;
      font-family:'Courier New',monospace;
      font-size:14px;
      color:#aaa;
      border-bottom:1px solid #1a1a1a;
    }
    .bracket-player:last-child { border-bottom:none; }
    .bracket-player.is-you { color:#fff; }
    .bracket-player.winner { color:lime; }
    .bracket-player.loser { color:#333; text-decoration:line-through; }
    .bracket-flag { font-size:20px; }
    .bracket-score { margin-left:auto; font-size:16px; font-weight:bold; color:#666; }
    .bracket-score.is-you { color:#fff; }
    .bracket-score.winner { color:lime; }
    .play-next-btn {
      width:min(380px,90vw);
      padding:16px;
      margin-top:8px;
      background:#fff;
      color:#000;
      font-family:'Courier New',monospace;
      font-size:14px;
      font-weight:bold;
      letter-spacing:2px;
      border:none;
      border-radius:4px;
      cursor:pointer;
      text-align:center;
    }
    .play-next-btn:hover { background:#ddd; }
    .play-next-btn.disabled {
      background:#222;
      color:#444;
      cursor:default;
    }
    .bracket-spacer { height:16px; }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<button id="rotateBtn">Orientation: vertical</button>
<div id="timeline"><div id="progress"></div></div>

<!-- TITLE SCREEN -->
<div id="titleScreen">
  <div class="title-logo">Qu33ph</div>
  <div class="title-sub">arcade edition</div>

  <button class="mode-btn" id="btn1Round" onclick="startMode('single')">
    <span class="mode-icon">🎯</span>
    <span class="mode-text">
      <span class="mode-name">QUICK GAME</span>
      <span class="mode-desc">one round · 45 seconds · go for high score</span>
    </span>
  </button>

  <button class="mode-btn" id="btnOlympics" onclick="startMode('olympics')">
    <span class="mode-icon">🏆</span>
    <span class="mode-text">
      <span class="mode-name">QU33PH OLYMPICS</span>
      <span class="mode-desc">stepladder finals · 3 rounds · 8 nations</span>
    </span>
  </button>

  <div class="high-score-title" id="titleHighScore"></div>
</div>

<!-- OLYMPICS BRACKET SCREEN -->
<div id="bracketScreen" style="display:none; flex-direction:column;">
  <div class="bracket-title">OLYMPICS</div>
  <div class="bracket-sub">QU33PH STEPLADDER FINALS</div>
  <div id="bracketContent"></div>
  <button class="play-next-btn" id="playNextBtn" onclick="playNextMatch()" style="display:none;margin-bottom:30px;">
    PLAY YOUR MATCH →
  </button>
</div>

<script>
// ─── IMAGES ───────────────────────────────────────────────────────────────
const markerImages = { red:new Image(), green:new Image(), blue:new Image() };
markerImages.red.src="red.png";
markerImages.green.src="green.png";
markerImages.blue.src="blue.png";

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// ─── LAYOUT ───────────────────────────────────────────────────────────────
const LEFT_EDGE=canvas.width*0.2;
const RIGHT_WALL=canvas.width*0.75;
const END_LINE_Y=canvas.height*0.2;
const START_LINE_Y=canvas.height-80;

const redDot={x:RIGHT_WALL+10,y:END_LINE_Y+40};
const chair={x:(LEFT_EDGE+RIGHT_WALL)/2,y:END_LINE_Y+90,radius:35};

// ─── GAME MODE STATE ──────────────────────────────────────────────────────
let gameMode = null; // 'single' | 'olympics'
let olympicsState = null;

// ─── NATIONS / STEPLADDER ─────────────────────────────────────────────────
const NATIONS = [
  { name:"Ireland",      flag:"🇮🇪" },
  { name:"Israel",       flag:"🇮🇱" },
  { name:"USA",          flag:"🇺🇸" },
  { name:"South Africa", flag:"🇿🇦" },
  { name:"England",      flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { name:"Scotland",     flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  { name:"Norway",       flag:"🇳🇴" },
  { name:"Japan",        flag:"🇯🇵" },
];

const PLAYER_NATION = { name:"You", flag:"🎮", isPlayer:true };

// Stepladder format:
//   Round 1 (Semifinal B):  seed 3 vs seed 4  → winner goes to Round 2
//   Round 2 (Semifinal A):  seed 2 vs Round1 winner
//   Round 3 (Final):        seed 1 vs Round2 winner
// The other 5 nations get simulated scores shown as "previous results"

function buildOlympicsState(){
  // shuffle non-player nations, pick 7 opponents
  let pool = [...NATIONS];
  shuffle(pool);
  // seeds 1-4 are the finalists; rest are shown as knocked-out earlier
  // seed 4 = you (player always starts in the earliest match)
  let seed1 = pool[0];
  let seed2 = pool[1];
  let seed3 = pool[2];
  // seed 4 = player
  let eliminated = pool.slice(3); // remaining 4 as background results

  return {
    seed1, seed2, seed3,
    seed4: PLAYER_NATION,
    eliminated,
    round: 1, // which round the player is about to play (1,2,3)
    r1Score: null,      // player score in round 1
    r1OppScore: null,
    r2Score: null,
    r2OppScore: null,
    r3Score: null,
    r3OppScore: null,
    playerEliminated: false,
    champion: null,
  };
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function simulatedScore(){
  // random realistic qu33ph score
  return Math.floor(Math.random()*18)+2;
}

// ─── GAME STATE ────────────────────────────────────────────────────────────
let speedMultiplier=1;
let gameState="title"; // "title"|"playing"|"end"|"bracket"
let markers=[];
let current=0;
let totalScore=0;
let highScore=localStorage.getItem("qu33phHigh")||0;
let chairLocked=false;
let startTime=Date.now();
let suddenDeath=false;
let explosions=[];
let scorePopups=[];
let previewMarkers=[
  {color:"green",x:0,used:false},
  {color:"red",x:0,used:false},
  {color:"blue",x:0,used:false}
];
let shake=0;

const ROUND_TIME=30;
const TOTAL_TIME=45;

const orientations=["vertical","angled","horizontal"];
let orientationIndex=0;
let currentOrientation="vertical";

// ─── TITLE SCREEN ─────────────────────────────────────────────────────────
function showTitle(){
  gameState="title";
  document.getElementById("titleScreen").style.display="flex";
  document.getElementById("bracketScreen").style.display="none";
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";
  let hs=localStorage.getItem("qu33phHigh")||0;
  document.getElementById("titleHighScore").innerText=
    hs>0?"HIGH SCORE: "+hs:"";
}

function startMode(mode){
  gameMode=mode;
  document.getElementById("titleScreen").style.display="none";

  if(mode==="single"){
    startGame();
  } else {
    olympicsState=buildOlympicsState();
    showBracket();
  }
}

// ─── BRACKET SCREEN ────────────────────────────────────────────────────────
function showBracket(){
  gameState="bracket";
  document.getElementById("bracketScreen").style.display="flex";
  document.getElementById("bracketScreen").style.flexDirection="column";
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";
  renderBracket();
}

function renderBracket(){
  const os=olympicsState;
  const content=document.getElementById("bracketContent");
  const playBtn=document.getElementById("playNextBtn");
  let html="";

  // ── Background results (eliminated nations) ──
  html+=`<div class="bracket-round-label">PRELIMINARY RESULTS</div>`;
  html+=`<div class="bracket-match">`;
  os.eliminated.forEach((n,i)=>{
    let sc=simulatedScore();
    html+=`<div class="bracket-player loser">`+
      `<span class="bracket-flag">${n.flag}</span>`+
      `<span>${n.name}</span>`+
      `<span class="bracket-score">${sc}</span></div>`;
  });
  html+=`</div>`;

  html+=`<div class="bracket-spacer"></div>`;

  // ── Stepladder Round 1: seed3 vs seed4(player) ──
  html+=`<div class="bracket-round-label">SEMIFINAL B</div>`;
  let r1Active = os.round===1;
  let r1Class = r1Active?"bracket-match active-match":"bracket-match";

  let r1p1Class="bracket-player";
  let r1p2Class="bracket-player is-you";
  let r1s1="", r1s2="";

  if(os.r1Score!==null){
    let playerWon=os.r1Score>os.r1OppScore;
    r1p1Class="bracket-player "+(playerWon?"loser":"winner");
    r1p2Class="bracket-player is-you "+(playerWon?"winner":"loser");
    r1s1=os.r1OppScore;
    r1s2=os.r1Score;
  }

  html+=`<div class="${r1Class}">
    <div class="${r1p1Class}">
      <span class="bracket-flag">${os.seed3.flag}</span>
      <span>${os.seed3.name}</span>
      <span class="bracket-score ${r1s1===Math.max(r1s1,r1s2)&&r1s1!=""?"winner":""}">${r1s1}</span>
    </div>
    <div class="${r1p2Class}">
      <span class="bracket-flag">${os.seed4.flag}</span>
      <span>${os.seed4.name}</span>
      <span class="bracket-score is-you ${r1s2===Math.max(r1s1,r1s2)&&r1s2!=""?"winner":""}">${r1s2}</span>
    </div>
  </div>`;

  html+=`<div class="bracket-spacer"></div>`;

  // ── Stepladder Round 2: seed2 vs R1 winner ──
  html+=`<div class="bracket-round-label">SEMIFINAL A</div>`;
  let r2Active=os.round===2;
  let r2Class=r2Active?"bracket-match active-match":"bracket-match";
  let r2WinnerName="R1 Winner";
  let r2WinnerFlag="❓";

  if(os.r1Score!==null){
    let playerWonR1=os.r1Score>os.r1OppScore;
    r2WinnerName=playerWonR1?os.seed4.name:os.seed3.name;
    r2WinnerFlag=playerWonR1?os.seed4.flag:os.seed3.flag;
  }

  let r2p1Class="bracket-player";
  let r2p2Class=os.r1Score!==null&&os.r1Score>os.r1OppScore?"bracket-player is-you":"bracket-player";
  let r2s1="", r2s2="";

  if(os.r2Score!==null){
    let playerWon=os.r2Score>os.r2OppScore;
    r2p1Class="bracket-player "+(playerWon?"loser":"winner");
    r2p2Class="bracket-player is-you "+(playerWon?"winner":"loser");
    r2s1=os.r2OppScore;
    r2s2=os.r2Score;
  } else if(os.playerEliminated && os.round>2){
    r2p1Class="bracket-player winner";
    r2s1="?"; r2s2="?";
  }

  html+=`<div class="${r2Class}">
    <div class="${r2p1Class}">
      <span class="bracket-flag">${os.seed2.flag}</span>
      <span>${os.seed2.name}</span>
      <span class="bracket-score">${r2s1}</span>
    </div>
    <div class="${r2p2Class}">
      <span class="bracket-flag">${r2WinnerFlag}</span>
      <span>${r2WinnerName}</span>
      <span class="bracket-score">${r2s2}</span>
    </div>
  </div>`;

  html+=`<div class="bracket-spacer"></div>`;

  // ── Grand Final: seed1 vs R2 winner ──
  html+=`<div class="bracket-round-label">GRAND FINAL</div>`;
  let r3Active=os.round===3&&!os.playerEliminated;
  let r3Class=r3Active?"bracket-match active-match":"bracket-match";
  let r3WinnerName="R2 Winner";
  let r3WinnerFlag="❓";

  if(os.r2Score!==null){
    let playerWonR2=os.r2Score>os.r2OppScore;
    r3WinnerName=playerWonR2?os.seed4.name:(os.r1Score>os.r1OppScore?os.seed4.name:os.seed3.name);
    r3WinnerFlag=playerWonR2?os.seed4.flag:(os.r1Score>os.r1OppScore?os.seed4.flag:os.seed3.flag);
    if(!playerWonR2){
      r3WinnerName=os.seed2.name;
      r3WinnerFlag=os.seed2.flag;
    }
  }

  let r3p1Class="bracket-player";
  let r3p2Class=os.r2Score!==null&&os.r2Score>os.r2OppScore?"bracket-player is-you":"bracket-player";
  let r3s1="", r3s2="";

  if(os.champion!==null){
    r3s1=os.r3OppScore;
    r3s2=os.r3Score;
    let playerWon=os.r3Score>os.r3OppScore;
    r3p1Class="bracket-player "+(playerWon?"loser":"winner");
    r3p2Class="bracket-player is-you "+(playerWon?"winner":"loser");
  }

  html+=`<div class="${r3Class}">
    <div class="${r3p1Class}">
      <span class="bracket-flag">${os.seed1.flag}</span>
      <span>${os.seed1.name}</span>
      <span class="bracket-score">${r3s1}</span>
    </div>
    <div class="${r3p2Class}">
      <span class="bracket-flag">${r3WinnerFlag}</span>
      <span>${r3WinnerName}</span>
      <span class="bracket-score">${r3s2}</span>
    </div>
  </div>`;

  content.innerHTML=html;

  // Play button logic
  if(os.playerEliminated){
    playBtn.style.display="block";
    playBtn.className="play-next-btn disabled";
    playBtn.innerText="ELIMINATED — SEE RESULTS";
    playBtn.onclick=()=>showFinalResult();
  } else if(os.champion!==null){
    playBtn.style.display="block";
    playBtn.className="play-next-btn";
    playBtn.innerText="SEE FINAL RESULT";
    playBtn.onclick=()=>showFinalResult();
  } else {
    playBtn.style.display="block";
    playBtn.className="play-next-btn";
    let lbl=os.round===1?"PLAY SEMIFINAL B →":os.round===2?"PLAY SEMIFINAL A →":"PLAY GRAND FINAL →";
    playBtn.innerText=lbl;
    playBtn.onclick=()=>playNextMatch();
  }
}

function showFinalResult(){
  const os=olympicsState;
  let won=os.champion==="player";
  document.getElementById("bracketScreen").style.display="none";

  // go to game end screen but override message
  gameState="olympicsResult";
  olympicsResultMsg = won?
    "🏆 QU33PH OLYMPIC CHAMPION! 🏆":
    "ELIMINATED — BETTER LUCK NEXT TIME";
  olympicsResultSub = won?"":
    (os.playerEliminated?"You were knocked out in "+(os.round===2?"Semifinal B":"Semifinal A"):"You made the final!");
}

let olympicsResultMsg="";
let olympicsResultSub="";

function playNextMatch(){
  document.getElementById("bracketScreen").style.display="none";
  startGame();
}

// ─── GAME START ────────────────────────────────────────────────────────────
function startGame(){
  markers=[];
  current=0;
  totalScore=0;
  startTime=Date.now();
  suddenDeath=false;
  chairLocked=false;
  explosions=[];
  scorePopups=[];
  previewMarkers=[
    {color:"green",x:0,used:false},
    {color:"red",x:0,used:false},
    {color:"blue",x:0,used:false}
  ];
  shake=0;
  orientationIndex=0;
  currentOrientation="vertical";
  document.getElementById("rotateBtn").style.display="block";
  document.getElementById("rotateBtn").innerText="Orientation: vertical";
  document.getElementById("timeline").style.display="block";
  document.getElementById("progress").style.width="0%";
  document.getElementById("progress").style.background="lime";
  randomizeSky();
  gameState="playing";
}

// ─── ORIENTATION BTN ──────────────────────────────────────────────────────
document.getElementById("rotateBtn").onclick=()=>{
  orientationIndex=(orientationIndex+1)%orientations.length;
  currentOrientation=orientations[orientationIndex];
  document.getElementById("rotateBtn").innerText="Orientation: "+currentOrientation;
};

// ─── INPUT ────────────────────────────────────────────────────────────────
let dragging=false,startX,startY,currentX,currentY;
const colors=["green","red","blue"];
const lengths=[60,60,90];

canvas.addEventListener("pointerdown",e=>{
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"||gameState==="olympicsResult"){
    if(gameMode==="single"){
      showTitle();
    } else {
      // olympics: go back to bracket or result
      showTitle();
    }
    return;
  }

  if(gameState!=="playing") return;

  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    tryAdvanceRound();
    return;
  }

  if(current>=3 && markers.length===0) return;

  dragging=true;
  startX=e.clientX;
  startY=e.clientY;
  currentX=startX;
  currentY=startY;
});

canvas.addEventListener("pointermove",e=>{
  if(!dragging) return;
  currentX=e.clientX;
  currentY=e.clientY;
});

canvas.addEventListener("pointerup",()=>{
  if(!dragging) return;
  dragging=false;

  if(gameState!=="playing") return;
  if(current>=3) return;

  let dx=currentX-startX;
  let dy=currentY-startY;

  let baseRot=
    currentOrientation==="vertical"?0:
    currentOrientation==="angled"?Math.PI/6:
    Math.PI/2;

  markers.push({
    x:canvas.width/2,
    y:canvas.height-50,
    usedPreview:current,
    vx:dx*0.2,
    vy:dy*0.2,
    curve:dx*0.0003,
    angleType:currentOrientation,
    color:colors[current],
    length:lengths[current],
    stopped:false,
    fallen:false,
    trail:[],
    rotation:baseRot,
    spinVelocity:
      currentOrientation==="vertical"?0.08:
      currentOrientation==="angled"?0.12:0.18,
    chairBoost:false,
    megaTriggered:false,
    armed:false,
    life:0,
  });

  current++;
  previewMarkers[current-1].used=true;
});

// ─── HELPERS ──────────────────────────────────────────────────────────────
function touching(a,b){ return Math.hypot(a.x-b.x,a.y-b.y)<45; }
function isTouchingAny(m){ return markers.some(n=>n!==m&&!n.fallen&&touching(m,n)); }
function touchingChair(m){ return Math.hypot(m.x-chair.x,m.y-chair.y)<chair.radius; }
function addShake(amount){ shake=Math.max(shake,amount); }

function triggerMegaQu33ph(m){
  m.x=redDot.x; m.y=redDot.y;
  m.vx=0; m.vy=0; m.stopped=true;
  totalScore+=10;
  addShake(20);
  explosions.push({x:redDot.x,y:redDot.y,radius:10,life:30,text:"MEGA QU33PH",mega:true});
}

// ─── ROUND SYSTEM ─────────────────────────────────────────────────────────
function tryAdvanceRound(){
  if(gameState!=="playing") return;
  if(current===3 && markers.every(m=>m.stopped||m.fallen)){
    let g=markers[0], r=markers[1], b=markers[2];
    let roundScore=calculateScore();
    totalScore+=roundScore;
    scorePopups.push({x:canvas.width/2,y:canvas.height/2,text:"+"+roundScore,life:40});
    if(g&&r&&b&&touching(g,r)&&touching(r,b)&&touching(g,b)){
      explosions.push({x:(g.x+r.x+b.x)/3,y:(g.y+r.y+b.y)/3,radius:10,life:20,text:"QU33PH"});
      addShake(8);
    }
    markers=[];
    current=0;
    previewMarkers=[
      {color:"green",x:0,used:false},
      {color:"red",x:0,used:false},
      {color:"blue",x:0,used:false}
    ];
  }
}

function calculateScore(){
  if(markers.length<3) return 0;
  let g=markers[0],r=markers[1],b=markers[2];
  if(!g||!r||!b) return 0;
  if(!(g.armed&&r.armed&&b.armed)) return 0;
  let gr=touching(g,r), rb=touching(r,b), gb=touching(g,b);
  if(suddenDeath){
    if(gr&&rb&&gb) return 10;
    if(rb) return 5;
    if(gb) return 5;
    if(gr) return 3;
    return 0;
  } else {
    if(gr&&rb&&gb) return 3;
    if(rb) return 2;
    if(gb) return 2;
    if(gr) return 0.5;
    return 0;
  }
}

// ─── SKY ──────────────────────────────────────────────────────────────────
// Window panel is the vertical strip from RIGHT_WALL to screen right edge.
// Sky goes top to bottom inside that strip.
let clouds=[];
let trees=[];

function randomizeSky(){
  let wx = RIGHT_WALL + 5;
  let ww = canvas.width - wx;

  clouds=[];
  for(let i=0;i<5;i++){
    clouds.push({
      // y position inside window (top portion = sky)
      x: wx + Math.random()*ww,
      y: Math.random() * canvas.height * 0.45,
      w: 30 + Math.random()*50,
      speed: 0.05 + Math.random()*0.08
    });
  }

  trees=[];
  for(let i=0;i<8;i++){
    trees.push({
      x: wx + Math.random()*ww,
      h: canvas.height * (0.07 + Math.random()*0.09)
    });
  }
}

function lerpRGB(a,b,t){
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t)
  ];
}

function drawWindowScene(elapsed){
  let t = Math.min(elapsed/TOTAL_TIME, 1);
  let wx = RIGHT_WALL + 5;
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // ── sky gradient (day → golden → dusk red in sudden death) ──
  let skyTop, skyBot;
  if(t < 0.66){
    let d = t/0.66;
    skyTop = lerpRGB([82,148,210],[210,130,50],d);
    skyBot = lerpRGB([140,195,235],[240,180,80],d);
  } else {
    let d = (t-0.66)/0.34;
    skyTop = lerpRGB([210,130,50],[15,8,35],d);
    skyBot = lerpRGB([240,180,80],[160,45,20],d);
  }
  let grad = ctx.createLinearGradient(0,0,0,wh*0.62);
  grad.addColorStop(0, `rgb(${skyTop})`);
  grad.addColorStop(1, `rgb(${skyBot})`);
  ctx.fillStyle = grad;
  ctx.fillRect(wx, 0, ww, wh*0.62);

  // ── ground / greenery (bottom portion of window) ──
  let groundY = wh * 0.55;
  let groundColor = t<0.66
    ? lerpRGB([55,105,45],[30,60,25],t/0.66)
    : lerpRGB([30,60,25],[12,22,10],(t-0.66)/0.34);
  ctx.fillStyle=`rgb(${groundColor})`;
  ctx.fillRect(wx, groundY, ww, wh - groundY);

  // ground-sky blend strip
  let blendGrad = ctx.createLinearGradient(0, groundY-20, 0, groundY+30);
  blendGrad.addColorStop(0, `rgba(${skyBot},0)`);
  blendGrad.addColorStop(1, `rgba(${groundColor},1)`);
  ctx.fillStyle = blendGrad;
  ctx.fillRect(wx, groundY-20, ww, 50);

  // ── sun / moon ──
  let sunY = wh * (0.08 + t*0.28);
  let sunX = wx + ww*0.7;
  let sunR = t<0.66 ? 14 : 11;
  let sunCol = t<0.66
    ? `rgba(255,245,170,0.95)`
    : `rgba(215,70,30,0.9)`;
  // glow
  let glowR = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*4);
  glowR.addColorStop(0, t<0.66?`rgba(255,240,120,0.3)`:`rgba(200,50,10,0.35)`);
  glowR.addColorStop(1,`rgba(0,0,0,0)`);
  ctx.fillStyle=glowR;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR*4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=sunCol;
  ctx.beginPath(); ctx.arc(sunX,sunY,sunR,0,Math.PI*2); ctx.fill();

  // ── trees ──
  let treeCol = t<0.66 ? `rgba(28,65,22,0.88)` : `rgba(10,18,8,0.92)`;
  trees.forEach(tr=>{
    let ty = groundY - tr.h*0.5;
    let tw = tr.h*0.45;
    ctx.fillStyle=treeCol;
    // trunk
    ctx.fillRect(tr.x - tw*0.07, ty+tr.h*0.45, tw*0.14, tr.h*0.55);
    // canopy blob
    ctx.beginPath();
    ctx.ellipse(tr.x, ty+tr.h*0.25, tw*0.45, tr.h*0.5, 0,0,Math.PI*2);
    ctx.fill();
  });

  // ── railing (like photo — metal bar + balusters) ──
  let railY = groundY + (wh-groundY)*0.08;
  let railColor = t<0.66 ? `rgba(15,25,15,0.75)` : `rgba(8,8,8,0.85)`;
  ctx.strokeStyle=railColor; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(wx,railY); ctx.lineTo(canvas.width,railY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx,railY+18); ctx.lineTo(canvas.width,railY+18); ctx.stroke();
  ctx.lineWidth=1.5;
  for(let bx=wx+4; bx<canvas.width; bx+=14){
    ctx.beginPath(); ctx.moveTo(bx,railY-8); ctx.lineTo(bx,railY+22); ctx.stroke();
  }

  // ── clouds (drift slowly) ──
  let cloudCol = t<0.66
    ? `rgba(255,255,255,${0.75-(t/0.66)*0.25})`
    : `rgba(190,110,70,${0.4-(t-0.66)/0.34*0.3})`;
  clouds.forEach(c=>{
    ctx.fillStyle=cloudCol;
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w*0.5, c.w*0.2, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.22, c.y+c.w*0.05, c.w*0.3, c.w*0.16, 0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.22, c.y+c.w*0.03, c.w*0.28, c.w*0.14, 0,0,Math.PI*2); ctx.fill();
    // drift
    c.x += c.speed;
    if(c.x - c.w > canvas.width) c.x = wx - c.w;
  });
}

function drawWindowFrame(){
  let wx = RIGHT_WALL;
  let ww = canvas.width - wx;
  let wh = canvas.height;

  // ── roller blind (top ~8%) ──
  let blindH = wh * 0.08;
  let blindGrad = ctx.createLinearGradient(0,0,0,blindH);
  blindGrad.addColorStop(0,"#d5cfc6");
  blindGrad.addColorStop(1,"#bfb9b0");
  ctx.fillStyle=blindGrad;
  ctx.fillRect(wx+5, 0, ww-5, blindH);
  // slats
  ctx.strokeStyle="rgba(150,144,136,0.4)"; ctx.lineWidth=1;
  for(let sy=5;sy<blindH;sy+=6){
    ctx.beginPath(); ctx.moveTo(wx+5,sy); ctx.lineTo(canvas.width,sy); ctx.stroke();
  }
  // blind bottom bar
  ctx.fillStyle="#a8a29a";
  ctx.fillRect(wx+5, blindH-3, ww-5, 5);

  // ── window frame (dark metal, like photo) ──
  let frameColor="#181818";

  // outer left frame strip (windowsill/frame meets counter)
  ctx.fillStyle=frameColor;
  ctx.fillRect(wx, 0, 10, wh);

  // top frame bar (below blind)
  ctx.fillRect(wx+5, blindH, ww-5, 9);

  // bottom sill (where window meets counter top line)
  ctx.fillStyle="#222";
  ctx.fillRect(wx+5, END_LINE_Y-6, ww-5, 10);

  // vertical mullions (2 columns like photo)
  ctx.fillStyle=frameColor;
  let col1 = wx + ww*0.38;
  let col2 = wx + ww*0.72;
  ctx.fillRect(col1-4, blindH, 8, END_LINE_Y - blindH);
  ctx.fillRect(col2-4, blindH, 8, END_LINE_Y - blindH);

  // horizontal mid-rail
  ctx.fillRect(wx+5, blindH + (END_LINE_Y-blindH)*0.52, ww-5, 7);

  // white window sill ledge
  let sillGrad=ctx.createLinearGradient(0,END_LINE_Y,0,END_LINE_Y+18);
  sillGrad.addColorStop(0,"#e8e4de");
  sillGrad.addColorStop(1,"#c8c4bc");
  ctx.fillStyle=sillGrad;
  ctx.fillRect(wx, END_LINE_Y+4, ww, 16);
  ctx.fillStyle="#f0ece6";
  ctx.fillRect(wx, END_LINE_Y+4, ww, 2);
}

// ─── UPDATE ───────────────────────────────────────────────────────────────
function update(){
  if(gameState!=="playing") return;

  if(shake>0){ shake*=0.9; if(shake<0.05) shake=0; }

  let elapsed=(Date.now()-startTime)/1000;

  if(elapsed>ROUND_TIME&&elapsed<=TOTAL_TIME){ suddenDeath=true; }
  if(!chairLocked&&suddenDeath){ chairLocked=true; chair.x=(LEFT_EDGE+RIGHT_WALL)/2; chair.y=END_LINE_Y+90; }
  if(elapsed>TOTAL_TIME){ endGame(); return; }

  markers.forEach(m=>{
    if(m.stopped||m.fallen) return;
    m.life+=1/60;
    if(m.life>=1){ m.stopped=true; m.vx=0; m.vy=0; }
    m.vx+=m.curve;
    m.x+=m.vx*speedMultiplier;
    m.y+=m.vy*speedMultiplier;
    if(!m.armed&&m.y<START_LINE_Y) m.armed=true;
    m.vx*=0.94; m.vy*=0.94;
    m.rotation+=m.spinVelocity*speedMultiplier;
    m.spinVelocity*=0.96;
    if(suddenDeath&&!m.megaTriggered&&touchingChair(m)){
      if(Math.random()<0.25) triggerMegaQu33ph(m);
      m.megaTriggered=true;
    }
    m.trail.push({x:m.x,y:m.y});
    if(m.trail.length>20) m.trail.shift();
    if(m.x<LEFT_EDGE) m.fallen=true;
    if(m.x>RIGHT_WALL){ m.x=RIGHT_WALL; m.vx*=-0.4; }
    if(m.y<END_LINE_Y){ m.y=END_LINE_Y; m.vy*=-0.2; }
    if(Math.abs(m.vx)<0.05&&Math.abs(m.vy)<0.05) m.stopped=true;

    let progress=Math.min(elapsed/TOTAL_TIME,1);
    document.getElementById("progress").style.width=(progress*100)+"%";
    if(elapsed>ROUND_TIME) document.getElementById("progress").style.background="red";
  });

  explosions.forEach(e=>{ e.radius+=e.mega?6:4; e.life--; });
  explosions=explosions.filter(e=>e.life>0);
  scorePopups.forEach(p=>{ p.y-=1; p.life--; });
  scorePopups=scorePopups.filter(p=>p.life>0);

  if(current===3&&markers.every(m=>m.stopped||m.fallen)) tryAdvanceRound();
}

// ─── END GAME ─────────────────────────────────────────────────────────────
function endGame(){
  shake=0;
  if(totalScore>highScore){
    highScore=totalScore;
    localStorage.setItem("qu33phHigh",highScore);
  }
  document.getElementById("rotateBtn").style.display="none";
  document.getElementById("timeline").style.display="none";

  if(gameMode==="olympics"){
    // record result in olympics state
    const os=olympicsState;
    let oppScore=simulatedScore();

    if(os.round===1){
      os.r1Score=totalScore;
      os.r1OppScore=oppScore;
      if(totalScore<=oppScore){
        os.playerEliminated=true;
      }
      os.round=2;
    } else if(os.round===2){
      os.r2Score=totalScore;
      os.r2OppScore=oppScore;
      if(totalScore<=oppScore){
        os.playerEliminated=true;
      }
      os.round=3;
    } else if(os.round===3){
      os.r3Score=totalScore;
      os.r3OppScore=oppScore;
      os.champion=totalScore>oppScore?"player":"cpu";
    }

    gameState="end"; // temp, will go to bracket
    showBracket();
    return;
  }

  gameState="end";
}

// ─── DRAW MARKER ──────────────────────────────────────────────────────────
function drawMarker(m){
  if(m.trail&&m.trail.length>1){
    let tw=m.color==="red"?3:m.color==="green"?4:6;
    ctx.beginPath();
    ctx.moveTo(m.trail[0].x,m.trail[0].y);
    for(let i=1;i<m.trail.length;i++) ctx.lineTo(m.trail[i].x,m.trail[i].y);
    ctx.strokeStyle=m.color;
    ctx.lineWidth=tw;
    ctx.globalAlpha=0.6;
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  const img=markerImages[m.color];
  if(!img||!img.complete) return;
  ctx.save();
  ctx.translate(m.x,m.y);
  ctx.rotate(m.rotation);
  let w=50,h=50;
  if(m.color==="blue"){w=80;h=50;}
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.restore();
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw(){
  if(gameState==="title"||gameState==="bracket") return;

  if(gameState==="end"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="top";
    ctx.fillStyle="#fff";
    ctx.font="bold 60px 'Courier New',monospace";
    ctx.fillText("Qu33ph",canvas.width/2,130);
    ctx.font="22px 'Courier New',monospace";
    ctx.fillStyle="#aaa";
    ctx.fillText("SCORE: "+totalScore,canvas.width/2,210);
    ctx.fillStyle="#555";
    ctx.fillText("HIGH SCORE: "+highScore,canvas.width/2,244);
    ctx.fillStyle="#333";
    ctx.font="16px 'Courier New',monospace";
    ctx.fillText("tap anywhere to return to menu",canvas.width/2,310);
    return;
  }

  if(gameState==="olympicsResult"){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(1,0,0,1,0,0);
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillStyle="#fff";
    ctx.font="bold 28px 'Courier New',monospace";
    ctx.fillText(olympicsResultMsg,canvas.width/2,canvas.height/2-30);
    if(olympicsResultSub){
      ctx.fillStyle="#555";
      ctx.font="16px 'Courier New',monospace";
      ctx.fillText(olympicsResultSub,canvas.width/2,canvas.height/2+20);
    }
    ctx.fillStyle="#333";
    ctx.font="14px 'Courier New',monospace";
    ctx.fillText("tap to return to menu",canvas.width/2,canvas.height/2+70);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  let elapsed=(Date.now()-startTime)/1000;
  let shakeX=(Math.random()-0.5)*shake;
  let shakeY=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // ── 1. COUNTER BACKGROUND (dark area left of window) ──
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── 2. WINDOW SCENE (right strip) ──
  drawWindowScene(elapsed);
  drawWindowFrame();

  // ── 3. COUNTER SURFACE (perspective 3D) ──
  // The counter is the playfield: LEFT_EDGE → RIGHT_WALL, top→bottom.
  // 3D trick: taper the top edge inward slightly (far end narrower).
  let taper = canvas.width * 0.03; // how much narrower at top
  let cLeft  = LEFT_EDGE;
  let cRight = RIGHT_WALL;
  let cTop   = END_LINE_Y;
  let cBot   = canvas.height;

  // Counter surface trapezoid (slightly tapered at top = depth illusion)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cLeft + taper, cTop);
  ctx.lineTo(cRight - taper, cTop);
  ctx.lineTo(cRight, cBot);
  ctx.lineTo(cLeft, cBot);
  ctx.closePath();

  // Dark slate laminate — lighter near player (bottom), darker far end (top)
  let surfGrad = ctx.createLinearGradient(0, cTop, 0, cBot);
  surfGrad.addColorStop(0, "#1e1c1b");   // far/top — darker
  surfGrad.addColorStop(0.4, "#28251f"); 
  surfGrad.addColorStop(1, "#2e2b27");   // near/bottom — slightly lighter
  ctx.fillStyle = surfGrad;
  ctx.fill();

  // Subtle specular sheen stripe down the middle
  let sheenGrad = ctx.createLinearGradient((cLeft+cRight)/2 - 60, 0, (cLeft+cRight)/2 + 60, 0);
  sheenGrad.addColorStop(0,"rgba(255,255,255,0)");
  sheenGrad.addColorStop(0.5,"rgba(255,255,255,0.03)");
  sheenGrad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=sheenGrad;
  ctx.fill();

  // Panel seam (longitudinal crack like the photo)
  ctx.strokeStyle="rgba(0,0,0,0.5)"; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo((cLeft+cRight)/2 - taper*0.5, cTop);
  ctx.lineTo((cLeft+cRight)/2, cBot);
  ctx.stroke();

  ctx.restore();

  // ── 4. AC VENT (start line — horizontal grill near bottom) ──
  let ventTop = START_LINE_Y - 14;
  let ventBot = START_LINE_Y + 14;

  // Vent housing — dark metal
  let ventGrad = ctx.createLinearGradient(0,ventTop,0,ventBot);
  ventGrad.addColorStop(0,"#161310");
  ventGrad.addColorStop(0.5,"#221e18");
  ventGrad.addColorStop(1,"#0e0c0a");
  ctx.fillStyle=ventGrad;
  ctx.fillRect(cLeft, ventTop, cRight-cLeft, ventBot-ventTop);

  // Slat lines across vent
  ctx.strokeStyle="rgba(0,0,0,0.7)"; ctx.lineWidth=1.2;
  let slats=6;
  for(let si=1;si<slats;si++){
    let sy = ventTop + (si/slats)*(ventBot-ventTop);
    ctx.beginPath(); ctx.moveTo(cLeft,sy); ctx.lineTo(cRight,sy); ctx.stroke();
  }
  // Slat highlight (top edge of each slat catches light)
  ctx.strokeStyle="rgba(70,60,50,0.35)"; ctx.lineWidth=1;
  for(let si=1;si<slats;si++){
    let sy = ventTop + (si/slats)*(ventBot-ventTop) - 1;
    ctx.beginPath(); ctx.moveTo(cLeft,sy); ctx.lineTo(cRight,sy); ctx.stroke();
  }
  // Metal trim edges
  ctx.strokeStyle="#4a4440"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cLeft,ventTop); ctx.lineTo(cRight,ventTop); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cLeft,ventBot); ctx.lineTo(cRight,ventBot); ctx.stroke();

  // ── 5. COUNTER FRONT EDGE (aluminium trim at very bottom) ──
  let edgeGrad = ctx.createLinearGradient(0, canvas.height-22, 0, canvas.height);
  edgeGrad.addColorStop(0,"#888880");
  edgeGrad.addColorStop(0.35,"#b0b0a8");
  edgeGrad.addColorStop(0.7,"#686860");
  edgeGrad.addColorStop(1,"#303030");
  ctx.fillStyle=edgeGrad;
  ctx.fillRect(0, canvas.height-22, RIGHT_WALL, 22);

  // ── 6. LEFT WALL (dark, off-playfield) ──
  ctx.fillStyle="#1a1a1a";
  ctx.fillRect(0, 0, LEFT_EDGE, canvas.height);
  // subtle wall/counter join shadow
  ctx.fillStyle="rgba(0,0,0,0.4)";
  ctx.fillRect(LEFT_EDGE-8, cTop, 8, cBot-cTop);

  // ── 7. RED DOT (on windowsill) ──
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(redDot.x, redDot.y, 10, 0, Math.PI*2);
  ctx.fill();

  // ── 8. TOP LINE (end line — far end of counter) ──
  ctx.fillStyle="rgba(255,255,255,0.75)";
  ctx.fillRect(LEFT_EDGE, END_LINE_Y, RIGHT_WALL-LEFT_EDGE, 3);

  // ADVANCE PROMPT
  if(current===3&&markers.every(m=>m.stopped||m.fallen)){
    ctx.fillStyle="white";
    ctx.font="bold 24px 'Courier New',monospace";
    ctx.textAlign="center";
    ctx.textBaseline="bottom";
    ctx.fillText("tap anywhere on field to advance",(LEFT_EDGE+RIGHT_WALL)/2,END_LINE_Y-20);
  }

  ctx.restore();

  // CHAIR
  if(suddenDeath){
    ctx.save();
    ctx.setTransform(1,0,0,1,0,0);
    ctx.translate(chair.x,chair.y);
    ctx.rotate(Math.PI);
    ctx.font="30px Arial";
    ctx.fillText("🪑",-15,10);
    ctx.restore();
  }

  // EXPLOSIONS
  explosions.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.globalAlpha=e.life/30;
    ctx.stroke();
    ctx.globalAlpha=e.life/30;
    ctx.fillStyle="white";
    ctx.font=e.mega?"bold 50px Arial":"bold 60px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(e.text||"QU33PH",e.x,e.y);
    ctx.globalAlpha=1;
  });

  // SCORE POPUPS
  scorePopups.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life/40;
    ctx.fillStyle="white";
    ctx.font="bold 30px 'Courier New',monospace";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(p.text,p.x,p.y);
    ctx.restore();
  });

  // PREVIEW MARKERS
  previewMarkers.forEach((p,i)=>{
    if(p.used) return;
    const img=markerImages[p.color];
    if(!img||!img.complete) return;
    let x=(LEFT_EDGE+RIGHT_WALL)/2;
    let y=START_LINE_Y-60-i*60;
    ctx.globalAlpha=0.5;
    ctx.drawImage(img,x-25,y-25,50,50);
    ctx.globalAlpha=1;
  });

  // MARKERS
  markers.forEach(m=>{
    if(m.fallen) return;
    ctx.shadowColor=isTouchingAny(m)?"lime":"red";
    ctx.shadowBlur=20;
    drawMarker(m);
    ctx.shadowBlur=0;
  });

  // UI TEXT
  ctx.setTransform(1,0,0,1,0,0);
  ctx.textAlign="left";
  ctx.textBaseline="top";
  ctx.fillStyle="white";
  ctx.font="20px 'Courier New',monospace";
  if(!suddenDeath){
    ctx.fillText("Time: "+Math.max(0,ROUND_TIME-Math.floor(elapsed)),20,20);
  } else {
    ctx.fillStyle="red";
    ctx.fillText("SUDDEN DEATH: "+Math.max(0,TOTAL_TIME-Math.floor(elapsed)),20,20);
  }
  ctx.fillStyle="white";
  ctx.fillText("Score: "+totalScore,20,50);

  // Olympics mode: show round indicator
  if(gameMode==="olympics"&&olympicsState){
    ctx.fillStyle="#555";
    ctx.font="13px 'Courier New',monospace";
    let rLabel=olympicsState.round===1?"SEMIFINAL B":olympicsState.round===2?"SEMIFINAL A":"GRAND FINAL";
    ctx.fillText("OLYMPICS · "+rLabel,20,80);
  }
}

// ─── INIT & LOOP ──────────────────────────────────────────────────────────
randomizeSky();
showTitle();

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
