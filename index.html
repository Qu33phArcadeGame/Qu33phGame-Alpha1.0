<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qu33ph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin:0; overflow:hidden; background:#111; font-family: 'Courier New', monospace; }
    canvas { display:block; touch-action:none; }

    #rotateBtn {
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 20px;
      border-radius:10px;
      border:2px solid #444;
      font-size:14px;
      font-family: 'Courier New', monospace;
      background:#1a1a1a;
      color:#ccc;
      letter-spacing:1px;
      display:none;
    }
    #timeline {
      position:absolute;
      top:10px;
      left:10%;
      width:80%;
      height:6px;
      background:#333;
      border-radius:10px;
      overflow:hidden;
      display:none;
    }
    #progress {
      height:100%;
      width:0%;
      background:lime;
      transition: background 0.5s;
    }

    /* TITLE SCREEN */
    #titleScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#0a0a0a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:100;
      overflow:hidden;
      padding: 12px 0;
      box-sizing:border-box;
    }
    .title-logo {
      width: min(200px, 55vw);
      margin-bottom: 4px;
      position: relative;
    }
    .title-logo img {
      width: 100%;
      height: auto;
      display: block;
    }
    .title-logo.golden-border img {
      filter: drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 16px rgba(255,215,0,0.5));
    }
    .title-sub {
      font-size: clamp(9px, 2vw, 12px);
      color: #555;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .mode-btn {
      width: min(320px, 82vw);
      padding: 12px 18px;
      margin: 5px 0;
      border: 1px solid #333;
      background: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      font-size: clamp(12px, 3vw, 15px);
      letter-spacing: 2px;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mode-btn:active { background: #1e1e1e; border-color: #666; color: #fff; }
    .mode-icon { font-size: 20px; flex-shrink:0; }
    .mode-text { display:flex; flex-direction:column; gap:2px; }
    .mode-name { font-weight:bold; }
    .mode-desc { font-size: 9px; color: #555; letter-spacing: 1px; }
    .high-score-title {
      margin-top: 12px;
      font-size: 10px;
      color: #333;
      letter-spacing: 3px;
      color: #fff;
    }
    #titleCoins {
      position: absolute;
      top: 16px;
      left: 0;
      width: 56px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 1px;
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    #titleCoins img {
      width: 44px; height: 44px;
      object-fit: contain;
    }
    #slotBtn {
      position: absolute;
      top: 80px;
      left: 0;
      width: 88px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #aaa;
      letter-spacing: 0px;
      cursor: pointer;
      z-index: 200;
      background: none;
      border: none;
      padding: 0;
      display: none;
      text-align: center;
      line-height: 1.4;
    }
    #slotBtn:active { color: #fff; }

    /* OLYMPICS BRACKET SCREEN — full screen canvas, no scroll */
    #bracketScreen {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      background:#08080a;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      overflow:hidden;
      z-index:100;
    }
    #bracketCanvas {
      flex:1; width:100%; display:block;
    }
    .bracket-play-btn {
      width:100%;
      padding:0 24px 32px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      flex-shrink:0;
    }
    #playNextBtn {
      width:min(360px,88vw);
      padding:17px;
      background:#ffffff;
      color:#000;
      font-family:'Courier New',monospace;
      font-size:15px;
      font-weight:bold;
      letter-spacing:2px;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }
    #playNextBtn:active { background:#e0e0e0; }
    #playNextBtn.elim { background:#181818; color:#333; cursor:default; }
    #bracketRoundLabel {
      font-size:10px;
      color:#333;
      letter-spacing:3px;
      font-family:'Courier New',monospace;
    }
    .reel-window {
      aspect-ratio: 1;
      position: relative;
      border: none;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    .reel-img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .paytable-row {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px;
      border-bottom: 1px solid #0f0f0f;
      font-family: 'Courier New', monospace; font-size: 9px;
      color: #666;
    }
    .paytable-row:last-child { border-bottom: none; }
    .paytable-icons { display: flex; gap: 1px; }
    .paytable-icons img { width: 16px; height: 16px; object-fit: contain; }
    .paytable-win { margin-left: auto; color: #ffd700; font-weight: bold; font-size: 10px; white-space:nowrap; }
    #paytable { display: grid; grid-template-columns: 1fr 1fr; }
    #medalScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#08080a; display:none; flex-direction:column;
      align-items:center; justify-content:center; z-index:100;
    }
    #medalCanvas { width:100%; flex:1; display:block; }
    .medal-btn {
      width:min(360px,88vw); padding:17px; margin:0 0 32px;
      background:#fff; color:#000; font-family:'Courier New',monospace;
      font-size:15px; font-weight:bold; letter-spacing:2px;
      border:none; border-radius:4px; cursor:pointer; flex-shrink:0;
    }
    .medal-btn:active { background:#e0e0e0; }
    #nationScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#08080a; display:none; flex-direction:column;
      align-items:center; z-index:100; overflow-y:auto;
      padding-bottom:20px;
    }
    .nation-header {
      width:100%; text-align:center; padding:24px 0 12px;
      font-family:'Courier New',monospace;
    }
    .nation-title {
      font-size:clamp(18px,5vw,26px); color:#fff;
      letter-spacing:4px; font-weight:bold; display:block;
    }
    .nation-sub {
      font-size:10px; color:#444; letter-spacing:3px; display:block; margin-top:4px;
    }
    .nation-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:8px; width:min(400px,92vw); margin-top:16px;
    }
    .nation-btn {
      display:flex; flex-direction:column; align-items:center;
      gap:4px; padding:14px 8px; background:#0e0e0e;
      border:1px solid #222; border-radius:6px; cursor:pointer;
      font-family:'Courier New',monospace; color:#888;
      transition:all 0.12s; font-size:11px; letter-spacing:1px;
    }
    .nation-btn:hover, .nation-btn:active {
      background:#1a1a1a; border-color:#888; color:#fff;
    }
    .nation-btn.selected {
      background:#1a1a1a; border-color:#c8a840; color:#c8a840;
    }
    .nation-flag { font-size:28px; line-height:1; }
    .nation-name { font-size:10px; text-align:center; line-height:1.3; }
    .nation-confirm {
      width:min(400px,92vw); margin-top:16px;
      padding:16px; background:#c8a840; color:#000;
      font-family:'Courier New',monospace; font-size:15px;
      font-weight:bold; letter-spacing:2px; border:none;
      border-radius:4px; cursor:pointer; display:none;
    }
    /* THEME BUTTON */
    .theme-btn {
      width:min(340px,80vw); margin:6px 0;
      padding:14px 24px; border:1px solid #333;
      background:#111; color:#eee;
      font-family:'Courier New',monospace;
      font-size:14px; letter-spacing:2px;
      cursor:pointer; border-radius:6px;
      display:flex; align-items:center; gap:14px;
      text-align:left;
    }
    .theme-btn:active { background:#1a1a1a; }
    .theme-btn.active-theme { border-color:#fff; color:#fff; }

    /* THEME SELECT SCREEN */
    #themeScreen {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#08080a; display:none; flex-direction:column;
      align-items:center; padding:40px 0 20px; z-index:100;
    }
    .theme-screen-title {
      font-family:'Courier New',monospace; font-size:22px;
      color:#fff; letter-spacing:4px; font-weight:bold; margin-bottom:6px;
    }
    .theme-screen-sub {
      font-family:'Courier New',monospace; font-size:10px;
      color:#444; letter-spacing:3px; margin-bottom:32px;
    }
    .theme-option {
      width:min(340px,80vw); margin:8px 0;
      padding:18px 20px; border:1px solid #222;
      background:#0e0e0e; border-radius:6px; cursor:pointer;
      display:flex; align-items:center; gap:16px;
      font-family:'Courier New',monospace; color:#888;
    }
    .theme-option:active { background:#1a1a1a; }
    .theme-option.selected { border-color:#fff; color:#fff; }
    .theme-icon { font-size:28px; }
    .theme-name { font-size:15px; letter-spacing:2px; font-weight:bold; display:block; }
    .theme-desc { font-size:10px; letter-spacing:1px; color:#555; display:block; margin-top:3px; }
    .theme-back {
      width:min(340px,80vw); margin-top:20px; padding:14px;
      background:transparent; color:#444; border:1px solid #222;
      font-family:'Courier New',monospace; font-size:12px;
      letter-spacing:2px; border-radius:4px; cursor:pointer;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<button id="rotateBtn">Orientation: vertical</button>
<div id="timeline"><div id="progress"></div></div>

<div id="titleCoins">
  <img src="coin.png" alt="coins">
  <span id="titleCoinCount">0</span>
</div>
<button id="slotBtn" onclick="showSlotMachine()"><img src="slotoverlay.png" width="76" height="76" style="object-fit:contain;"><br>SLOT</button>

<!-- TITLE SCREEN -->
<div id="titleScreen">
  <div class="title-logo" id="logoContainer"><img id="logoImg" src="logo.jpg" alt="Qu33ph" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'"></div>
  <div id="logoFallback" style="display:none; font-family:'Courier New',monospace; font-size:clamp(42px,11vw,80px); font-weight:bold; color:#fff; letter-spacing:8px; margin-bottom:8px;">Qu33ph</div>
  <div class="title-sub">arcade edition</div>

  <button class="mode-btn" id="btn1Round" onclick="startMode('single')">
    <span class="mode-icon">🎯</span>
    <span class="mode-text">
      <span class="mode-name">QUICK GAME</span>
      <span class="mode-desc">one round · 45 seconds · go for high score</span>
    </span>
  </button>

  <button class="mode-btn" id="btnOlympics" onclick="startMode('olympics')">
    <span class="mode-icon">🏆</span>
    <span class="mode-text">
      <span class="mode-name">QU33PH OLYMPICS</span>
      <span class="mode-desc">tournament bracket · 8 nations · 3 rounds</span>
    </span>
  </button>

  <button class="mode-btn" onclick="showThemeScreen()" id="btnThemes">
    <span class="mode-icon">🎨</span>
    <span class="mode-text">
      <span class="mode-name" id="themeLabel">THEME · DEFAULT</span>
      <span class="mode-desc">change the look of the game</span>
    </span>
  </button>

  <div class="high-score-title" id="titleHighScore"></div>
</div>

<!-- THEME SELECT SCREEN -->
<div id="themeScreen">
  <div class="theme-screen-title">THEME</div>
  <div class="theme-screen-sub">CHOOSE YOUR STYLE</div>

  <div class="theme-option" id="theme-default" onclick="selectTheme('default')">
    <span class="theme-icon">🎮</span>
    <span><span class="theme-name">DEFAULT</span><span class="theme-desc">classic qu33ph look · always free</span></span>
  </div>
  <div class="theme-option" id="theme-cartoon" onclick="selectTheme('cartoon')">
    <span class="theme-icon">✏️</span>
    <span><span class="theme-name" id="tname-cartoon">COMIC</span><span class="theme-desc" id="tdesc-cartoon">black & white · comic style · custom markers</span></span>
  </div>
  <div class="theme-option" id="theme-neon" onclick="selectTheme('neon')">
    <span class="theme-icon">⚡</span>
    <span><span class="theme-name" id="tname-neon">NEON</span><span class="theme-desc" id="tdesc-neon">synthwave · glowing colours · dark room</span></span>
  </div>
  <div class="theme-option" id="theme-sunset" onclick="selectTheme('sunset')">
    <span class="theme-icon">🌅</span>
    <span><span class="theme-name" id="tname-sunset">GOLDEN HOUR</span><span class="theme-desc" id="tdesc-sunset">warm amber · late afternoon vibes</span></span>
  </div>

  <div id="themeCoinsDisplay" style="margin-top:14px; font-family:'Courier New',monospace; font-size:12px; color:#888; letter-spacing:2px;"></div>
  <button class="theme-back" onclick="showTitle()">← BACK</button>
</div>

<!-- SLOT MACHINE SCREEN -->
<div id="slotScreen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:#08080a; flex-direction:column; align-items:center; z-index:100; overflow:hidden; box-sizing:border-box;">

  <!-- Top bar -->
  <div style="width:100%; display:flex; align-items:center; padding:10px 16px 0; box-sizing:border-box; flex-shrink:0; position:relative; z-index:10;">
    <button onclick="showTitle()" style="background:none; border:none; color:#888; font-family:'Courier New',monospace; font-size:13px; letter-spacing:2px; cursor:pointer;">← BACK</button>
    <div style="margin-left:auto; font-family:'Courier New',monospace; font-size:14px; color:#fff; display:flex; align-items:center; gap:5px;">
      <img src="coin.png" width="20" height="20" style="object-fit:contain;" onerror="this.src='coin.jpg'">
      <span id="slotCoinCount">0</span>
    </div>
  </div>

    <!-- Slot machine overlay with reels inside -->
    <div style="position:relative; width:min(320px,88vw); flex-shrink:0;">
      <img src="slotoverlay.png" style="width:100%; display:block; object-fit:contain;">
      <!-- Reels positioned inside the window squares - upper portion of machine -->
      <div id="slotReels" style="position:absolute; top:37%; left:25%; width:46%; height:11%; display:flex; gap:1%; align-items:stretch;">
        <div class="reel-window" style="flex:1; height:100%; justify-content:flex-start;"><img id="reel0" class="reel-img" src="slotred.jpg" style="width:80%; height:100%; object-fit:contain; margin-left:-8%;"></div>
        <div class="reel-window" style="flex:1; height:100%; justify-content:flex-end;"><img id="reel1" class="reel-img" src="slotgreen.jpg" style="width:85%; height:100%; object-fit:contain; transform:translateX(10%);"></div>
        <div class="reel-window" style="flex:1; height:100%; justify-content:flex-start; overflow:hidden;"><img id="reel2" class="reel-img" src="slotblue.jpg" style="width:75%; height:75%; object-fit:contain; transform:translateX(60%);"></div>
      </div>
    </div>

  <!-- Result + spin -->
  <div style="flex-shrink:0; text-align:center; padding:4px 0;">
    <div id="slotResult" style="font-family:'Courier New',monospace; font-size:13px; color:#fff; letter-spacing:2px; min-height:18px; margin-bottom:6px;"></div>
    <button id="spinBtn" onclick="spinSlot()" style="width:min(260px,80vw); padding:12px; background:#ffd700; color:#000; font-family:'Courier New',monospace; font-size:14px; font-weight:bold; letter-spacing:3px; border:none; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;">SPIN — 3 <img src="coin.png" width="18" height="18" style="object-fit:contain;" onerror="this.src='coin.jpg'"></button>
  </div>

  <!-- Paytable -->
  <div style="width:min(340px,92vw); border:1px solid #1a1a1a; border-radius:6px; overflow:hidden; flex-shrink:0; margin-top:6px; margin-bottom:8px;">
    <div style="background:#111; padding:5px 12px; font-family:'Courier New',monospace; font-size:9px; color:#555; letter-spacing:3px; display:flex; align-items:center; gap:4px;">PAYTABLE · SPIN COSTS 3 <img src="coin.png" width="12" height="12" style="object-fit:contain;" onerror="this.src='coin.jpg'"></div>
    <div id="paytable" style="padding:1px 0;"></div>
  </div>

</div>

<!-- NATION SELECT SCREEN -->
<div id="nationScreen">
  <div class="nation-header">
    <span class="nation-title">CHOOSE YOUR NATION</span>
    <span class="nation-sub">QU33PH OLYMPICS</span>
  </div>
  <div class="nation-grid" id="nationGrid"></div>
  <button class="nation-confirm" id="nationConfirm" onclick="confirmNation()">ENTER TOURNAMENT →</button>
</div>

<!-- MEDAL SCREEN -->
<div id="medalScreen">
  <canvas id="medalCanvas"></canvas>
  <div style="width:min(360px,88vw); display:flex; flex-direction:column; gap:10px; margin-bottom:32px;">
    <button class="medal-btn" id="medalSpecialBtn" style="display:none; background:#1a1a1a; color:#ffd700; border:2px solid #ffd700;" onclick="startSpecialOlympics()">🏅 PLAY SPECIAL OLYMPICS</button>
    <button class="medal-btn" onclick="showTitle()">← BACK TO MENU</button>
  </div>
</div>

<!-- OLYMPICS BRACKET SCREEN -->
<div id="bracketScreen" style="display:none; flex-direction:column;">
  <canvas id="bracketCanvas"></canvas>
  <div class="bracket-play-btn">
    <button id="playNextBtn">PLAY →</button>
    <div id="bracketRoundLabel"></div>
  </div>
</div>

<script>
// ─── IMAGES ───────────────────────────────────────────────────────────────
const markerImages = { red:new Image(), green:new Image(), blue:new Image() };
markerImages.red.src="red.png";
markerImages.green.src="green.png";
markerImages.blue.src="blue.png";

const cartoonImages = { red:new Image(), green:new Image(), blue:new Image() };
cartoonImages.red.src="redC.png";
cartoonImages.green.src="greenC.png";
cartoonImages.blue.src="blueC.png";

const chairImg = new Image();
chairImg.src = "Chair.png";

let currentTheme = "default"; // "default" | "cartoon" | "neon" | "sunset"

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// ─── LAYOUT ───────────────────────────────────────────────────────────────
const LEFT_EDGE=canvas.width*0.2;
const RIGHT_WALL=canvas.width*0.75;
const END_LINE_Y=canvas.height*0.11;
const START_LINE_Y=canvas.height-80;

// LINE OF DESTINY = AC unit position in game coords
// AC band is at 77% of counter height (cTop to cBot)
// cTop = canvas.height*0.06, cBot = canvas.height*0.97
const LINE_OF_DESTINY = canvas.height*0.06 + (canvas.height*0.97 - canvas.height*0.06)*0.77;

const redDot={x:RIGHT_WALL+6, y:canvas.height*0.08 + canvas.height*0.09};
const chair={x:(LEFT_EDGE+RIGHT_WALL)/2,y:canvas.height*0.13,radius:35};

// ─── GAME MODE STATE ──────────────────────────────────────────────────────
let gameMode = null;
let olympicsState = null;
let playerNation = null; // chosen nation
let selectedNationIdx = -1;

// ─── NATION SELECT ────────────────────────────────────────────────────────
function showNationSelect(){
  document.getElementById("titleScreen").style.display="none";
  document.getElementById("titleCoins").style.display="none";
  document.getElementById("slotBtn").style.display="none";
  document.getElementById("nationScreen").style.display="flex";
  selectedNationIdx = -1;
  document.getElementById("nationConfirm").style.display="none";

  const grid = document.getElementById("nationGrid");
  grid.innerHTML = "";
  NATIONS.forEach((n,i)=>{
    const btn = document.createElement("button");
    btn.className="nation-btn";
    btn.innerHTML=`<span class="nation-flag">${n.flag}</span><span class="nation-name">${n.name}</span>`;
    btn.onclick=()=>{
      document.querySelectorAll(".nation-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedNationIdx=i;
      document.getElementById("nationConfirm").style.display="block";
    };
    grid.appendChild(btn);
  });
}

function confirmNation(){
  if(selectedNationIdx<0) return;
  playerNation = { ...NATIONS[selectedNationIdx], isPlayer:true };
  document.getElementById("nationScreen").style.display="none";
  olympicsState=buildOlympicsState();
  showBracket();
}

// ─── NATIONS / STEPLADDER ─────────────────────────────────────────────────
const NATIONS = [
  { name:"Ireland",      flag:"🇮🇪" },
  { name:"Israel",       flag:"🇮🇱" },
  { name:"USA",          flag:"🇺🇸" },
  { name:"South Africa", flag:"🇿🇦" },
  { name:"England",      flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { name:"Scotland",     flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
  { name:"Norway",       flag:"🇳🇴" },
  { name:"Japan",        flag:"🇯🇵" },
  { name:"Germany",      flag:"🇩🇪" },
  { name:"Brazil",       flag:"🇧🇷" },
  { name:"Australia",    flag:"🇦🇺" },
  { name:"Canada",       flag:"🇨🇦" },
  { name:"France",       flag:"🇫🇷" },
  { name:"Netherlands",  flag:"🇳🇱" },
  { name:"Sweden",       flag:"🇸🇪" },
  { name:"Russia",       flag:"🇷🇺" },
  { name:"Iran",         flag:"🇮🇷" },
  { name:"China",        flag:"🇨🇳" },
];

// playerNation is set at nation select time

// 8-team single elimination bracket
// QF1: n0 vs n1   QF2: n2 vs n3   QF3: n4 vs n5   QF4: n6 vs PLAYER
// SF1: QF1w vs QF2w    SF2: QF3w vs QF4w
// Final: SF1w vs SF2w
// Player plays QF4, then SF2 if they win, then Final if they win

function buildOlympicsState(){
  // Use chosen playerNation, remove it from pool if it's in NATIONS
  let pool = NATIONS.filter(n=>n.name!==playerNation.name);
  shuffle(pool);
  let nations = pool.slice(0,7);

  let qf1s1=simulatedScore(), qf1s2=simulatedScore();
  let qf2s1=simulatedScore(), qf2s2=simulatedScore();
  let qf3s1=simulatedScore(), qf3s2=simulatedScore();
  if(qf1s1===qf1s2) qf1s2++;
  if(qf2s1===qf2s2) qf2s2++;
  if(qf3s1===qf3s2) qf3s2++;

  return {
    n: [...nations, playerNation], // n[7] = player
    qf1s1,qf1s2,qf2s1,qf2s2,qf3s1,qf3s2,
    qf4Score:null,qf4Opp:null,
    sf2Score:null,sf2Opp:null,
    finScore:null,finOpp:null,
    sf1s1:null,sf1s2:null,
    round:1,
    playerEliminated:false,
    champion:null,
  };
}

function getQFWinner(os, qf){
  if(qf===1) return os.qf1s1>os.qf1s2 ? os.n[0] : os.n[1];
  if(qf===2) return os.qf2s1>os.qf2s2 ? os.n[2] : os.n[3];
  if(qf===3) return os.qf3s1>os.qf3s2 ? os.n[4] : os.n[5];
  if(qf===4) return os.qf4Score!==null && os.qf4Score>os.qf4Opp ? playerNation : os.n[6];
}
function getSF1Winner(os){ return os.sf1s1>os.sf1s2 ? getQFWinner(os,1) : getQFWinner(os,2); }
function getSF2Winner(os){ return os.sf2Score!==null && os.sf2Score>os.sf2Opp ? playerNation : (os.qf4Score!==null?getQFWinner(os,3):null); }

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function simulatedScore(){
  // Competitive AI — scores between 85-130, weighted toward 95-115
  let base = 85 + Math.floor(Math.random()*45); // 85-129
  // 70% chance of being in the 95-115 sweet spot
  if(Math.random()<0.7) base = 90 + Math.floor(Math.random()*30);
  return base;
}

    ctx.restore();

    ctx.globalCompositeOperation="multiply";
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,cw,ch);
    ctx.restore();
    // 3. Halftone dot pattern for comic texture
    ctx.save();
    ctx.globalAlpha=0.06;

        ctx.beginPath();
        ctx.arc(dx,dy,1.5,0,Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
    // 4. Bold black vignette border
    ctx.save();
    ctx.strokeStyle="#000"; ctx.lineWidth=18;
    ctx.strokeRect(0,0,cw,ch);
    ctx.restore();

  } else if(currentTheme==="neon"){
    // Mild dark base
    ctx.save();
    ctx.globalCompositeOperation="multiply";
    ctx.fillStyle="rgba(8,0,25,0.45)";
    ctx.fillRect(0,0,cw,ch);
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation="screen";
    // Counter — blazing electric green
    let cg2=ctx.createLinearGradient(cw*0.2,0,cw*0.75,0);
    cg2.addColorStop(0,"rgba(0,255,120,0.6)");
    cg2.addColorStop(0.5,"rgba(0,255,120,0.75)");
    cg2.addColorStop(1,"rgba(0,255,120,0.6)");
    ctx.fillStyle=cg2; ctx.fillRect(cw*0.2,0,cw*0.55,ch);
    // Second pass for extra intensity
    ctx.fillStyle=cg2; ctx.fillRect(cw*0.2,0,cw*0.55,ch);
    // Left cabinet — blazing cyan
    let lg=ctx.createLinearGradient(0,0,cw*0.22,0);
    lg.addColorStop(0,"rgba(0,255,255,0.8)");
    lg.addColorStop(1,"rgba(0,255,255,0.2)");
    ctx.fillStyle=lg; ctx.fillRect(0,0,cw*0.22,ch);
    ctx.fillStyle=lg; ctx.fillRect(0,0,cw*0.22,ch);
    // Right window — blazing magenta
    let rg2=ctx.createLinearGradient(cw*0.75,0,cw,0);
    rg2.addColorStop(0,"rgba(255,0,200,0.3)");
    rg2.addColorStop(1,"rgba(200,0,255,0.9)");
    ctx.fillStyle=rg2; ctx.fillRect(cw*0.75,0,cw*0.25,ch);
    ctx.fillStyle=rg2; ctx.fillRect(cw*0.75,0,cw*0.25,ch);
    // AC vent — hot pink blazing
    let ag=ctx.createRadialGradient(cw*0.1,ch*0.8,0,cw*0.1,ch*0.8,ch*0.22);
    ag.addColorStop(0,"rgba(255,50,150,0.9)");
    ag.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=ag; ctx.fillRect(0,ch*0.55,cw*0.25,ch*0.45);
    ctx.fillStyle=ag; ctx.fillRect(0,ch*0.55,cw*0.25,ch*0.45);
    ctx.restore();

    // Red dot — neon red glow
    let dotCX2=redDot.x, dotCY2=redDot.y;
    ctx.save();
    ctx.shadowColor="#ff0000"; ctx.shadowBlur=30;
    ctx.fillStyle="#ff2222";

    ctx.shadowBlur=60;
    ctx.globalAlpha=0.5;

    // Neon sun — yellow-white blazing

    let sunY2=glassTop2+(ch-glassTop2)*0.25;

      ctx.beginPath(); ctx.ellipse(cx2,cy2,c.w*0.28,c.w*0.12,0,0,Math.PI*2); ctx.fill();
    });

    ctx.fillStyle="rgba(255,160,20,0.52)";
    ctx.fillRect(cw*0.2,0,cw*0.55,ch);

    ctx.restore();
    // 2. Extra screen-mode gold shimmer over everything
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.fillStyle="rgba(255,180,0,0.18)";
    ctx.fillRect(0,0,cw,ch);
    ctx.restore();
    // 2. Warm bloom from upper right
    ctx.save();
    ctx.globalCompositeOperation="screen";
    let bloom=ctx.createRadialGradient(cw*0.7,0,0,cw*0.7,0,ch*0.9);
    bloom.addColorStop(0,"rgba(255,220,60,0.3)");
    bloom.addColorStop(0.4,"rgba(255,140,0,0.1)");
    bloom.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=bloom; ctx.fillRect(0,0,cw,ch);
    ctx.restore();
    // 3. Moving gold stars orbiting in slow arcs
    ctx.save();
    for(let i=0;i<22;i++){
      // Orbit around different centres
      let cx2=cw*(0.2+0.6*((i*73)%100)/100);
      let cy2=ch*(0.1+0.8*((i*53)%100)/100);
      let orbitR=30+((i*37)%80);
      let speed=0.3+((i*17)%10)/20;
      let angle=t*speed+i*0.85;
      let sx=cx2+Math.cos(angle)*orbitR;
      let sy=ch*(0.05+((i*29)%90)/100);
      // Drift downward over time too
      sy=(sy+t*18*(0.3+((i*11)%10)/20))%ch;
      let pulse2=0.3+0.7*Math.abs(Math.sin(t*1.2+i*0.6));
      let size=1.5+pulse2*4;
      ctx.globalAlpha=pulse2*0.85;
      ctx.fillStyle=i%3===0?"#ffd700":i%3===1?"#ffb300":"#ffe066";
      ctx.shadowColor="#ffd700"; ctx.shadowBlur=14;
      ctx.save();
      ctx.translate(sx,sy); ctx.rotate(t*0.8+i);
      ctx.beginPath();
      for(let p=0;p<5;p++){
        let a=p*Math.PI*2/5-Math.PI/2;
        let b=a+Math.PI/5;
        p===0?ctx.moveTo(Math.cos(a)*size,Math.sin(a)*size):ctx.lineTo(Math.cos(a)*size,Math.sin(a)*size);
        ctx.lineTo(Math.cos(b)*size*0.4,Math.sin(b)*size*0.4);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
    // 4. Slow gold shimmer sweep
    let sweepX=(Math.sin(t*0.35)*0.5+0.5)*cw;
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.globalAlpha=0.14;
    let sw=ctx.createLinearGradient(sweepX-100,0,sweepX+100,0);
    sw.addColorStop(0,"rgba(255,215,0,0)");
    sw.addColorStop(0.5,"rgba(255,215,0,1)");
    sw.addColorStop(1,"rgba(255,215,0,0)");
    ctx.fillStyle=sw; ctx.fillRect(sweepX-100,0,200,ch);
    ctx.restore();
  }
}

const SLOT_SYMBOLS = [
  { id:"logo",  src:"slotlogo.jpg",  label:"LOGO",  weight:1 },
  { id:"mega",  src:"slotmega.jpg",  label:"MEGA",  weight:2 },
  { id:"coin",  src:"slotcoin.jpg",  label:"COIN",  weight:4 },
  { id:"chair", src:"slotchair.jpg", label:"CHAIR", weight:5 },
  { id:"red",   src:"slotred.jpg",   label:"RED",   weight:8 },
  { id:"green", src:"slotgreen.jpg", label:"GREEN", weight:8 },
  { id:"blue",  src:"slotblue.jpg",  label:"BLUE",  weight:8 },
];
const SLOT_COST = 3;

// Paytable: [sym1, sym2, sym3] → coins won (null = any)
const PAYTABLE = [
  { syms:["logo","logo","logo"],   win:200, label:"JACKPOT" },
  { syms:["mega","mega","mega"],   win:50,  label:"MEGA QU33PH" },
  { syms:["coin","coin","coin"],   win:30,  label:"TRIPLE COIN" },
  { syms:["chair","chair","chair"],win:20,  label:"CHAIR SPIN" },
  { syms:["logo","logo",null],     win:15,  label:"DOUBLE LOGO" },
  { syms:["mega","mega",null],     win:8,   label:"DOUBLE MEGA" },
  { syms:["coin","coin",null],     win:5,   label:"DOUBLE COIN" },
  { syms:["red","green","blue"],   win:10,  label:"QU33PH TRIO" },
  { syms:[null,"logo",null],       win:3,   label:"ANY LOGO" },
  { syms:[null,"coin",null],       win:2,   label:"ANY COIN" },
];

function pickSymbol(){
  let total=SLOT_SYMBOLS.reduce((a,s)=>a+s.weight,0);
  let r=Math.random()*total;
  for(let s of SLOT_SYMBOLS){ r-=s.weight; if(r<=0) return s; }
  return SLOT_SYMBOLS[SLOT_SYMBOLS.length-1];
}

function checkWin(results){
  let ids=results.map(s=>s.id);
  for(let row of PAYTABLE){
    let match=true;
    for(let i=0;i<3;i++){
      if(row.syms[i]!==null && row.syms[i]!==ids[i]){ match=false; break; }
    }
    if(match) return row;
  }
  return null;
}

// Per-slot custom positioning ONLY applies to the marker colors (red/green/blue)
// Other symbols (logo, mega, coin, chair) get clean centred display
const SLOT_CUSTOM_STYLE = {
  reel0: { red:"width:80%; height:100%; object-fit:contain; margin-left:-8%;" },
  reel1: { green:"width:85%; height:100%; object-fit:contain; transform:translateX(10%);" },
  reel2: { blue:"width:75%; height:75%; object-fit:contain; transform:translateX(60%);" },
};
const SLOT_DEFAULT_STYLE = "width:100%; height:100%; object-fit:contain;";

function setReelImg(img, reelId, sym){
  img.src = sym.src;
  let custom = SLOT_CUSTOM_STYLE[reelId] && SLOT_CUSTOM_STYLE[reelId][sym.id];
  img.style.cssText = custom || SLOT_DEFAULT_STYLE;
  // Only blue's special slot needs the container to allow overflow — clip everything else
  img.parentElement.style.overflow = (reelId==="reel2" && sym.id==="blue") ? "visible" : "hidden";
}

function spinSlot(){
  if(slotSpinning||coins<SLOT_COST) return;
  addCoins(-SLOT_COST);
  document.getElementById("slotCoinCount").innerText=coins;
  document.getElementById("slotResult").innerText="";
  slotSpinning=true;
  updateSpinBtn();

  let results=[null,null,null];
  let settled=0;
  const reelIds=["reel0","reel1","reel2"];
  const delays=[600,900,1200];

  // Animate each reel — flash through symbols then settle
  reelIds.forEach((id,i)=>{
    let img=document.getElementById(id);
    let ticks=0;
    let maxTicks=12+i*6;
    let interval=setInterval(()=>{
      let sym=pickSymbol();
      setReelImg(img, id, sym);
      ticks++;
      if(ticks>=maxTicks){
        clearInterval(interval);
        let final=pickSymbol();
        results[i]=final;
        setReelImg(img, id, final);
        settled++;
        if(settled===3){
          slotSpinning=false;
          let won=checkWin(results);
          let resultEl=document.getElementById("slotResult");
          if(won){
            addCoins(won.win);
            document.getElementById("slotCoinCount").innerText=coins;
            resultEl.style.color="#ffd700";
            resultEl.innerHTML=won.label+"! +"+won.win+' <img src="coin.png" onerror="this.src=\'coin.jpg\'" style="width:14px;height:14px;object-fit:contain;vertical-align:middle;">';
            // Flash reels gold
            reelIds.forEach(r=>{
              document.getElementById(r).parentElement.style.borderColor="#ffd700";
              setTimeout(()=>document.getElementById(r).parentElement.style.borderColor="#333",1500);
            });
          } else {
            resultEl.style.color="#555";
            resultEl.innerText="no match — try again";
          }
          document.getElementById("slotCoinCount").innerText=coins;
          updateSpinBtn();
        }
      }
    }, 80);
  });
}

function renderBracket(){
  const os = olympicsState;

  // ── Check if tournament is over — show medal screen instead ──
  if(os.champion!==null || os.playerEliminated){
    showMedalScreen(); return;
  }

  const bc = document.getElementById("bracketCanvas");
  const bw = window.innerWidth;
  const bh = window.innerHeight * 0.80;
  bc.width = bw; bc.height = bh;
  const bx = bc.getContext("2d");
  bx.fillStyle="#08080a"; bx.fillRect(0,0,bw,bh);

  // ── HEADER ──
  bx.textAlign="center"; bx.textBaseline="top";
  bx.fillStyle="#ffffff";
  bx.font=`bold ${Math.round(bw*0.07)}px 'Courier New',monospace`;
  bx.fillText("QU33PH",bw/2,10);
  bx.fillStyle="#c8a840";
  bx.font=`bold ${Math.round(bw*0.045)}px 'Courier New',monospace`;
  bx.fillText(gameMode==="specialolympics"?"SPECIAL OLYMPICS":"OLYMPICS",bw/2,10+bw*0.076);
  bx.fillStyle="#c8a840";
  bx.fillRect(bw*0.15, 10+bw*0.128, bw*0.7, 2);

  // ── LAYOUT: vertical bracket on portrait ──
  // Left col = QF1,QF2 (cpu matches)   Right col = QF3, QF4(player)
  // Middle col = SF1, SF2
  // Bottom centre = FINAL
  const PAD = 6;
  const topY = bh*0.20;
  const colW = bw*0.30;           // each match box width
  const rH = Math.round(bh*0.072); // taller rows so two-line text never overlaps
  const mH = rH*2+1;              // match total height
  const lx = PAD;                 // left col x
  const rx = bw-PAD-colW;        // right col x
  const mx = (bw-colW)/2;        // middle col x

  // Vertical spacing
  const qfGap = bh*0.06;
  const qf1y = topY;
  const qf2y = topY + mH + qfGap;
  const sf1y = topY + (mH+qfGap)/2; // vertically centred between qf1 and qf2
  const qf3y = topY;
  const qf4y = topY + mH + qfGap;
  const sf2y = sf1y;
  const finy = qf2y + mH + qfGap*0.8;

  const labelSz = Math.round(bw*0.025);
  const nameSz  = Math.round(bw*0.028);
  const scoreSz = Math.round(bw*0.03);

  function truncate(n, maxChars){
    if(!n) return "TBD";
    return n.length > maxChars ? n.slice(0,maxChars) : n;
  }

  function drawMatch(x,y,p1,p2,s1,s2,active,label){
    let done = s1!==null && s2!==null;
    let winIdx = done ? (s1>s2?0:1) : -1;

    if(label){
      bx.fillStyle=active?"#fff":"#444";
      bx.font=`${labelSz}px 'Courier New',monospace`;
      bx.textAlign="left"; bx.textBaseline="bottom";
      bx.fillText(label, x, y-2);
    }

    bx.strokeStyle=active?"#fff":done?"#444":"#222";
    bx.lineWidth=active?2:1;
    bx.strokeRect(x,y,colW,mH);

    [p1,p2].forEach((p,pi)=>{
      let ry = y + pi*(rH+1);
      let isWin  = done && winIdx===pi;
      let isLoss = done && winIdx!==pi;
      let isYou  = p && p.isPlayer;
      let isPending = !p;

      if(isYou && !isLoss){
        bx.fillStyle="rgba(68,238,68,0.06)";
        bx.fillRect(x+1, ry+1, colW-2, rH-1);
      }

      let nameColor;
      if(isPending)   nameColor="#2a2a2a";
      else if(isWin)  nameColor="#44ee44";
      else if(isLoss) nameColor="#cc3333";
      else if(isYou)  nameColor="#44ee44";
      else            nameColor="#777";

      if(done){
        // TWO LINES: name on top half, score on bottom half — never overlap
        let nameStr = "TBD";
        if(p){
          let short = p.name.length>6 ? p.name.slice(0,6) : p.name;
          nameStr = p.flag+" "+short+(p.isPlayer?" 🎮(you)":"");
        }
        let topY = ry + rH*0.26;
        let botY = ry + rH*0.74;

        // Name line
        bx.fillStyle=nameColor;
        bx.font=`${Math.round(nameSz*0.72)}px 'Courier New',monospace`;
        bx.textAlign="left"; bx.textBaseline="middle";
        // Clip strictly to top half only, leaving the bottom half clear for the score
        bx.save();
        bx.beginPath(); bx.rect(x+3,ry+1,colW-6,rH*0.48); bx.clip();
        bx.fillText(nameStr, x+4, topY);
        bx.restore();

        // Score line
        let sc = pi===0 ? s1 : s2;
        bx.fillStyle = isWin?"#44ee44":"#cc3333";
        bx.font=`bold ${Math.round(scoreSz*0.8)}px 'Courier New',monospace`;
        bx.textAlign="right"; bx.textBaseline="middle";
        bx.fillText(sc, x+colW-4, botY);

      } else {
        // Pending — single centred line
        let nameStr = "TBD";
        if(p){
          let short = p.name.length>6 ? p.name.slice(0,6) : p.name;
          nameStr = p.flag+" "+short+(p.isPlayer?" 🎮(you)":"");
        }
        bx.fillStyle=nameColor;
        bx.font=`${nameSz}px 'Courier New',monospace`;
        bx.textAlign="left"; bx.textBaseline="middle";
        bx.save();
        bx.beginPath(); bx.rect(x+3,ry+1,colW-6,rH-2); bx.clip();
        bx.fillText(nameStr, x+4, ry+rH/2);
        bx.restore();
      }
    });

    bx.strokeStyle="#1a1a1a"; bx.lineWidth=1;
    bx.beginPath(); bx.moveTo(x+1,y+rH); bx.lineTo(x+colW-1,y+rH); bx.stroke();
  }

  function connector(x1,y1,x2,y2){
    bx.strokeStyle="#2a2a2a"; bx.lineWidth=1.5;
    let midX=(x1+x2)/2;
    bx.beginPath();
    bx.moveTo(x1,y1); bx.lineTo(midX,y1); bx.lineTo(midX,y2); bx.lineTo(x2,y2);
    bx.stroke();
  }

  // ── Determine winners ──
  let qf1w = os.qf1s1>os.qf1s2 ? os.n[0] : os.n[1];
  let qf2w = os.qf2s1>os.qf2s2 ? os.n[2] : os.n[3];
  let qf3w = os.qf3s1>os.qf3s2 ? os.n[4] : os.n[5];
  let qf4done = os.qf4Score!==null;
  let qf4w = qf4done ? (os.qf4Score>os.qf4Opp ? playerNation : os.n[6]) : null;
  let sf1done = os.sf1s1!==null;
  let sf1w = sf1done ? (os.sf1s1>os.sf1s2 ? qf1w : qf2w) : null;
  let sf2done = os.sf2Score!==null;
  let sf2w = sf2done ? (os.sf2Score>os.sf2Opp ? playerNation : qf3w) : null;
  let finDone = os.finScore!==null;

  // ── DRAW MATCHES ──
  drawMatch(lx, qf1y, os.n[0],os.n[1], os.qf1s1,os.qf1s2, false,"QF1");
  drawMatch(lx, qf2y, os.n[2],os.n[3], os.qf2s1,os.qf2s2, false,"QF2");

  // SF1 — both QF winners known (cpu), scores fill in once played
  drawMatch(mx, sf1y, qf1w, qf2w, os.sf1s1, os.sf1s2, false,"SF1");

  drawMatch(rx, qf3y, os.n[4],os.n[5], os.qf3s1,os.qf3s2, false,"QF3");
  drawMatch(rx, qf4y, os.n[6],playerNation, qf4done?os.qf4Opp:null, qf4done?os.qf4Score:null,
    os.round===1,"QF4");

  // SF2 — show NOTHING until QF4 is done (player must play first)
  let sf2p1 = qf4done ? qf3w : null;
  let sf2p2 = qf4done ? qf4w : null;
  drawMatch(mx, sf2y, sf2p1, sf2p2, sf2done?os.sf2Opp:null, sf2done?os.sf2Score:null,
    os.round===2&&!os.playerEliminated,"SF2");

  // FINAL — both TBD until SFs resolved
  let finp1 = sf1done ? sf1w : null;
  let finp2 = sf2done ? sf2w : null;
  drawMatch(mx, finy, finp1, finp2, finDone?os.finOpp:null, finDone?os.finScore:null,
    os.round===3&&!os.playerEliminated,"FINAL");

  // ── CONNECTORS ──
  connector(lx+colW, qf1y+rH, mx, sf1y+rH);
  connector(lx+colW, qf2y+rH, mx, sf1y+rH);
  connector(rx,      qf3y+rH, mx+colW, sf2y+rH);
  connector(rx,      qf4y+rH, mx+colW, sf2y+rH);
  connector(mx+colW, sf1y+rH, mx, finy+rH);
  connector(mx,      sf2y+rH, mx+colW, finy+rH);

  // ── BUTTON ──
  const playBtn=document.getElementById("playNextBtn");
  const roundLabel=document.getElementById("bracketRoundLabel");

  if(os.champion!==null || os.playerEliminated){
    // Tournament over — go to medal screen which has Special Olympics button
    playBtn.className="";
    playBtn.innerText="SEE RESULT →";
    playBtn.onclick=()=>showMedalScreen();
    roundLabel.innerText=os.champion==="player"?"🏆 CHAMPION":
      os.round<=2?"ELIMINATED":os.round===3?"🥉 BRONZE":"🥈 SILVER";
  } else {
    playBtn.className="";
    let lbl=os.round===1?"PLAY QF4 →":os.round===2?"PLAY SEMI-FINAL →":"PLAY GRAND FINAL →";
    playBtn.innerText=lbl;
    playBtn.onclick=()=>{document.getElementById("bracketScreen").style.display="none";startGame();};
    roundLabel.innerText=os.round===1?"QUARTER-FINAL":os.round===2?"SEMI-FINAL":"GRAND FINAL";
  }
}

function showMedalScreen(){
  const os = olympicsState;
  document.getElementById("bracketScreen").style.display="none";
  document.getElementById("medalScreen").style.display="flex";

  let medal, medalText, medalColor, bgColor, isEliminated=false, canPlaySpecial=false;
  let coinsEarned = 0;
  const isSpecial = gameMode==="specialolympics";
  if(os.champion==="player"){
    medal="🥇"; medalText="GOLD MEDAL"; medalColor="#ffd700"; bgColor="rgba(255,215,0,";
    coinsEarned = isSpecial ? 3 : 15;
  } else if(os.playerEliminated && os.round<=2){
    isEliminated=true;
    canPlaySpecial = !isSpecial;
    medal="❌"; medalText="ELIMINATED"; medalColor="#cc3333"; bgColor="rgba(200,50,50,";
    coinsEarned = 0;
  } else if(os.playerEliminated && os.round===3){
    medal="🥉"; medalText="BRONZE MEDAL"; medalColor="#cd7f32"; bgColor="rgba(205,127,50,";
    canPlaySpecial = !isSpecial;
    coinsEarned = isSpecial ? 1 : 5;
  } else {
    medal="🥈"; medalText="SILVER MEDAL"; medalColor="#c0c0c0"; bgColor="rgba(192,192,192,";
    canPlaySpecial = !isSpecial;
    coinsEarned = isSpecial ? 2 : 10;
  }
  if(coinsEarned>0) addCoins(coinsEarned);

  const mc = document.getElementById("medalCanvas");
  const mw = window.innerWidth;
  const mh = window.innerHeight * 0.82;
  mc.width=mw; mc.height=mh;
  const mx2 = mc.getContext("2d");

  let particles = [];
  for(let i=0;i<28;i++){
    particles.push({
      x: mw*0.2 + Math.random()*mw*0.6,
      y: mh*0.1 + Math.random()*mh*0.7,
      vx: (Math.random()-0.5)*1.2,
      vy: -0.5-Math.random()*1.5,
      size: 3+Math.random()*6,
      life: Math.random(),
      speed: 0.008+Math.random()*0.012,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.15,
    });
  }

  let frame=0;
  let animId;

  function drawMedal(){
    mx2.fillStyle="#08080a"; mx2.fillRect(0,0,mw,mh);
    frame++;

    // Outer glow rings
    for(let r=3;r>=1;r--){
      let pulse = 0.5+0.5*Math.sin(frame*0.04);
      let radius = mw*0.28 + r*18 + pulse*12;
      let grad = mx2.createRadialGradient(mw/2,mh*0.42,0,mw/2,mh*0.42,radius);
      grad.addColorStop(0, bgColor+(0.08*r*pulse)+")");
      grad.addColorStop(1, "rgba(0,0,0,0)");
      mx2.fillStyle=grad; mx2.beginPath();
      mx2.arc(mw/2,mh*0.42,radius,0,Math.PI*2); mx2.fill();
    }

    // Medal emoji
    mx2.font=`${Math.round(mw*0.42)}px Arial`;
    mx2.textAlign="center"; mx2.textBaseline="middle";
    let bounce = Math.sin(frame*0.05)*6;
    mx2.fillText(medal, mw/2, mh*0.42+bounce);

    // Shiny sweep line
    let sweepX = mw/2 + Math.cos(frame*0.03)*mw*0.12;
    let sweepGrad = mx2.createLinearGradient(sweepX-40,0,sweepX+40,0);
    sweepGrad.addColorStop(0,"rgba(255,255,255,0)");
    sweepGrad.addColorStop(0.5,"rgba(255,255,255,0.18)");
    sweepGrad.addColorStop(1,"rgba(255,255,255,0)");
    mx2.save();
    mx2.beginPath();
    mx2.arc(mw/2,mh*0.42,mw*0.2,0,Math.PI*2);
    mx2.clip();
    mx2.fillStyle=sweepGrad;
    mx2.fillRect(sweepX-40,mh*0.25,80,mh*0.35);
    mx2.restore();

    // Text
    mx2.fillStyle=medalColor;
    mx2.font=`bold ${Math.round(mw*0.07)}px 'Courier New',monospace`;
    mx2.textAlign="center"; mx2.textBaseline="top";
    mx2.fillText(medalText, mw/2, mh*0.72);

    let lineY = mh*0.72 + mw*0.1;

    // Coins earned — image + number, own line
    if(coinsEarned>0){
      let coinSz = Math.round(mw*0.06);
      if(coinImg.complete && coinImg.naturalWidth){
        mx2.drawImage(coinImg, mw/2 - coinSz*1.4, lineY, coinSz, coinSz);
      }
      mx2.fillStyle="#ffd700";
      mx2.font=`bold ${Math.round(mw*0.05)}px 'Courier New',monospace`;
      mx2.textAlign="left";
      mx2.fillText("+"+coinsEarned, mw/2 - coinSz*0.2, lineY+coinSz*0.1);
      mx2.textAlign="center";
      lineY += coinSz*1.4;
    }

    // Nation — own line below coins
    mx2.fillStyle="#fff";
    mx2.font=`bold ${Math.round(mw*0.045)}px 'Courier New',monospace`;
    mx2.fillText(playerNation.flag+" "+playerNation.name, mw/2, lineY);
    lineY += mw*0.07;

    if(os.champion==="player"){
      mx2.fillStyle="#888";
      mx2.font=`${Math.round(mw*0.032)}px 'Courier New',monospace`;
      mx2.fillText("QU33PH OLYMPIC CHAMPION", mw/2, lineY);
    }

    // Sparkle particles
    particles.forEach(p=>{
      p.life += p.speed;
      if(p.life>1){ p.life=0; p.x=mw*0.1+Math.random()*mw*0.8; p.y=mh*0.15+Math.random()*mh*0.6; }
      p.x += p.vx; p.y += p.vy;
      p.angle += p.spin;
      let alpha = Math.sin(p.life*Math.PI);

      mx2.save();
      mx2.globalAlpha=alpha*0.9;
      mx2.translate(p.x,p.y);
      mx2.rotate(p.angle);
      mx2.fillStyle=medalColor;
      mx2.shadowColor=medalColor; mx2.shadowBlur=8;
      // 4-point star
      mx2.beginPath();
      let s=p.size;
      mx2.moveTo(0,-s); mx2.lineTo(s*0.25,-s*0.25);
      mx2.lineTo(s,0);  mx2.lineTo(s*0.25,s*0.25);
      mx2.lineTo(0,s);  mx2.lineTo(-s*0.25,s*0.25);
      mx2.lineTo(-s,0); mx2.lineTo(-s*0.25,-s*0.25);
      mx2.closePath(); mx2.fill();
      mx2.restore();
    });

    animId = requestAnimationFrame(drawMedal);
  }

  // Stop animation when leaving
  document.getElementById("medalScreen").dataset.animId = "";
  if(window._medalAnimId) cancelAnimationFrame(window._medalAnimId);
  drawMedal();
  window._medalAnimId = animId;

  // Show/hide Special Olympics button
  document.getElementById("medalSpecialBtn").style.display = canPlaySpecial ? "block" : "none";
}

function getMainBracketLosers(){
  const os = olympicsState;
  let losers = [];

  // QF losers (always known — pre-simmed)
  losers.push(os.qf1s1>os.qf1s2 ? os.n[1] : os.n[0]); // QF1 loser
  losers.push(os.qf2s1>os.qf2s2 ? os.n[3] : os.n[2]); // QF2 loser
  losers.push(os.qf3s1>os.qf3s2 ? os.n[5] : os.n[4]); // QF3 loser

  // QF4 loser (player or n[6])
  if(os.qf4Score!==null){
    losers.push(os.qf4Score>os.qf4Opp ? os.n[6] : playerNation);
  } else {
    losers.push(os.n[6]); // player hasn't played yet, put their opponent in
  }

  // SF1 loser (if played)
  if(os.sf1s1!==null){
    let qf1w=os.qf1s1>os.qf1s2?os.n[0]:os.n[1];
    let qf2w=os.qf2s1>os.qf2s2?os.n[2]:os.n[3];
    losers.push(os.sf1s1>os.sf1s2 ? qf2w : qf1w);
  }

  // SF2 loser (if played)
  if(os.sf2Score!==null){
    let qf3w=os.qf3s1>os.qf3s2?os.n[4]:os.n[5];
    losers.push(os.sf2Score>os.sf2Opp ? qf3w : playerNation);
  }

  // Remove player from losers list (they'll be the competitor)
  return losers.filter(n=>!n.isPlayer);
}

function startSpecialOlympics(){
  const losers = getMainBracketLosers();
  gameMode="specialolympics";

  // Build a Special Olympics state using the actual losers from main bracket
  // Fill up to 7 cpu slots with losers, pad with random nations if needed
  let pool = [...losers];
  if(pool.length < 7){
    let extras = NATIONS.filter(n=>!pool.find(p=>p.name===n.name)&&n.name!==playerNation.name);
    shuffle(extras);
    pool = [...pool, ...extras].slice(0,7);
  }
  shuffle(pool);

  let qf1s1=simulatedScore(), qf1s2=simulatedScore();
  let qf2s1=simulatedScore(), qf2s2=simulatedScore();
  let qf3s1=simulatedScore(), qf3s2=simulatedScore();
  if(qf1s1===qf1s2) qf1s2++;
  if(qf2s1===qf2s2) qf2s2++;
  if(qf3s1===qf3s2) qf3s2++;

  olympicsState = {
    n: [...pool.slice(0,7), playerNation],
    qf1s1,qf1s2,qf2s1,qf2s2,qf3s1,qf3s2,
    qf4Score:null,qf4Opp:null,
    sf2Score:null,sf2Opp:null,
    finScore:null,finOpp:null,
    sf1s1:null,sf1s2:null,
    round:1,
    playerEliminated:false,
    champion:null,
  };

  document.getElementById("medalScreen").style.display="none";
  if(window._medalAnimId){ cancelAnimationFrame(window._medalAnimId); window._medalAnimId=null; }
  showBracket();
}
