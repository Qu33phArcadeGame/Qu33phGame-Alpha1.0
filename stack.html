<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Stack</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#fff; touch-action:none; user-select:none; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#0b0d14; }
  #game{ display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const IMG={}; ['red','green','blue'].forEach(k=>{ const im=new Image(); im.src='stack'+k+'.png'; IMG[k]=im; });
function ready(im){ return im&&im.complete&&im.naturalWidth>0; }
const COLORS=['red','green','blue'], HEX={red:'#e23b3b',green:'#2fa84f',blue:'#3a63c8'};

// theme background (passed from arcade)
const THEME=(new URLSearchParams(location.search).get('theme')||'default');
const BG={ 'default':['#141a2c','#0a0c14'], 'cartoon':['#f2ead6','#d9cdb0'], 'neon':['#1a0a24','#08010f'],
           'sunset':['#3a1e40','#12060f'], 'galaxy':['#0d0a2a','#05030f'] };
const TXT={ 'cartoon':'#222', 'default':'#fff','neon':'#fff','sunset':'#fff','galaxy':'#fff' };

let CW=0,CH=0,DPR=1,ML=0,MW=0,PLATE_Y=0,PLATE_W=0;
function sz(){ const r=document.getElementById('wrap').getBoundingClientRect(); DPR=Math.min(2,window.devicePixelRatio||1);
  let ar=720/1280,w=r.width,h=w/ar; if(h>r.height){h=r.height;w=h*ar;}
  cv.style.width=w+'px'; cv.style.height=h+'px'; CW=Math.round(w*DPR); CH=Math.round(h*DPR); cv.width=CW; cv.height=CH;
  ML=Math.round(CW*0.42); MW=Math.round(CW*0.088); PLATE_W=Math.round(CW*0.36); PLATE_Y=Math.round(CH*0.80);
}
sz();

let M, engine, world, plate, cur=null, placed=[], camY=0, score=0, best=0, state='loading', overT=0;
try{ best=parseInt(localStorage.getItem('qu33phStackBest')||'0',10)||0; }catch(e){}

function boot(){
  M=window.Matter; if(!M){ setTimeout(boot,60); return; }
  engine=M.Engine.create(); world=engine.world; engine.gravity.y=1.1;
  state='title';
}
boot();

function startGame(){
  M.Composite.clear(world,false);
  plate=M.Bodies.rectangle(CW/2, PLATE_Y+MW*0.4, PLATE_W, MW*0.8, { isStatic:true, friction:1, label:'plate' });
  M.Composite.add(world, plate);
  placed=[]; score=0; camY=0; state='play'; overT=0;
  spawn();
}
function spawn(){
  const color=COLORS[placed.length%3];
  const topY = placed.length? Math.min(...placed.map(b=>b.position.y)) : PLATE_Y;
  const y = topY - ML*1.4;
  const b=M.Bodies.rectangle(CW/2, y, MW, ML, { chamfer:{radius:MW*0.45}, friction:0.7, frictionStatic:1, restitution:0.02, density:0.004, label:'marker' });
  b.color=color; b.held=true; b.dropped=false; b.settle=0;
  M.Body.setStatic(b,true);
  M.Composite.add(world,b); cur=b;
}

// ---- input: drag the current marker, release to drop ----
function pt(e){ const r=cv.getBoundingClientRect(); return { x:(e.clientX-r.left)/r.width*CW, y:(e.clientY-r.top)/r.height*CH - camY }; }
cv.addEventListener('pointerdown',e=>{
  if(state==='title'){ startGame(); return; }
  if(state==='over'){ if(overT<=0){ state='title'; } return; }
  if(state==='play' && cur && !cur.dropped){ cur.held=true; const p=pt(e); M.Body.setPosition(cur,{x:p.x,y:p.y}); M.Body.setAngle(cur,0); }
});
cv.addEventListener('pointermove',e=>{ if(state==='play'&&cur&&cur.held){ const p=pt(e); M.Body.setPosition(cur,{x:Math.max(MW,Math.min(CW-MW,p.x)),y:p.y}); M.Body.setAngle(cur,0); M.Body.setVelocity(cur,{x:0,y:0}); M.Body.setAngularVelocity(cur,0); } });
function release(){ if(state==='play'&&cur&&cur.held&&!cur.dropped){ cur.held=false; cur.dropped=true; M.Body.setStatic(cur,false); M.Body.setVelocity(cur,{x:0,y:0}); } }
window.addEventListener('pointerup',release); window.addEventListener('pointercancel',release);

function update(){
  if(state!=='play' && state!=='over'){ return; }
  if(state==='play' || (state==='over')) M.Engine.update(engine, 1000/60);
  if(state==='play' && cur && cur.dropped){
    if(cur.position.y > PLATE_Y+ML*0.8){ gameOver(); }        // fell past/off the plate
    else {
      const sp=Math.hypot(cur.velocity.x,cur.velocity.y)+Math.abs(cur.angularVelocity)*30;
      if(sp<0.4) cur.settle++; else cur.settle=0;
      if(cur.settle>16){ placed.push(cur); score=placed.length; if(score>best){best=score; try{localStorage.setItem('qu33phStackBest',best);}catch(e){}} cur=null; spawn(); }
    }
  }
  // any previously-placed marker fell off -> topple
  if(state==='play'){ for(const b of placed){ if(b.position.y > PLATE_Y+ML*1.1 || b.position.x<-ML || b.position.x>CW+ML){ gameOver(); break; } } }
  // camera follows tower top
  let topY = PLATE_Y; if(placed.length) topY=Math.min(topY, ...placed.map(b=>b.position.y)); if(cur) topY=Math.min(topY,cur.position.y);
  const target = CH*0.42 - topY; camY += (target-camY)*0.1;
  if(state==='over' && overT>0) overT--;
}
function gameOver(){ if(state==='over')return; state='over'; overT=80; }

function drawBody(b){
  const im=IMG[b.color];
  ctx.save(); ctx.translate(b.position.x, b.position.y+camY); ctx.rotate(b.angle);
  if(ready(im)){ const w=ML*(im.naturalWidth/im.naturalHeight); ctx.drawImage(im,-w/2,-ML/2,w,ML); }
  else { ctx.fillStyle=HEX[b.color]; rr(-MW/2,-ML/2,MW,ML,MW/2); ctx.fill(); }
  ctx.restore();
}
function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  const bg=BG[THEME]||BG.default, g=ctx.createLinearGradient(0,0,0,CH); g.addColorStop(0,bg[0]); g.addColorStop(1,bg[1]); ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  const txt=TXT[THEME]||'#fff';
  if(state==='title'){ drawTitle(txt); return; }
  if(state==='loading'){ ctx.fillStyle=txt; ctx.textAlign='center'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.fillText('loading…',CW/2,CH/2); return; }
  // plate
  ctx.fillStyle='#cfd6e0'; ctx.beginPath(); ctx.ellipse(plate.position.x, plate.position.y+camY, PLATE_W/2, MW*0.5, 0,0,7); ctx.fill();
  // markers
  for(const b of placed) drawBody(b);
  if(cur) drawBody(cur);
  // drop guide when holding
  if(cur&&cur.held){ ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.setLineDash([6,8]); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cur.position.x,0); ctx.lineTo(cur.position.x,CH); ctx.stroke(); ctx.setLineDash([]); }
  // HUD
  ctx.textAlign='center'; ctx.fillStyle=txt; ctx.font='bold '+Math.round(CW*0.12)+'px Helvetica'; ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8; ctx.fillText(score,CW/2,CH*0.12); ctx.shadowBlur=0;
  ctx.fillStyle='#7fddaa'; ctx.font='bold '+Math.round(CW*0.035)+'px Helvetica'; ctx.fillText('BEST '+best,CW/2,CH*0.16);
  if(cur&&!cur.dropped){ ctx.fillStyle=txt; ctx.globalAlpha=0.6; ctx.font='bold '+Math.round(CW*0.033)+'px Helvetica'; ctx.fillText('drag the marker · release to drop',CW/2,CH*0.94); ctx.globalAlpha=1; }
  if(state==='over'&&overT<=0){
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.1)+'px Helvetica'; ctx.fillText('TIMBER!',CW/2,CH*0.4);
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.16)+'px Helvetica'; ctx.fillText(score,CW/2,CH*0.53);
    ctx.fillStyle='#7fddaa'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.fillText('markers high · BEST '+best,CW/2,CH*0.59);
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.fillText('tap to play again',CW/2,CH*0.68);
  }
}
function drawTitle(txt){
  const cx=CW/2, base=CH*0.66;
  ['red','green','blue'].forEach((c,i)=>{ const im=IMG[c]; const y=base-i*ML*0.9; ctx.save(); ctx.translate(cx,y); if(ready(im)){ const w=ML*(im.naturalWidth/im.naturalHeight); ctx.drawImage(im,-w/2,-ML/2,w,ML);} ctx.restore(); });
  ctx.textAlign='center'; ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.11)+'px Helvetica'; ctx.fillText('QU33PH',CW/2,CH*0.2); ctx.fillText('STACK',CW/2,CH*0.2+Math.round(CW*0.12));
  ctx.fillStyle=txt; ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('drag & drop · build the tower',CW/2,CH*0.8);
  ctx.fillStyle='#7fddaa'; ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('BEST '+best,CW/2,CH*0.85);
  ctx.fillStyle=txt; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.fillText('▶ TAP TO START',CW/2,CH*0.91);
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize',()=>{ sz(); });
loop();
</script>
</body>
</html>
