<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Mini Golf</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#000; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#ffd54a; touch-action:none; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #cab{ position:relative; height:100vh; max-height:100vh; aspect-ratio:941/1672; }
  #cabImg{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; pointer-events:none; z-index:2; user-select:none; }
  #screen{ position:absolute; left:19.5%; top:26.6%; width:60.4%; height:50.8%; overflow:hidden; background:#0c2417; z-index:3; }
  #game{ width:100%; height:100%; display:block; }
  /* tappable control hotspots over the painted cabinet controls */
  .hot{ position:absolute; z-index:5; background:transparent; }
  .hot:active{ background:rgba(255,255,255,.14); border-radius:14px; }
  #hDpadL{ left:14%; top:79.5%; width:11%; height:10%; }
  #hDpadR{ left:25%; top:79.5%; width:11%; height:10%; }
  #hRed{ left:54%; top:79.5%; width:15%; height:10%; border-radius:50%; }
  #hBlue{ left:69.5%; top:79.5%; width:15%; height:10%; border-radius:50%; }
  .pill{ position:fixed; z-index:10; background:linear-gradient(#2a2a2a,#101010); color:#ffd54a; border:1.5px solid #ffcf3a; border-radius:20px; padding:8px 14px; font-size:12px; font-weight:bold; letter-spacing:1px; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,.5); }
  .pill:active{ transform:translateY(1px); }
  #hint{ position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:11px; color:#9a8; letter-spacing:1px; z-index:10; }
</style>
</head>
<body>
<div id="wrap">
  <div id="cab">
    <div id="screen"><canvas id="game"></canvas></div>
    <img id="cabImg" src="golfoverlay.png" alt="">
    <div class="hot" id="hDpadL"></div>
    <div class="hot" id="hDpadR"></div>
    <div class="hot" id="hRed"></div>
    <div class="hot" id="hBlue"></div>
  </div>
</div>
<div id="hint">D-PAD picks a course &middot; RED / BLUE starts &middot; then swipe to roll</div>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const cab=document.getElementById('cab');

const IMG={}; ['red','green','blue'].forEach(k=>{ const im=new Image(); im.crossOrigin='anonymous'; im.src=k+'.png'; IMG[k]=im; });
function ready(im){ return im && im.complete && im.naturalWidth>0; }

const MW=2400, MH=4200;
const FIELD_GREEN='#0c2417';
// ---- 18 holes: each loads golf1.png .. golf18.png; tee + mega auto-detected from the map ----
const HOLE_COUNT=18;
const LEVELS=[];
for(let i=1;i<=HOLE_COUNT;i++) LEVELS.push({ name:'HOLE '+i, file:'golf'+i+'.png', img:null, status:'idle', tee:null, mega:null });
let sel=0, level=LEVELS[0];
let MAP=null;   // current level's map image (set when a hole starts)
function loadHole(i){ const L=LEVELS[i]; if(L.status!=='idle') return; L.status='loading';
  const im=new Image(); im.crossOrigin='anonymous';
  im.onload=()=>{ L.img=im; L.status='ready'; }; im.onerror=()=>{ L.status='missing'; }; im.src=L.file; }

// ---- collision mask (built from the map's green pixels) ----
const MS=0.5, mw=Math.round(MW*MS), mh=Math.round(MH*MS);
let walk=null, wallCv=null, wallMask=null;
function buildMask(){
  try{
    const o=document.createElement('canvas'); o.width=mw; o.height=mh;
    const octx=o.getContext('2d'); octx.drawImage(MAP,0,0,mw,mh);
    const d=octx.getImageData(0,0,mw,mh).data;
    const m=new Uint8Array(mw*mh);
    // outline colors: magenta = out-of-bounds (PEEF), cyan = wall (bounce). red dot = mega target.
    const border=new Uint8Array(mw*mh), wallC=new Uint8Array(mw*mh); let hasBorder=false, rx=0,ry=0,rn=0;
    for(let i=0;i<mw*mh;i++){ const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
      if(r>120 && b>120 && g < Math.min(r,b)-35){ border[i]=1; hasBorder=true; }          // magenta + soft edge
      if(g>120 && b>120 && r < Math.min(g,b)-35){ border[i]=1; wallC[i]=1; hasBorder=true; } // cyan wall + soft edge
      if(r>150 && g<90 && b<90){ rx+=(i%mw); ry+=((i/mw)|0); rn++; }                         // red dot = mega
    }
    if(rn>0) level.mega={ x:(rx/rn)/MS, y:(ry/rn)/MS };
    else if(!level.mega) level.mega={ x:MW*0.78, y:MH*0.85 };
    if(hasBorder){
      // FIELD = inside the outline: flood-fill from the MEGA (always inside the lane), blocked by magenta/cyan + edges
      let sx=Math.max(0,Math.min(mw-1,(level.mega.x*MS)|0)), sy=Math.max(0,Math.min(mh-1,(level.mega.y*MS)|0));
      if(border[sy*mw+sx]){ let done=false; for(let R=1;R<25&&!done;R++)for(let dy=-R;dy<=R&&!done;dy++)for(let dx=-R;dx<=R&&!done;dx++){ const nx=sx+dx,ny=sy+dy; if(nx>=0&&ny>=0&&nx<mw&&ny<mh&&!border[ny*mw+nx]){ sx=nx;sy=ny;done=true; } } }
      const q=[sy*mw+sx]; m[sy*mw+sx]=1;
      while(q.length){ const idx=q.pop(), x=idx%mw, y=(idx/mw)|0;
        if(x>0){const n=idx-1; if(!m[n]&&!border[n]){m[n]=1;q.push(n);}}
        if(x<mw-1){const n=idx+1; if(!m[n]&&!border[n]){m[n]=1;q.push(n);}}
        if(y>0){const n=idx-mw; if(!m[n]&&!border[n]){m[n]=1;q.push(n);}}
        if(y<mh-1){const n=idx+mw; if(!m[n]&&!border[n]){m[n]=1;q.push(n);}}
      }
    } else {
      // no outline: field = everything that's not the dark-green background
      for(let i=0;i<mw*mh;i++){ const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
        const bg=(g>r+8 && g>b+3 && g<95 && r<75 && g>22); m[i]=bg?0:1; }
    }
    // auto-pick tee: lowest, left-most field cell with clearance for the ball
    const CLR=9, clr=(x,y)=>{ for(let dy=-CLR;dy<=CLR;dy+=3)for(let dx=-CLR;dx<=CLR;dx+=3){ const nx=x+dx,ny=y+dy; if(nx<0||ny<0||nx>=mw||ny>=mh||!m[ny*mw+nx]) return false; } return true; };
    let picked=false;
    for(let y=mh-1;y>=(mh*0.55|0)&&!picked;y--){ for(let x=(mw*0.03|0);x<(mw*0.58|0);x++){ if(m[y*mw+x]&&clr(x,y)){ level.tee={x:x/MS,y:y/MS}; picked=true; break; } } }
    if(!picked) level.tee={ x:MW*0.13, y:MH*0.95 };
    walk=m;
    // dilate cyan walls a touch so fast balls reliably register the bounce
    wallMask=new Uint8Array(mw*mh);
    for(let y=0;y<mh;y++) for(let x=0;x<mw;x++){ if(!wallC[y*mw+x]) continue;
      for(let dy=-1;dy<=1;dy++){ const ny=y+dy; if(ny<0||ny>=mh) continue;
        for(let dx=-1;dx<=1;dx++){ const nx=x+dx; if(nx<0||nx>=mw) continue; wallMask[ny*mw+nx]=1; } } }
    buildWallOverlay();
  }catch(e){ walk=null; }   // never black-screen: if pixel read fails, field is open
}
function buildWallOverlay(){
  // opaque dark-green everywhere that ISN'T the lane, dilated a touch to bury the magenta line's soft edge
  const R=2, wall=new Uint8Array(mw*mh);
  for(let i=0;i<mw*mh;i++) wall[i]=(walk[i]===0)?1:0;
  const dil=new Uint8Array(wall);
  for(let y=0;y<mh;y++) for(let x=0;x<mw;x++){ if(!wall[y*mw+x]) continue;
    for(let dy=-R;dy<=R;dy++){ const ny=y+dy; if(ny<0||ny>=mh) continue;
      for(let dx=-R;dx<=R;dx++){ const nx=x+dx; if(nx<0||nx>=mw) continue; dil[ny*mw+nx]=1; } } }
  wallCv=document.createElement('canvas'); wallCv.width=mw; wallCv.height=mh;
  const wx=wallCv.getContext('2d'); const img=wx.createImageData(mw,mh), d=img.data;
  for(let i=0;i<mw*mh;i++){ if(dil[i]){ d[i*4]=12; d[i*4+1]=36; d[i*4+2]=23; d[i*4+3]=255; } else { d[i*4+3]=0; } }
  wx.putImageData(img,0,0);
}
function green(mx,my){
  if(!walk) return mx>0&&my>0&&mx<MW&&my<MH;     // fallback: whole map playable
  const ix=(mx*MS)|0, iy=(my*MS)|0;
  if(ix<0||iy<0||ix>=mw||iy>=mh) return false;
  return walk[iy*mw+ix]===1;
}
function isWall(mx,my){   // cyan bounce-wall?
  if(!wallMask) return false;
  const ix=(mx*MS)|0, iy=(my*MS)|0;
  if(ix<0||iy<0||ix>=mw||iy>=mh) return false;
  return wallMask[iy*mw+ix]===1;
}

// ---- view ----
let CW=600, CH=891, ZOOM=0.6, camX=0, camY=0;
function sizeCanvas(){
  const r=document.getElementById('screen').getBoundingClientRect();
  const dpr=Math.min(2, window.devicePixelRatio||1);
  CW=Math.max(1,Math.round(r.width*dpr)); CH=Math.max(1,Math.round(r.height*dpr));
  cv.width=CW; cv.height=CH; ZOOM=CW/820;
}
window.addEventListener('resize',sizeCanvas);

// ---- state ----
let mode='menu';   // 'menu' | 'play'
let ball={x:0,y:0,vx:0,vy:0,roll:0}, moving=false, sunk=false, throws=0, outFlash=0;
const BR=34;
function startLevel(){ const L=LEVELS[sel]; if(L.status!=='ready') return; level=L; MAP=L.img; buildMask(); ball={x:level.tee.x,y:level.tee.y,vx:0,vy:0,roll:0}; moving=false; sunk=false; throws=0; outFlash=0; lastRest={x:level.tee.x,y:level.tee.y}; mode='play'; }
function toMenu(){ mode='menu'; }
let lastRest={x:0,y:0};
function resetToTee(){ ball.x=lastRest.x; ball.y=lastRest.y; ball.vx=ball.vy=0; ball.roll=0; moving=false; outFlash=48; }   // PEEF -> back to where you last were

// ---- flick input (play only) ----
let flick=[];
function toScreen(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)/r.width*CW, y:(t.clientY-r.top)/r.height*CH}; }
cv.addEventListener('pointerdown',e=>{ if(mode!=='play'||moving||sunk)return; const p=toScreen(e); flick=[{x:p.x,y:p.y,t:performance.now()}]; });
cv.addEventListener('pointermove',e=>{ if(mode!=='play'||moving||sunk||!flick.length)return; const p=toScreen(e); flick.push({x:p.x,y:p.y,t:performance.now()}); if(flick.length>7)flick.shift(); });
cv.addEventListener('pointerup',e=>{
  if(mode!=='play'||moving||sunk||flick.length<2){ flick=[]; return; }
  const now=performance.now();
  let rec=flick.filter(p=>now-p.t<120); if(rec.length<2) rec=flick.slice(-2);
  const a=rec[0], b=rec[rec.length-1], dt=Math.max(8,b.t-a.t);
  let vx=(b.x-a.x)/dt, vy=(b.y-a.y)/dt, sp=Math.hypot(vx,vy); flick=[];
  if(sp<0.25) return;
  lastRest={x:ball.x,y:ball.y};                 // remember where this throw started, for PEEF
  let launch=Math.min(sp*16,28)/ZOOM;           // higher cap = further throws
  ball.vx=vx/sp*launch; ball.vy=vy/sp*launch; moving=true; throws++;
});

// ---- control buttons ----
function tap(id,fn){ const el=document.getElementById(id); el.addEventListener('click',fn); }
tap('hDpadL',()=>{ if(mode==='menu'){ sel=(sel-1+LEVELS.length)%LEVELS.length; loadHole(sel); } });
tap('hDpadR',()=>{ if(mode==='menu'){ sel=(sel+1)%LEVELS.length; loadHole(sel); } });
tap('hRed',()=>{ if(mode==='menu') startLevel(); else { ball={x:level.tee.x,y:level.tee.y,vx:0,vy:0,roll:0}; lastRest={x:level.tee.x,y:level.tee.y}; moving=false; sunk=false; throws=0; } }); // RED: start / reset to tee
tap('hBlue',()=>{ if(mode==='menu') startLevel(); else toMenu(); });  // BLUE: start / back to menu

// ---- physics ----
function step(){
  if(mode!=='play'||!moving) return;
  let sp=Math.hypot(ball.vx,ball.vy); const steps=Math.max(1,Math.ceil(sp/6));
  for(let s=0;s<steps;s++){
    let nx=ball.x+ball.vx/steps, ny=ball.y+ball.vy/steps;
    // X axis
    if(nx<0||nx>MW||!green(nx,ball.y)){ if(isWall(nx,ball.y)){ ball.vx=-ball.vx*0.15; } else { resetToTee(); return; } }
    else ball.x=nx;
    // Y axis
    if(ny<0||ny>MH||!green(ball.x,ny)){ if(isWall(ball.x,ny)){ ball.vy=-ball.vy*0.15; } else { resetToTee(); return; } }
    else ball.y=ny;
  }
  ball.roll+=Math.hypot(ball.vx,ball.vy)*0.05; ball.vx*=0.987; ball.vy*=0.987;
  if(Math.hypot(ball.vx,ball.vy)<0.15){ ball.vx=ball.vy=0; moving=false; }
}
function checkMega(){ if(mode==='play'&&!sunk&&Math.hypot(ball.x-level.mega.x,ball.y-level.mega.y)<70){ sunk=true; moving=false; ball.vx=ball.vy=0; } }

// ---- draw ----
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fitRect(iw,ih,x,y,w,h){ const s=Math.min(w/iw,h/ih); const dw=iw*s,dh=ih*s; return {x:x+(w-dw)/2,y:y+(h-dh)/2,w:dw,h:dh}; }

function drawMenu(){
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle='#08150e'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';
  ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.075)+'px Helvetica'; ctx.fillText('SELECT COURSE',CW/2,CH*0.11);
  const L=LEVELS[sel];
  const cw=CW*0.66, ch=CH*0.5, cx=(CW-cw)/2, cy=CH*0.17;
  ctx.fillStyle='#0c2417'; ctx.strokeStyle='#ffcf3a'; ctx.lineWidth=Math.max(2,CW*0.006);
  rr(cx,cy,cw,ch,14); ctx.fill(); ctx.stroke();
  if(L.status==='ready'){ const f=fitRect(L.img.width,L.img.height,cx+8,cy+8,cw-16,ch-16); ctx.drawImage(L.img,f.x,f.y,f.w,f.h); }
  else if(L.status==='missing'){ ctx.fillStyle='#8fa8a0'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.fillText('NO MAP YET', CW/2, cy+ch*0.46); ctx.fillStyle='#6a7d74'; ctx.font='bold '+Math.round(CW*0.032)+'px Helvetica'; ctx.fillText('upload '+L.file, CW/2, cy+ch*0.57); }
  else { ctx.fillStyle='#7a8d84'; ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('LOADING\u2026', CW/2, cy+ch*0.5); }
  ctx.fillStyle='#eafff0'; ctx.font='bold '+Math.round(CW*0.052)+'px Helvetica';
  ctx.fillText(L.name, CW/2, cy+ch+CH*0.052);
  ctx.fillStyle='#7fddaa'; ctx.font='bold '+Math.round(CW*0.034)+'px Helvetica';
  ctx.fillText((sel+1)+' / '+LEVELS.length, CW/2, cy+ch+CH*0.088);
  ctx.fillStyle='#9fe3b8'; ctx.font='bold '+Math.round(CW*0.038)+'px Helvetica';
  ctx.fillText('\u25c0  D-PAD  \u25b6', CW/2, CH*0.83);
  if(L.status==='ready'){ ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.fillText('RED / BLUE  \u25b6  START', CW/2, CH*0.9); }
  else { ctx.fillStyle='#66756c'; ctx.font='bold '+Math.round(CW*0.042)+'px Helvetica'; ctx.fillText(L.status==='missing'?'no map to play':'loading\u2026', CW/2, CH*0.9); }
}

function drawPlay(){
  const viewW=CW/ZOOM, viewH=CH/ZOOM;
  camX=Math.max(0,Math.min(MW-viewW, ball.x-viewW/2));
  camY=Math.max(0,Math.min(MH-viewH, ball.y-viewH/2));
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle=FIELD_GREEN; ctx.fillRect(0,0,CW,CH);
  if(ready(MAP)) ctx.drawImage(MAP,camX,camY,viewW,viewH,0,0,CW,CH);
  if(wallCv) ctx.drawImage(wallCv, camX*MS,camY*MS,viewW*MS,viewH*MS, 0,0,CW,CH);   // clean: hide magenta + non-lane
  const w2s=(wx,wy)=>({x:(wx-camX)*ZOOM,y:(wy-camY)*ZOOM});
  // mega markers
  const m=w2s(level.mega.x,level.mega.y), mk=90*ZOOM;
  ctx.save(); ctx.translate(m.x,m.y); ctx.shadowColor='#fff'; ctx.shadowBlur=sunk?26:12;
  if(ready(IMG.red)&&ready(IMG.green)){ ctx.drawImage(IMG.green,-mk*1.05,-mk,mk,mk*2); ctx.drawImage(IMG.red,-mk*0.02,-mk,mk,mk*2); }
  else { ctx.fillStyle='#2fd66e'; rr(-mk*0.95,-9,mk*0.9,18,6); ctx.fill(); ctx.fillStyle='#ff3b4a'; rr(0,-9,mk*0.9,18,6); ctx.fill(); }
  ctx.restore();
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.setLineDash([5,5]); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(m.x,m.y,70*ZOOM,0,7); ctx.stroke(); ctx.restore();
  // ball
  const p=w2s(ball.x,ball.y);
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ball.roll); ctx.shadowColor='#3a7bff'; ctx.shadowBlur=moving?16:9;
  if(ready(IMG.blue)){ const s=BR*2.4*ZOOM; ctx.drawImage(IMG.blue,-s*0.32,-s/2,s*0.64,s); }
  else { const g=ctx.createRadialGradient(-4,-4,2,0,0,BR*ZOOM); g.addColorStop(0,'#bcd4ff'); g.addColorStop(.5,'#3a7bff'); g.addColorStop(1,'#1741a8'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,BR*ZOOM,0,7); ctx.fill(); }
  ctx.restore();
  // HUD
  ctx.setTransform(1,0,0,1,0,0); ctx.textAlign='left'; ctx.fillStyle='#eafff0'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica';
  ctx.fillText('THROWS '+throws, CW*0.05, CH*0.06);
  ctx.textAlign='right'; ctx.fillText(sunk?'QU33PH! \u26f3':'REACH THE MEGA', CW*0.95, CH*0.06);
  if(sunk){ ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.09)+'px Helvetica'; ctx.fillText('QU33PH!', CW/2, CH*0.5);
    ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.fillText('BLUE \u25b6 MENU', CW/2, CH*0.58); }
  if(outFlash>0){ ctx.textAlign='center'; ctx.globalAlpha=Math.min(1,outFlash/20); ctx.fillStyle='#ff5a5a'; ctx.font='bold '+Math.round(CW*0.12)+'px Helvetica'; ctx.fillText('PEEF!', CW/2, CH*0.44); ctx.globalAlpha=1; outFlash--; }
}

function draw(){ if(mode==='menu') drawMenu(); else drawPlay(); }
function loop(){ step(); checkMega(); draw(); requestAnimationFrame(loop); }

// ---- boot (draw first, build mask when ready — never blocks the screen) ----
sizeCanvas(); loadHole(0); loop();
</script>
</body>
</html>
