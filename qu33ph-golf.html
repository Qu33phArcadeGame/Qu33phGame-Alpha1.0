<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Mini Golf</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#000; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#ffd54a; touch-action:none; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #cab{ position:relative; height:100vh; max-height:100vh; aspect-ratio:941/1672; }
  #cabImg{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; pointer-events:none; z-index:2; user-select:none; }
  #screen{ position:absolute; left:17.7%; top:25.4%; width:64.0%; height:53.4%; overflow:hidden; background:#0c2417; z-index:3; }
  #game{ width:100%; height:100%; display:block; }
  /* tappable control hotspots over the painted cabinet controls */
  .hot{ position:absolute; z-index:5; background:transparent; }
  .hot:active{ background:rgba(255,255,255,.14); border-radius:14px; }
  #hDpad{ left:14%; top:79.5%; width:22%; height:10%; }
  #hRed{ left:54%; top:79.5%; width:15%; height:10%; border-radius:50%; }
  #hBlue{ left:69.5%; top:79.5%; width:15%; height:10%; border-radius:50%; }
  .pill{ position:fixed; z-index:10; background:linear-gradient(#2a2a2a,#101010); color:#ffd54a; border:1.5px solid #ffcf3a; border-radius:20px; padding:8px 14px; font-size:12px; font-weight:bold; letter-spacing:1px; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,.5); }
  .pill:active{ transform:translateY(1px); }
  #fsBtn{ top:10px; left:12px; }
  #hint{ position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:11px; color:#9a8; letter-spacing:1px; z-index:10; }
</style>
</head>
<body>
<div id="wrap">
  <div id="cab">
    <div id="screen"><canvas id="game"></canvas></div>
    <img id="cabImg" src="golfoverlay.png" alt="">
    <div class="hot" id="hDpad"></div>
    <div class="hot" id="hRed"></div>
    <div class="hot" id="hBlue"></div>
  </div>
</div>
<button class="pill" id="fsBtn">&#9974; FULLSCREEN</button>
<div id="hint">D-PAD picks a course &middot; RED / BLUE starts &middot; then swipe to roll</div>

<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const cab=document.getElementById('cab');

const MAP=new Image(); MAP.crossOrigin='anonymous'; MAP.src='golf.png';
let mapFail=false; MAP.onerror=()=>{ mapFail=true; };
const IMG={}; ['red','green','blue'].forEach(k=>{ const im=new Image(); im.crossOrigin='anonymous'; im.src=k+'.png'; IMG[k]=im; });
function ready(im){ return im && im.complete && im.naturalWidth>0; }

const MW=2400, MH=4200;
const FIELD_GREEN='#0c2417';
// ---- levels (only 1 for now; add more here) ----
const LEVELS=[
  { name:'HOLE 1 — THE ATRIUM', tee:{x:1031,y:4031}, mega:{x:1880,y:3586},
    bridge:{x0:1850,y0:3555,x1:1950,y1:3712} }
];
let sel=0, level=LEVELS[0];

// ---- collision mask (built from the map's green pixels) ----
const MS=0.25, mw=Math.round(MW*MS), mh=Math.round(MH*MS);
let walk=null;
function buildMask(){
  try{
    const o=document.createElement('canvas'); o.width=mw; o.height=mh;
    const octx=o.getContext('2d'); octx.drawImage(MAP,0,0,mw,mh);
    const d=octx.getImageData(0,0,mw,mh).data;
    const m=new Uint8Array(mw*mh);
    for(let i=0;i<mw*mh;i++){ const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
      m[i]=(g>r+8 && g>b+3 && g<95 && r<75 && g>22)?1:0; }
    const B=level.bridge;
    const bx0=(B.x0*MS)|0,bx1=(B.x1*MS)|0,by0=(B.y0*MS)|0,by1=(B.y1*MS)|0;
    for(let y=by0;y<=by1;y++) for(let x=bx0;x<=bx1;x++) if(x>=0&&x<mw&&y>=0&&y<mh) m[y*mw+x]=1;
    walk=m;
  }catch(e){ walk=null; }   // never black-screen: if pixel read fails, field is open
}
function green(mx,my){
  if(!walk) return mx>0&&my>0&&mx<MW&&my<MH;     // fallback: whole map playable
  const ix=(mx*MS)|0, iy=(my*MS)|0;
  if(ix<0||iy<0||ix>=mw||iy>=mh) return false;
  return walk[iy*mw+ix]===1;
}

// ---- view ----
let CW=600, CH=891, ZOOM=0.6, camX=0, camY=0;
function sizeCanvas(){
  const r=document.getElementById('screen').getBoundingClientRect();
  const dpr=Math.min(2, window.devicePixelRatio||1);
  CW=Math.max(1,Math.round(r.width*dpr)); CH=Math.max(1,Math.round(r.height*dpr));
  cv.width=CW; cv.height=CH; ZOOM=CW/1000;
}
window.addEventListener('resize',sizeCanvas);

// ---- state ----
let mode='menu';   // 'menu' | 'play'
let ball={x:0,y:0,vx:0,vy:0,roll:0}, moving=false, sunk=false, throws=0;
const BR=34;
function startLevel(){ level=LEVELS[sel]; buildMask(); ball={x:level.tee.x,y:level.tee.y,vx:0,vy:0,roll:0}; moving=false; sunk=false; throws=0; mode='play'; }
function toMenu(){ mode='menu'; }

// ---- flick input (play only) ----
let flick=[];
function toScreen(e){ const r=cv.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:(t.clientX-r.left)/r.width*CW, y:(t.clientY-r.top)/r.height*CH}; }
cv.addEventListener('pointerdown',e=>{ if(mode!=='play'||moving||sunk)return; const p=toScreen(e); flick=[{x:p.x,y:p.y,t:performance.now()}]; });
cv.addEventListener('pointermove',e=>{ if(mode!=='play'||moving||sunk||!flick.length)return; const p=toScreen(e); flick.push({x:p.x,y:p.y,t:performance.now()}); if(flick.length>7)flick.shift(); });
cv.addEventListener('pointerup',e=>{
  if(mode!=='play'||moving||sunk||flick.length<2){ flick=[]; return; }
  const now=performance.now();
  let rec=flick.filter(p=>now-p.t<120); if(rec.length<2) rec=flick.slice(-2);
  const a=rec[0], b=rec[rec.length-1], dt=Math.max(8,b.t-a.t);
  let vx=(b.x-a.x)/dt, vy=(b.y-a.y)/dt, sp=Math.hypot(vx,vy); flick=[];
  if(sp<0.25) return;
  let launch=Math.min(sp*16,20)/ZOOM;
  ball.vx=vx/sp*launch; ball.vy=vy/sp*launch; moving=true; throws++;
});

// ---- control buttons ----
function tap(id,fn){ const el=document.getElementById(id); el.addEventListener('click',fn); }
tap('hDpad',()=>{ if(mode==='menu'){ sel=(sel+1)%LEVELS.length; } });
tap('hRed',()=>{ if(mode==='menu') startLevel(); else { ball={x:level.tee.x,y:level.tee.y,vx:0,vy:0,roll:0}; moving=false; sunk=false; throws=0; } }); // RED: start / reset ball
tap('hBlue',()=>{ if(mode==='menu') startLevel(); else toMenu(); });  // BLUE: start / back to menu

// ---- physics ----
function step(){
  if(mode!=='play'||!moving) return;
  let sp=Math.hypot(ball.vx,ball.vy); const steps=Math.max(1,Math.ceil(sp/6));
  for(let s=0;s<steps;s++){
    let nx=ball.x+ball.vx/steps;
    if(nx<BR||nx>MW-BR||!green(nx,ball.y)) ball.vx=-ball.vx*0.62; else ball.x=nx;
    let ny=ball.y+ball.vy/steps;
    if(ny<BR||ny>MH-BR||!green(ball.x,ny)) ball.vy=-ball.vy*0.62; else ball.y=ny;
  }
  ball.roll+=Math.hypot(ball.vx,ball.vy)*0.05; ball.vx*=0.985; ball.vy*=0.985;
  if(Math.hypot(ball.vx,ball.vy)<0.15){ ball.vx=ball.vy=0; moving=false; }
}
function checkMega(){ if(mode==='play'&&!sunk&&Math.hypot(ball.x-level.mega.x,ball.y-level.mega.y)<70){ sunk=true; moving=false; ball.vx=ball.vy=0; } }

// ---- draw ----
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fitRect(iw,ih,x,y,w,h){ const s=Math.min(w/iw,h/ih); const dw=iw*s,dh=ih*s; return {x:x+(w-dw)/2,y:y+(h-dh)/2,w:dw,h:dh}; }

function drawMenu(){
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle='#08150e'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center'; ctx.fillStyle='#ffd54a';
  ctx.font='bold '+Math.round(CW*0.075)+'px Helvetica'; ctx.fillText('SELECT COURSE',CW/2,CH*0.12);
  // card
  const cw=CW*0.66, ch=CH*0.5, cx=(CW-cw)/2, cy=CH*0.18;
  ctx.fillStyle='#0c2417'; ctx.strokeStyle='#ffcf3a'; ctx.lineWidth=Math.max(2,CW*0.006);
  rr(cx,cy,cw,ch,14); ctx.fill(); ctx.stroke();
  if(ready(MAP)){ const f=fitRect(MW,MH,cx+8,cy+8,cw-16,ch-16); ctx.drawImage(MAP,f.x,f.y,f.w,f.h); }
  else if(mapFail){ ctx.fillStyle='#ff8a8a'; ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('map not found',CW/2,cy+ch/2); }
  ctx.fillStyle='#eafff0'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica';
  ctx.fillText(LEVELS[sel].name, CW/2, cy+ch+CH*0.06);
  ctx.fillStyle='#9fe3b8'; ctx.font='bold '+Math.round(CW*0.038)+'px Helvetica';
  ctx.fillText('\u25c0  D-PAD  \u25b6', CW/2, CH*0.82);
  ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica';
  ctx.fillText('RED / BLUE  \u25b6  START', CW/2, CH*0.9);
}

function drawPlay(){
  const viewW=CW/ZOOM, viewH=CH/ZOOM;
  camX=Math.max(0,Math.min(MW-viewW, ball.x-viewW/2));
  camY=Math.max(0,Math.min(MH-viewH, ball.y-viewH/2));
  ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle=FIELD_GREEN; ctx.fillRect(0,0,CW,CH);
  if(ready(MAP)) ctx.drawImage(MAP,camX,camY,viewW,viewH,0,0,CW,CH);
  const w2s=(wx,wy)=>({x:(wx-camX)*ZOOM,y:(wy-camY)*ZOOM});
  const B=level.bridge; ctx.fillStyle=FIELD_GREEN; const b0=w2s(B.x0,B.y0),b1=w2s(B.x1,B.y1);
  ctx.fillRect(b0.x,b0.y,b1.x-b0.x,b1.y-b0.y);
  // mega markers
  const m=w2s(level.mega.x,level.mega.y), mk=90*ZOOM;
  ctx.save(); ctx.translate(m.x,m.y); ctx.shadowColor='#fff'; ctx.shadowBlur=sunk?26:12;
  if(ready(IMG.red)&&ready(IMG.green)){ ctx.drawImage(IMG.green,-mk*1.05,-mk,mk,mk*2); ctx.drawImage(IMG.red,-mk*0.02,-mk,mk,mk*2); }
  else { ctx.fillStyle='#2fd66e'; rr(-mk*0.95,-9,mk*0.9,18,6); ctx.fill(); ctx.fillStyle='#ff3b4a'; rr(0,-9,mk*0.9,18,6); ctx.fill(); }
  ctx.restore();
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.setLineDash([5,5]); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(m.x,m.y,70*ZOOM,0,7); ctx.stroke(); ctx.restore();
  // ball
  const p=w2s(ball.x,ball.y);
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(ball.roll); ctx.shadowColor='#3a7bff'; ctx.shadowBlur=moving?16:9;
  if(ready(IMG.blue)){ const s=BR*2.4*ZOOM; ctx.drawImage(IMG.blue,-s*0.32,-s/2,s*0.64,s); }
  else { const g=ctx.createRadialGradient(-4,-4,2,0,0,BR*ZOOM); g.addColorStop(0,'#bcd4ff'); g.addColorStop(.5,'#3a7bff'); g.addColorStop(1,'#1741a8'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,BR*ZOOM,0,7); ctx.fill(); }
  ctx.restore();
  // HUD
  ctx.setTransform(1,0,0,1,0,0); ctx.textAlign='left'; ctx.fillStyle='#eafff0'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica';
  ctx.fillText('THROWS '+throws, CW*0.05, CH*0.06);
  ctx.textAlign='right'; ctx.fillText(sunk?'QU33PH! \u26f3':'REACH THE MEGA', CW*0.95, CH*0.06);
  if(sunk){ ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.09)+'px Helvetica'; ctx.fillText('QU33PH!', CW/2, CH*0.5);
    ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.fillText('BLUE \u25b6 MENU', CW/2, CH*0.58); }
}

function draw(){ if(mode==='menu') drawMenu(); else drawPlay(); }
function loop(){ step(); checkMega(); draw(); requestAnimationFrame(loop); }

// ---- buttons ----
document.getElementById('fsBtn').onclick=()=>{
  if(!document.fullscreenElement){ (cab.requestFullscreen?cab.requestFullscreen():cab.webkitRequestFullscreen&&cab.webkitRequestFullscreen()); }
  else { document.exitFullscreen?document.exitFullscreen():document.webkitExitFullscreen&&document.webkitExitFullscreen(); }
};
document.addEventListener('fullscreenchange',()=>setTimeout(sizeCanvas,60));

// ---- boot (draw first, build mask when ready — never blocks the screen) ----
sizeCanvas(); loop();
if(ready(MAP)) buildMask(); else MAP.addEventListener('load',()=>{ /* mask builds on Start */ });
</script>
</body>
</html>
