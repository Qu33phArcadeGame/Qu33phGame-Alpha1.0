<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Flip</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#fff; touch-action:none; user-select:none; background:#000; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{ position:relative; }
  #game{ display:block; }
  #orientBtn{ position:absolute; left:10px; bottom:12px; width:46px; height:46px; padding:0; border-radius:50%;
    border:2px solid #666; background:rgba(18,18,22,0.85); cursor:pointer; display:flex; align-items:center;
    justify-content:center; z-index:5; -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>
<div id="wrap"><div id="stage"><canvas id="game"></canvas><button id="orientBtn"><span id="orientIcon"></span></button></div></div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const sc=document.createElement('canvas'), sx2=sc.getContext('2d');   // scene layer (gets the theme effect)
const THEME=(new URLSearchParams(location.search).get('theme')||'default').toLowerCase();

// ─── assets ───────────────────────────────────────────────────────────────
function IMG(src){ const i=new Image(); i.src=src; return i; }
function ready(im){ return im && im.complete && im.naturalWidth>0; }
const MARKER = IMG(THEME==='cartoon' ? 'blueC.png' : 'blue.png');
const CHAIR  = IMG('Chair.png');
const FIELD  = IMG('originalfield.png');
const WIN_R  = IMG('window.png');
const WIN_P  = IMG('windowP.png');
const TREES_R= ['tree1.png','tree2.png','tree3.png','tree4.png','tree5.png','tree6.png'].map(IMG);
const TREES_P= [IMG('treeP.png')];

// themed areas — real arcade theme names, each with its own effect
const ZONES=[
  { name:'DEFAULT',      style:'default', accent:'#8affea', fx:''                                        },
  { name:'COMIC',        style:'comic',   accent:'#141414', fx:'grayscale(1) contrast(1.2)'              },
  { name:'NEON',         style:'neon',    accent:'#28ff82', fx:'saturate(1.7) brightness(1.1)'           },
  { name:'GOLDEN HOUR',  style:'sunset',  accent:'#ffd24a', fx:'sepia(0.55) saturate(1.7) brightness(1.1)'},
  { name:'GALAXY',       style:'galaxy',  accent:'#c9a0ff', fx:'hue-rotate(215deg) saturate(1.4)'        }
];
const CANFILTER = (function(){ try{ const t=document.createElement('canvas').getContext('2d'); t.filter='grayscale(1)'; return t.filter==='grayscale(1)'; }catch(e){ return false; } })();

// ─── canvas ───────────────────────────────────────────────────────────────
let CW=0,CH=0,DPR=1;
function sz(){
  const r=document.getElementById('wrap').getBoundingClientRect();
  DPR=Math.min(2,window.devicePixelRatio||1);
  const cw=r.width, ch=r.height;
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
  const st=document.getElementById('stage'); st.style.width=cw+'px'; st.style.height=ch+'px';
  CW=Math.round(cw*DPR); CH=Math.round(ch*DPR); cv.width=CW; cv.height=CH;
  sc.width=CW; sc.height=CH;
}
sz();

// ─── camera ───────────────────────────────────────────────────────────────
const Z=0.60, ANCHOR=0.70, HOLD=0.16;
function AY(){ return CH*ANCHOR; }
function SX(wx){ return (wx-camX)*Z; }
function SY(wy){ const a=AY(); return a+(wy-a)*Z; }

// ─── world ────────────────────────────────────────────────────────────────
function G(){ return 0.0018*CH; }
function MH(){ return 0.085*CH; }
function chairH(){ return CH*0.105; }
function chairW(){ return ready(CHAIR) ? chairH()*(CHAIR.naturalWidth/CHAIR.naturalHeight) : CH*0.085; }
function rnd(a,b){ return a+Math.random()*(b-a); }
// furthest a full-power flip can travel, landing dy below the launch point
function maxReach(dy){
  const g=G(), vx=0.022*CW, vy=-0.038*CH;
  const t=(-vy+Math.sqrt(Math.max(0.0001, vy*vy+2*g*dy)))/g;
  return vx*t;
}

let plats, marker, camX, score, best, bestP, combo, state, charge, charging, popups,
    zoneIdx, zoneLeft, zonePix, banner, settle, lastFlat, stairLeft, stairStep;
try{ best =parseInt(localStorage.getItem('qu33phFlipBest') ||'0',10)||0; }catch(e){ best=0; }
try{ bestP=parseInt(localStorage.getItem('qu33phFlipBestP')||'0',10)||0; }catch(e){ bestP=0; }

function nextZone(){
  zoneIdx=(zoneIdx + 1 + Math.floor(Math.random()*(ZONES.length-1))) % ZONES.length;
  zonePix=Math.random()<0.5;
  zoneLeft=6+Math.floor(Math.random()*4);
}
function addPlatform(){
  const n=plats.length, last=plats[n-1];
  const hard = n>25;                                   // ramps up only after 25
  const d    = hard ? Math.min(1,(n-25)/40) : 0;
  if(zoneLeft<=0) nextZone();
  zoneLeft--;

  // stairs: runs of steady up/down steps once it gets hard
  if(hard && stairLeft<=0 && Math.random()<0.24){
    stairLeft = 3+((Math.random()*3)|0);
    stairStep = (Math.random()<0.5?-1:1)*rnd(0.028,0.050)*CH;
  }

  // an uneven pad is always narrow and close, so the flat pad after it stays in range
  const uneven = (!last.uneven) && n>6 && Math.random() < (hard ? 0.10+d*0.15 : 0.05);
  let w   = uneven ? rnd(0.16,0.23)*CW
                   : (hard ? rnd(0.24,0.33)*CW - d*0.04*CW : rnd(0.30,0.40)*CW);
  let gap = uneven ? rnd(0.10,0.15)*CW
                   : (hard ? rnd(0.14,0.21)*CW + d*0.08*CW : rnd(0.11,0.17)*CW);

  let y;
  if(stairLeft>0){ y=last.y+stairStep; stairLeft--; }
  else { y = last.y + (hard? rnd(-0.045,0.045) : rnd(-0.018,0.018))*CH; }
  y = Math.max(CH*0.46, Math.min(CH*0.80, y));

  let x = last.x + last.w + gap;

  // ── hard guarantee: the next FLAT pad is always reachable from the last FLAT pad ──
  if(!uneven){
    const lf=plats[lastFlat];
    const lim=maxReach(y-lf.y)*0.86;                   // 14% headroom
    if(x-lf.x > lim) x = lf.x + lim;                   // pull it back into range
    const minX = last.x + last.w + CW*0.05;            // but never overlap the pad before it
    if(x < minX){ x = minX; }
  }
  const chair = !uneven && n>3 && Math.random()<0.15;
  plats.push({ x,y,w,uneven,chair, chairHit:false, zone:zoneIdx, pix:zonePix,
               seed:Math.random(), seed2:Math.random() });
  if(!uneven) lastFlat=plats.length-1;
}
function reset(){
  plats=[]; zoneIdx=0; zoneLeft=8; zonePix=false; camX=0; score=0; combo=0; popups=[];
  banner=0; settle=0; lastFlat=0; stairLeft=0; stairStep=0;
  plats.push({ x:CW*0.06, y:CH*0.70, w:CW*0.42, uneven:false, chair:false, chairHit:false,
               zone:0, pix:false, seed:0.3, seed2:0.6 });
  for(let i=0;i<10;i++) addPlatform();
  marker={ x:plats[0].x+plats[0].w*0.5, y:plats[0].y, vx:0, vy:0, rot:0, spin:0, pIdx:0, skipTo:-1 };
  state='ready'; charge=0; charging=false;
  camX=marker.x-(CW*HOLD)/Z;
}
reset();
state='intro';

// ─── marker orientation (vertical / horizontal toggle) ────────────────────
let ORIENT=null;
try{ ORIENT=localStorage.getItem('qu33phFlipOrient')||null; }catch(e){}
function curOrient(){
  if(ORIENT) return ORIENT;
  if(!ready(MARKER)) return 'vertical';
  return (MARKER.naturalWidth>=MARKER.naturalHeight) ? 'vertical' : 'horizontal';  // keeps each theme's natural look
}
function markerRot(){
  if(!ready(MARKER)) return -Math.PI/2;
  const wide = MARKER.naturalWidth>=MARKER.naturalHeight;
  const vertical = curOrient()==='vertical';
  return (wide === vertical) ? -Math.PI/2 : 0;
}
function markerDims(){
  const mh=MH();
  if(!ready(MARKER)) return {dw:mh, dh:mh*0.25, visH:mh};
  const ar=MARKER.naturalWidth/MARKER.naturalHeight;
  const dw = ar>=1 ? mh : mh*ar, dh = ar>=1 ? mh/ar : mh;
  const long=Math.max(dw,dh), short=Math.min(dw,dh);
  return { dw, dh, visH:(curOrient()==='vertical'? long : short) };
}
function orientIconSvg(){
  const vertical=curOrient()==='vertical';
  return '<svg width="28" height="28" viewBox="0 0 24 24">'
    + '<path d="M19.5 11a7.5 7.5 0 1 0 -1 4.2" fill="none" stroke="#bbb" stroke-width="1.7" stroke-linecap="round"/>'
    + '<path d="M20 4.5v5h-5" fill="none" stroke="#bbb" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>'
    + '<rect x="6.4" y="10.5" width="11.2" height="3" rx="1.5" fill="#4f7dff" transform="rotate('+(vertical?90:0)+' 12 12)"/>'
    + '</svg>';
}
function updateOrientBtn(){ const el=document.getElementById('orientIcon'); if(el) el.innerHTML=orientIconSvg(); }
document.getElementById('orientBtn').addEventListener('click', e=>{
  e.stopPropagation();
  ORIENT = (curOrient()==='vertical') ? 'horizontal' : 'vertical';
  try{ localStorage.setItem('qu33phFlipOrient',ORIENT); }catch(e2){}
  updateOrientBtn();
});
updateOrientBtn();
if(!ready(MARKER)) MARKER.onload=updateOrientBtn;

// ─── input ────────────────────────────────────────────────────────────────
cv.addEventListener('pointerdown', e=>{
  if(e&&e.cancelable) e.preventDefault();
  if(state==='intro'){ state='ready'; return; }
  if(state==='over'){ reset(); return; }
  if(state!=='ready') return;
  charging=true; charge=0;
});
window.addEventListener('pointerup', ()=>{
  if(!charging) return; charging=false;
  if(state!=='ready') return;
  flip(Math.max(0.10, charge));
});

function flip(p){
  marker.vx = (0.008 + p*0.014)*CW;
  marker.vy = -(0.026 + p*0.012)*CH;
  const T   = 2*Math.abs(marker.vy)/G();
  marker.spin = (Math.PI*2*(1+Math.round(p*2)))/T;
  marker.rot  = 0;
  state='flying';
}
function chairLaunch(p){
  const idx=plats.indexOf(p);
  let target=idx+3+((Math.random()*3)|0);
  while(plats.length<=target+10) addPlatform();
  const t=plats[target];
  if(t.uneven){ t.uneven=false; if(target>lastFlat) lastFlat=target; }   // landing pad is always safe
  t.chair=false;
  const g=G(), dy=t.y-marker.y;
  marker.vy=-0.044*CH;
  const T=(-marker.vy+Math.sqrt(Math.max(0.0001, marker.vy*marker.vy+2*g*dy)))/g;
  marker.vx=((t.x+t.w*0.5)-marker.x)/T;
  marker.spin=(Math.PI*2*4)/T;
  marker.skipTo=target;
  state='boost';
  popups.push({x:marker.x, y:marker.y-MH()*1.4, txt:'CHAIR LAUNCH!', life:64, col:'#ff5a5a', big:true});
}
function land(p){
  marker.y=p.y; marker.vx=0; marker.vy=0; marker.rot=0; marker.skipTo=-1;
  if(p.uneven){ state='tip'; marker.tipT=0; return; }
  const idx=plats.indexOf(p);
  const gained=Math.max(1, idx-marker.pIdx);
  marker.pIdx=idx; combo++;
  const pts=gained*10 + Math.min(10,combo)*2;
  score+=pts;
  popups.push({x:marker.x, y:p.y-MH()*1.3, txt:'+'+gained, life:44, col:'#8fd0ff'});
  if(gained>1) popups.push({x:marker.x, y:p.y-MH()*1.9, txt:'SKIPPED '+(gained-1), life:52, col:'#ffd24a'});
  else if(combo>2) popups.push({x:marker.x, y:p.y-MH()*1.9, txt:'x'+combo, life:40, col:'#7bff9a'});
  state='ready'; charge=0; settle=9;
  while(plats.length < marker.pIdx+11) addPlatform();
}
function gameOver(reason){
  state='over'; marker.reason=reason; combo=0;
  if(score>best){ best=score; try{ localStorage.setItem('qu33phFlipBest',best); }catch(e){} }
  if(marker.pIdx>bestP){ bestP=marker.pIdx; try{ localStorage.setItem('qu33phFlipBestP',bestP); }catch(e){} }
}

// ─── step ─────────────────────────────────────────────────────────────────
function step(){
  if(state==='intro') return;
  if(banner>0) banner--;
  if(settle>0) settle--;
  if(charging && state==='ready') charge=Math.min(1, charge+0.022);
  if(state==='tip'){
    marker.tipT++; marker.rot+=0.11;
    if(marker.tipT>26) gameOver('UNEVEN GROUND');
    return;
  }
  if(state==='flying' || state==='boost'){
    const g=G(), prevY=marker.y;
    marker.x+=marker.vx; marker.vy+=g; marker.y+=marker.vy; marker.rot+=marker.spin;
    if(state==='flying'){
      const cw=chairW(), chh=chairH();
      for(const p of plats){
        if(!p.chair || p.chairHit) continue;
        const cx=p.x+p.w*0.5;
        if(marker.x>cx-cw*0.5 && marker.x<cx+cw*0.5 && marker.y>p.y-chh && marker.y<p.y+MH()*0.25){
          p.chairHit=true; chairLaunch(p); break;
        }
      }
    }
    if(marker.vy>0){
      const list=(state==='boost') ? [plats[marker.skipTo]] : plats;
      for(const p of list){
        if(!p) continue;
        if(marker.x>=p.x && marker.x<=p.x+p.w && prevY<=p.y && marker.y>=p.y){ land(p); break; }
      }
    }
    if(marker.y > CH*1.25) gameOver('OFF THE EDGE');
  }
  const tc=marker.x-(CW*HOLD)/Z;
  camX += (tc-camX)*0.12; if(camX<0) camX=0;
  for(let i=popups.length-1;i>=0;i--){ const q=popups[i]; q.life--; q.y-=CH*0.0012; if(q.life<=0) popups.splice(i,1); }
}

// ─── scene layer (background + platforms) — this is what gets the theme effect ──
function paintBG(c,z){
  if(z.style==='comic'){
    c.fillStyle='#9c9c9c'; c.fillRect(0,0,CW,CH);
  } else if(z.style==='neon'){
    c.fillStyle='#04060e'; c.fillRect(0,0,CW,CH);
    c.save(); c.strokeStyle='rgba(40,255,150,0.13)'; c.lineWidth=Math.max(1,CH*0.0012);
    const gs=CH*0.042, gx0=(((-camX*0.15)%gs)+gs)%gs;
    for(let gx=gx0; gx<CW; gx+=gs){ c.beginPath(); c.moveTo(gx,0); c.lineTo(gx,CH); c.stroke(); }
    for(let gy=0; gy<CH; gy+=gs){ c.beginPath(); c.moveTo(0,gy); c.lineTo(CW,gy); c.stroke(); }
    c.restore();
  } else if(z.style==='sunset'){
    const g=c.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#6b4e16'); g.addColorStop(0.5,'#4a350e'); g.addColorStop(1,'#2a1e08');
    c.fillStyle=g; c.fillRect(0,0,CW,CH);
  } else if(z.style==='galaxy'){
    const g=c.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#160a2e'); g.addColorStop(1,'#0a0618');
    c.fillStyle=g; c.fillRect(0,0,CW,CH);
    c.fillStyle='rgba(200,170,255,0.75)';
    for(let i=0;i<40;i++){
      const px=(((i*97)/100*CW - camX*0.06)%CW+CW)%CW, py=((i*57)%100)/100*CH*0.7;
      c.globalAlpha=0.25+((i*31)%50)/100; c.beginPath(); c.arc(px,py,CH*0.0016,0,6.283); c.fill();
    }
    c.globalAlpha=1;
  } else {
    const g=c.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#2a2358'); g.addColorStop(0.55,'#332670'); g.addColorStop(1,'#211a4a');
    c.fillStyle=g; c.fillRect(0,0,CW,CH);
  }
}
function tileWindow(c,img,alpha,par){
  if(!ready(img) || alpha<=0.01) return;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const s=Math.max(CW/iw,(CH*1.2)/ih), tw=iw*s, th=ih*s;
  const ox=(((-camX*par)%tw)+tw)%tw;
  c.save(); c.globalAlpha=alpha;
  for(let gx=-tw+ox; gx<CW+1; gx+=tw){ for(let gy=-th*0.15; gy<CH+1; gy+=th){ c.drawImage(img,gx,gy,tw,th); } }
  c.restore();
}
function drawTrees(c,pix){
  const pool=(pix?TREES_P:TREES_R).filter(ready);
  if(!pool.length) return;
  for(let i=0;i<9;i++){
    const img=pool[i%pool.length];
    const dep=0.25+((i*37)%60)/100;
    const tileW=CW*1.7, bx=((i*71)%100)/100*tileW;
    const px=(((bx - camX*dep*0.16)%tileW)+tileW)%tileW-(tileW-CW)/2;
    const py=CH*(0.16+((i*53)%100)/100*0.40);
    const tht=CH*(0.20+dep*0.30), twt=tht*(img.naturalWidth/img.naturalHeight);
    c.save(); c.globalAlpha=0.30+dep*0.28; c.drawImage(img, px-twt/2, py-tht/2, twt, tht); c.restore();
  }
}
function drawPlat(c,p){
  const px=p.x-camX, lim=CW/Z;
  if(px>lim+80 || px+p.w<-80) return;
  const z=ZONES[p.zone], h=CH*0.34;
  c.save();
  c.beginPath(); c.rect(px,p.y,p.w,h); c.clip();
  if(ready(FIELD)){
    const nw=FIELD.naturalWidth, nh=FIELD.naturalHeight;
    const cw2=nw*(0.20+p.seed*0.30), ch2=nh*(0.12+p.seed2*0.20);
    c.drawImage(FIELD, p.seed2*(nw-cw2), p.seed*(nh-ch2), cw2, ch2, px, p.y, p.w, h);
  } else { c.fillStyle='#1b1b2a'; c.fillRect(px,p.y,p.w,h); }
  const g2=c.createLinearGradient(0,p.y,0,p.y+h);
  g2.addColorStop(0,'rgba(0,0,0,0.10)'); g2.addColorStop(1,'rgba(0,0,0,0.92)');
  c.fillStyle=g2; c.fillRect(px,p.y,p.w,h);
  c.restore();
  if(p.uneven){
    c.save(); c.strokeStyle='#ff4d4d'; c.lineWidth=Math.max(2,CH*0.006); c.beginPath();
    const teeth=Math.max(4, Math.round(p.w/(CW*0.05)));
    for(let i=0;i<=teeth;i++){
      const tx=px+p.w*i/teeth, ty=p.y+((i%2)?-CH*0.016:0);
      if(i===0) c.moveTo(tx,ty); else c.lineTo(tx,ty);
    }
    c.stroke(); c.restore();
  } else {
    c.fillStyle=z.accent; c.fillRect(px,p.y-CH*0.005,p.w,CH*0.005);
    c.globalAlpha=0.3; c.fillRect(px,p.y-CH*0.013,p.w,CH*0.008); c.globalAlpha=1;
  }
}
// overlays that sit on the themed scene but under the full-colour props
function drawZoneOverlay(z){
  if(z.style==='comic'){
    ctx.save(); ctx.globalCompositeOperation='multiply'; ctx.fillStyle='rgba(20,20,20,0.5)';
    const ds=CH*0.017, ox=(((-camX*0.10)%ds)+ds)%ds;
    for(let yy=0; yy<CH+ds; yy+=ds){
      const row=Math.round(yy/ds);
      for(let xx=-ds+ox+((row%2)?ds/2:0); xx<CW+ds; xx+=ds){ ctx.beginPath(); ctx.arc(xx,yy,ds*0.17,0,6.283); ctx.fill(); }
    }
    ctx.restore(); return;
  }
  let col=null;
  if(z.style==='neon')   col='rgba(40,255,130,';
  if(z.style==='sunset') col='rgba(255,180,45,';
  if(z.style==='galaxy') col='rgba(150,90,255,';
  if(!col) return;
  const g=ctx.createRadialGradient(CW/2,CH*0.55,CH*0.20,CW/2,CH*0.55,CH*0.78);
  g.addColorStop(0,col+'0)'); g.addColorStop(1,col+'0.30)');
  ctx.save(); ctx.globalCompositeOperation='screen'; ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH); ctx.restore();
}

// ─── full-colour props (drawn after the theme effect) ─────────────────────
function drawChairs(){
  const w=chairW(), h2=chairH(), lim=CW/Z;
  for(const p of plats){
    if(!p.chair || p.chairHit) continue;
    const px=p.x-camX; if(px>lim+80 || px+p.w<-80) continue;
    const cx=p.x+p.w*0.5-camX;
    if(ready(CHAIR)) ctx.drawImage(CHAIR, cx-w/2, p.y-h2, w, h2);
    else { ctx.fillStyle='#d62424'; ctx.fillRect(cx-w/2, p.y-h2, w, h2); }
  }
}
function drawMarker(){
  const {dw,dh,visH}=markerDims();
  const sq=settle>0?(1+settle*0.012):1;
  const cx=marker.x-camX, cy=marker.y-visH/2;
  if(state==='ready'||state==='tip'){
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath();
    ctx.ellipse(cx, marker.y+CH*0.004, MH()*0.20, MH()*0.05, 0, 0, 7); ctx.fill();
  }
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(markerRot()+marker.rot); ctx.scale(1/sq,sq);
  if(ready(MARKER)) ctx.drawImage(MARKER, -dw/2, -dh/2, dw, dh);
  else { ctx.fillStyle='#3a7bff'; ctx.fillRect(-MH()/2,-MH()*0.09,MH(),MH()*0.18); }
  ctx.restore();
}
function drawAim(){
  if(!(charging && state==='ready')) return;
  const g=G(), p=Math.max(0.10,charge);
  let vx=(0.008+p*0.014)*CW, vy=-(0.026+p*0.012)*CH, x=marker.x, y=marker.y;
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<90;i++){
    x+=vx; vy+=g; y+=vy;
    if(i%5===0){ ctx.beginPath(); ctx.arc(x-camX, y, Math.max(1.5,CH*0.005), 0, 7); ctx.fill(); }
    if(y>CH*1.1) break;
  }
}

// ─── HUD ──────────────────────────────────────────────────────────────────
function drawHUD(z){
  const pad=CH*0.016, acc=(z.accent==='#141414'?'#333':z.accent);
  ctx.textBaseline='top';
  ctx.textAlign='left';
  ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CH*0.040)+'px Helvetica';
  ctx.fillText(marker.pIdx, pad, pad);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='bold '+Math.round(CH*0.013)+'px Helvetica';
  ctx.fillText('PLATFORMS', pad+CH*0.002, pad+CH*0.045);
  ctx.fillStyle='#ffd700'; ctx.font='bold '+Math.round(CH*0.015)+'px Helvetica';
  ctx.fillText('BEST '+bestP+'   '+score+' PTS', pad+CH*0.002, pad+CH*0.064);
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CH*0.021)+'px Helvetica';
  ctx.fillText('QU33PH FLIP', CW/2, pad);
  ctx.fillStyle=acc; ctx.font='bold '+Math.round(CH*0.015)+'px Helvetica';
  ctx.fillText(z.name, CW/2, pad+CH*0.027);
  if(combo>2){ ctx.fillStyle='#7bff9a'; ctx.fillText('COMBO x'+combo, CW/2, pad+CH*0.048); }

  if(charging && state==='ready'){
    const bw=CW*0.46, bh=CH*0.012, bx=(CW-bw)/2, by=CH*0.935;
    ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=acc; ctx.fillRect(bx,by,bw*charge,bh);
  } else if(state==='ready'){
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold '+Math.round(CH*0.018)+'px Helvetica';
    ctx.fillText('hold to charge \u2014 release to flip', CW/2, CH*0.932);
  }
  for(const q of popups){
    ctx.globalAlpha=Math.max(0,q.life/50);
    ctx.fillStyle=q.col; ctx.textAlign='center';
    ctx.font='bold '+Math.round(CH*(q.big?0.030:0.024))+'px Helvetica';
    ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=Math.max(2,CH*0.003);
    ctx.strokeText(q.txt, SX(q.x), SY(q.y)); ctx.fillText(q.txt, SX(q.x), SY(q.y));
    ctx.globalAlpha=1;
  }
  if(banner>0){
    ctx.globalAlpha=Math.min(1,banner/28); ctx.textAlign='center';
    ctx.fillStyle=acc; ctx.font='bold '+Math.round(CH*0.036)+'px Helvetica';
    ctx.fillText(z.name, CW/2, CH*0.30); ctx.globalAlpha=1;
  }
  if(state==='over'){
    ctx.fillStyle='rgba(0,0,0,0.68)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='#e23b3b'; ctx.font='bold '+Math.round(CH*0.055)+'px Helvetica';
    ctx.fillText('TIPPED OVER', CW/2, CH*0.40);
    ctx.fillStyle='#aaa'; ctx.font='bold '+Math.round(CH*0.022)+'px Helvetica';
    ctx.fillText(marker.reason||'', CW/2, CH*0.442);
    ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CH*0.044)+'px Helvetica';
    ctx.fillText(marker.pIdx+' PLATFORMS', CW/2, CH*0.515);
    ctx.fillStyle='#8fd0ff'; ctx.font='bold '+Math.round(CH*0.024)+'px Helvetica';
    ctx.fillText(score+' PTS', CW/2, CH*0.552);
    ctx.fillStyle='#ffd700'; ctx.fillText('BEST '+bestP, CW/2, CH*0.588);
    ctx.fillStyle='#fff'; ctx.fillText('tap to flip again', CW/2, CH*0.645);
    ctx.textBaseline='top';
  }
}
function drawIntro(){
  ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CH*0.046)+'px Helvetica';
  ctx.fillText('QU33PH FLIP', CW/2, CH*0.20);
  ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font='bold '+Math.round(CH*0.019)+'px Helvetica';
  ctx.fillText('flip your marker \u2014 it lands on its cap', CW/2, CH*0.235);
  const bx=CW*0.16, bw=CW*0.68;
  let y=CH*0.345;
  ctx.fillStyle='#8affea'; ctx.font='bold '+Math.round(CH*0.024)+'px Helvetica';
  ctx.fillText('FLAT = SAFE', CW/2, y-CH*0.022);
  ctx.fillStyle='#1b2340'; ctx.fillRect(bx,y,bw,CH*0.030);
  ctx.fillStyle='#8affea'; ctx.fillRect(bx,y-CH*0.006,bw,CH*0.006);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold '+Math.round(CH*0.017)+'px Helvetica';
  ctx.fillText('land here and it sticks upright', CW/2, y+CH*0.055);
  y=CH*0.495;
  ctx.fillStyle='#ff4d4d'; ctx.font='bold '+Math.round(CH*0.024)+'px Helvetica';
  ctx.fillText('RED JAGGED = BAD', CW/2, y-CH*0.030);
  ctx.fillStyle='#2a1a1a'; ctx.fillRect(bx,y,bw,CH*0.030);
  ctx.save(); ctx.strokeStyle='#ff4d4d'; ctx.lineWidth=Math.max(2,CH*0.006); ctx.beginPath();
  for(let i=0;i<=12;i++){ const px=bx+bw*i/12, py=y+((i%2)?-CH*0.016:0); if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
  ctx.stroke(); ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold '+Math.round(CH*0.017)+'px Helvetica';
  ctx.fillText('uneven ground tips you over', CW/2, y+CH*0.055);
  y=CH*0.655;
  if(ready(CHAIR)){
    const hh=CH*0.070, ww=hh*(CHAIR.naturalWidth/CHAIR.naturalHeight);
    ctx.drawImage(CHAIR, CW/2-ww/2, y-hh, ww, hh);
  }
  ctx.fillStyle='#ff5a5a'; ctx.font='bold '+Math.round(CH*0.022)+'px Helvetica';
  ctx.fillText('RED CHAIR = LAUNCH', CW/2, y+CH*0.028);
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold '+Math.round(CH*0.017)+'px Helvetica';
  ctx.fillText('hit it to fly way ahead', CW/2, y+CH*0.054);
  ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CH*0.024)+'px Helvetica';
  ctx.fillText('hold to charge \u2014 release to flip', CW/2, CH*0.795);
  ctx.globalAlpha=0.55+0.45*Math.abs(Math.sin(Date.now()/400));
  ctx.font='bold '+Math.round(CH*0.028)+'px Helvetica';
  ctx.fillText('tap to start', CW/2, CH*0.855);
  ctx.globalAlpha=1;
  ctx.textBaseline='top';
}

// ─── frame ────────────────────────────────────────────────────────────────
let lastZone=-1;
function curPlat(){
  const wx=camX+(CW*0.42)/Z;
  for(const p of plats){ if(wx>=p.x-CW*0.2 && wx<=p.x+p.w+CW*0.2) return p; }
  return plats[marker.pIdx]||plats[0];
}
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  const cp=curPlat(), z=ZONES[cp.zone];
  if(cp.zone!==lastZone){ if(lastZone!==-1) banner=70; lastZone=cp.zone; }

  // 1. build the scene (background + platforms) on its own layer
  sx2.setTransform(1,0,0,1,0,0); sx2.clearRect(0,0,CW,CH);
  paintBG(sx2,z);
  tileWindow(sx2, cp.pix?WIN_P:WIN_R, 0.85, 0.10);
  drawTrees(sx2, cp.pix);
  const gr=sx2.createLinearGradient(0,0,0,CH);
  gr.addColorStop(0,'rgba(0,0,0,0.42)'); gr.addColorStop(0.55,'rgba(0,0,0,0.14)'); gr.addColorStop(1,'rgba(0,0,0,0.72)');
  sx2.fillStyle=gr; sx2.fillRect(0,0,CW,CH);
  const a=AY();
  sx2.save(); sx2.translate(0,a); sx2.scale(Z,Z); sx2.translate(0,-a);
  for(const p of plats) drawPlat(sx2,p);
  sx2.restore();

  // 2. stamp it down with the area's theme effect
  if(CANFILTER && z.fx) ctx.filter=z.fx;
  ctx.drawImage(sc,0,0);
  ctx.filter='none';
  drawZoneOverlay(z);

  // 3. props stay full colour on top — markers and the red chair never get tinted
  ctx.save(); ctx.translate(0,a); ctx.scale(Z,Z); ctx.translate(0,-a);
  drawChairs();
  drawAim();
  drawMarker();
  ctx.restore();

  drawHUD(z);
  if(state==='intro') drawIntro();
}
function loop(){ step(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', ()=>{
  const ow=CW, oh=CH; sz();
  if(Math.abs(CW-ow)>ow*0.12 || Math.abs(CH-oh)>oh*0.12) reset();
});
loop();
</script>
