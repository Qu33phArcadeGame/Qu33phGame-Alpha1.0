<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Pinball</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#fff; touch-action:none; user-select:none; background:#05060a; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #game{ display:block; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const FIELD=new Image(); FIELD.src='pinfield.png';
const CHAIRIMG=new Image(); CHAIRIMG.src='chair.png';
const PTHEME=(new URLSearchParams(location.search).get('theme')||'default');
const BLUEIMG=new Image(); BLUEIMG.src=(PTHEME==='cartoon')?'pinpaddleC.png':'pinpaddle.png';
function ready(im){ return im&&im.complete&&im.naturalWidth>0; }

// logical field matches the pinfield.png aspect (961x1637 ~ 100x170)
const PW=100, PH=178;
let CW=0,CH=0,DPR=1,SC=1;
function sz(){ const r=document.getElementById('wrap').getBoundingClientRect(); DPR=Math.min(2,window.devicePixelRatio||1);
  let w=r.width,h=r.height; const ar=PW/PH; let cw=w,ch=w/ar; if(ch>h){ch=h;cw=h*ar;}
  cv.style.width=cw+'px'; cv.style.height=ch+'px'; CW=Math.round(cw*DPR); CH=Math.round(ch*DPR); cv.width=CW; cv.height=CH; SC=CW/PW; }
sz();
function X(u){ return u*SC; }

// ---- layout in field units (from your labeled map) ----
const BUMPERS=[[49.3,48.8,5.5],[38.7,57,5.5],[59.9,57,5.5],[49.3,65,5.5],[41.7,72.4,5.5],[56.9,72.4,5.5]];
const SLINGS=[[22,113],[73,113]];
const MEGA=[75.7,47.3], CHAIR=[27,110];
const L_PIVOT=[30,132], R_PIVOT=[66,132], FLIP_LEN=15;   // pivots anchored at the triangle tips
const CHUTE_DIV=80, CHUTE_OUT=93, BALL_START=[86.5,162];
const BALL_R=3;
const MAXV_U=3.8;                                    // hard speed cap in units/step (kills the "Flash" bug)

let M,engine,world,ball=null,flipL,flipR,balls=3,score=0,best=0,state='loading',launchP=0,charging=false,draining=false,overT=0,megaFlash=0,chairFlash=0,bumpFlash={};
try{ best=parseInt(localStorage.getItem('qu33phPinBest')||'0',10)||0; }catch(e){}

function boot(){ M=window.Matter; if(!M){ setTimeout(boot,60); return; } build(); state='ready'; }
boot();

function wall(x1,y1,x2,y2,thU){ const mx=(x1+x2)/2,my=(y1+y2)/2,dx=(x2-x1),dy=(y2-y1),len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);
  return M.Bodies.rectangle(X(mx),X(my),X(len),X(thU||2),{isStatic:true,angle:ang,friction:0.02,restitution:0.3,label:'wall'}); }

function build(){
  engine=M.Engine.create(); world=engine.world; engine.gravity.y=1.0; engine.positionIterations=12; engine.velocityIterations=12;
  const p=[];
  // outer walls (roughly follow the field art; fine-tune later)
  p.push(wall(13,48,13,156));                 // left wall
  // top arch: guides the ball from the chute top down-left into the play field
  p.push(wall(13,48,32,33));
  p.push(wall(32,33,58,27));
  p.push(wall(58,27,80,28));
  p.push(wall(80,28,CHUTE_OUT,34));           // deflector at chute top -> sends the launched ball LEFT
  // launch chute (right)
  p.push(wall(CHUTE_OUT,34,CHUTE_OUT,170));   // outer right wall
  p.push(wall(CHUTE_DIV,52,CHUTE_DIV,170));   // divider stops high up -> open top so the ball exits into play
  p.push(wall(CHUTE_DIV,170,CHUTE_OUT,170));  // chute floor (ball rests here)
  // bottom funnel toward the drain (gap between flippers)
  p.push(wall(13,156,L_PIVOT[0]-2,L_PIVOT[1]+3));
  p.push(wall(CHUTE_DIV,156,R_PIVOT[0]+2,R_PIVOT[1]+3));
  // bumpers
  BUMPERS.forEach((b,i)=>{ p.push(M.Bodies.circle(X(b[0]),X(b[1]),X(b[2]),{isStatic:true,restitution:1.3,friction:0,label:'bumper',bidx:i})); });
  // slingshots
  SLINGS.forEach((s,i)=>{ p.push(M.Bodies.polygon(X(s[0]),X(s[1]),3,X(7),{isStatic:true,restitution:1.35,angle:i?Math.PI+0.4:-0.4,label:'sling'})); });
  // chair target
  p.push(M.Bodies.rectangle(X(CHAIR[0]),X(CHAIR[1]),X(9),X(9),{isStatic:true,restitution:0.5,label:'chair'}));
  // flippers (pivoted, long enough to leave a ball-sized gap in the middle)
  const flen=X(FLIP_LEN), fth=X(4);
  flipL=M.Bodies.rectangle(X(L_PIVOT[0])+flen*0.35,X(L_PIVOT[1]),flen,fth,{density:0.05,friction:0.1,label:'flipL'});
  flipR=M.Bodies.rectangle(X(R_PIVOT[0])-flen*0.35,X(R_PIVOT[1]),flen,fth,{density:0.05,friction:0.1,label:'flipR'});
  const cL=M.Constraint.create({pointA:{x:X(L_PIVOT[0]),y:X(L_PIVOT[1])},bodyB:flipL,pointB:{x:-flen*0.42,y:0},stiffness:1,length:0});
  const cR=M.Constraint.create({pointA:{x:X(R_PIVOT[0]),y:X(R_PIVOT[1])},bodyB:flipR,pointB:{x:flen*0.42,y:0},stiffness:1,length:0});
  p.push(flipL,flipR,cL,cR);
  M.Composite.add(world,p);
  M.Events.on(engine,'collisionStart',onHit);
  newBall();
}
function newBall(){ if(ball){ M.Composite.remove(world,ball); ball=null; }
  ball=M.Bodies.circle(X(BALL_START[0]),X(BALL_START[1]),X(BALL_R),{restitution:0.3,friction:0.02,frictionAir:0.005,density:0.02,label:'ball'});
  M.Composite.add(world,ball); draining=false; charging=false; launchP=0; state='ready'; }

function onHit(ev){ for(const pr of ev.pairs){ const l=[pr.bodyA.label,pr.bodyB.label]; if(!l.includes('ball'))continue;
  if(l.includes('bumper')){ const bd=pr.bodyA.label==='bumper'?pr.bodyA:pr.bodyB; score+=100; bumpFlash[bd.bidx]=10; const dx=ball.position.x-bd.position.x,dy=ball.position.y-bd.position.y,d=Math.hypot(dx,dy)||1; M.Body.setVelocity(ball,{x:ball.velocity.x+dx/d*X(0.9),y:ball.velocity.y+dy/d*X(0.9)}); }
  else if(l.includes('sling')){ score+=50; }
  else if(l.includes('chair')){ score+=250; chairFlash=18; const dx=X(MEGA[0])-ball.position.x,dy=X(MEGA[1])-ball.position.y,d=Math.hypot(dx,dy)||1; M.Body.setVelocity(ball,{x:dx/d*X(2.4),y:dy/d*X(2.4)}); }
} }

let pL=false,pR=false;
function down(e){ if(state==='over'){ if(overT<=0) restart(); return; }
  const r=cv.getBoundingClientRect(), x=(e.clientX-r.left)/r.width;
  if(state==='ready'){ charging=true; return; }
  if(x<0.5) pL=true; else pR=true; }
function up(e){ const r=cv.getBoundingClientRect(), x=(e.clientX-r.left)/r.width;
  if(state==='ready'&&charging){ M.Body.setVelocity(ball,{x:-X(0.5),y:-(X(2.4)+launchP*X(1.6))}); state='play'; charging=false; return; }
  if(x<0.5) pL=false; else pR=false; }
cv.addEventListener('pointerdown',down); window.addEventListener('pointerup',up); window.addEventListener('pointercancel',()=>{pL=pR=false;});

function restart(){ score=0; balls=3; overT=0; newBall(); }
function loseBall(){ if(draining||state==='over')return; draining=true; balls--;
  if(balls<=0){ state='over'; overT=45; if(score>best){best=score; try{localStorage.setItem('qu33phPinBest',best);}catch(e){}} }
  else setTimeout(newBall,350); }
function flip(fb,rest,active,press){ M.Body.setAngularVelocity(fb,((press?active:rest)-fb.angle)*0.8); }

function update(){
  if(state==='loading') return;
  if(state==='ready'&&charging) launchP=Math.min(1,launchP+0.025);
  if(flipL){ flip(flipL,0.30,-0.55,pL); flip(flipR,-0.30,0.55,pR); }
  M.Engine.update(engine,1000/60);
  // HARD SPEED CAP — ball can never exceed MAXV (fixes the rocket-off bug)
  if(ball){ const sp=Math.hypot(ball.velocity.x,ball.velocity.y), mv=X(MAXV_U); if(sp>mv) M.Body.setVelocity(ball,{x:ball.velocity.x/sp*mv,y:ball.velocity.y/sp*mv}); }
  if(megaFlash>0)megaFlash--; if(chairFlash>0)chairFlash--; for(const k in bumpFlash){ if(bumpFlash[k]>0)bumpFlash[k]--; }
  if(ball&&(state==='play'||state==='ready')){
    if(Math.hypot(ball.position.x-X(MEGA[0]),ball.position.y-X(MEGA[1]))<X(6)){ score+=500; megaFlash=25; M.Body.setPosition(ball,{x:X(BALL_START[0]),y:X(60)}); M.Body.setVelocity(ball,{x:0,y:X(1)}); }
    if(ball.position.y>X(PH+4)) loseBall();
  }
  if(state==='over'&&overT>0) overT--;
}

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  if(ready(FIELD)) ctx.drawImage(FIELD,0,0,CW,CH); else { ctx.fillStyle='#0a0f1c'; ctx.fillRect(0,0,CW,CH); }
  if(state==='loading'){ ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.fillText('loading…',CW/2,CH/2); return; }
  // chair
  if(ready(CHAIRIMG)){ const s=X(11); ctx.save(); if(chairFlash>0){ctx.shadowColor='#ff3b45';ctx.shadowBlur=X(chairFlash);} ctx.drawImage(CHAIRIMG,X(CHAIR[0])-s/2,X(CHAIR[1])-s/2,s,s); ctx.restore(); }
  // bumper hit rings
  BUMPERS.forEach((b,i)=>{ if(bumpFlash[i]>0){ ctx.strokeStyle='rgba(255,255,255,'+(bumpFlash[i]/10)+')'; ctx.lineWidth=X(0.8); ctx.beginPath(); ctx.arc(X(b[0]),X(b[1]),X(b[2]),0,7); ctx.stroke(); } });
  if(megaFlash>0){ ctx.strokeStyle='rgba(255,220,60,'+(megaFlash/25)+')'; ctx.lineWidth=X(1.2); ctx.beginPath(); ctx.arc(X(MEGA[0]),X(MEGA[1]),X(7),0,7); ctx.stroke(); }
  // flippers (blue markers)
  [flipL,flipR].forEach((fb,fi)=>{ if(!fb)return; ctx.save(); ctx.translate(fb.position.x,fb.position.y); ctx.rotate(fb.angle);
    const w=X(FLIP_LEN),h=X(6.5);
    if(ready(BLUEIMG)){ const w=X(FLIP_LEN),h=X(6.5);
      if(BLUEIMG.naturalHeight>BLUEIMG.naturalWidth){ ctx.rotate(Math.PI/2); ctx.drawImage(BLUEIMG,-h/2,-w/2,h,w); } // vertical marker -> lay it along the flipper
      else { ctx.drawImage(BLUEIMG,-w/2,-h/2,w,h); }
    }
    else { // marker-shaped flipper: blue barrel + lighter cap at the outer end
      const capW=w*0.28, tipDir=fi?1:-1;   // cap points toward the pivot (outer side)
      const grad=ctx.createLinearGradient(0,-h/2,0,h/2); grad.addColorStop(0,'#5a8bff'); grad.addColorStop(0.5,'#3358cc'); grad.addColorStop(1,'#22409a');
      ctx.fillStyle=grad; ctx.strokeStyle='#cfe0ff'; ctx.lineWidth=X(0.5);
      ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,h*0.4); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#9ab8ff'; ctx.beginPath(); ctx.roundRect(tipDir*(w/2-capW),-h/2,capW,h,h*0.4); ctx.fill();
    }
    ctx.restore(); });
  // ball
  if(ball){ const r=X(BALL_R),bx=ball.position.x,by=ball.position.y; const rg=ctx.createRadialGradient(bx-r*0.35,by-r*0.35,r*0.1,bx,by,r); rg.addColorStop(0,'#ff9'); rg.addColorStop(0.5,'#ff3b45'); rg.addColorStop(1,'#900'); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(bx,by,r,0,7); ctx.fill(); }
  // charge meter
  if(state==='ready'&&charging){ ctx.fillStyle='#ffd54a'; const cx=X((CHUTE_DIV+CHUTE_OUT)/2); ctx.fillRect(cx-X(1),X(150)-launchP*X(28),X(2),launchP*X(28)); }
  // HUD
  ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.shadowColor='#000'; ctx.shadowBlur=6; ctx.fillText(score,X(4),X(8));
  ctx.textAlign='right'; ctx.fillText('BALLS '+balls,X(PW-4),X(8)); ctx.shadowBlur=0; ctx.textAlign='center';
  if(state==='ready'&&!charging){ ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold '+Math.round(CW*0.032)+'px Helvetica'; ctx.fillText('HOLD to charge · release to launch',CW/2,CH*0.955); }
  if(state==='play'){ ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='bold '+Math.round(CW*0.028)+'px Helvetica'; ctx.fillText('tap LEFT / RIGHT = flippers',CW/2,CH*0.975); }
  if(state==='over'){ ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH); ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.1)+'px Helvetica'; ctx.fillText('GAME OVER',CW/2,CH*0.45); ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.07)+'px Helvetica'; ctx.fillText(score,CW/2,CH*0.53); ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('BEST '+best,CW/2,CH*0.58); if(overT<=0) ctx.fillText('tap to play again',CW/2,CH*0.65); }
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize',()=>{ sz(); });
loop();
</script>
</body>
</html>
