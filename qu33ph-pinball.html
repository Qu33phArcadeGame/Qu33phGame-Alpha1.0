<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Qu33ph Pinball</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; font-family:Helvetica,Arial,sans-serif; color:#fff; touch-action:none; user-select:none; background:#05060a; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #game{ display:block; }
  #msg{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:5; font-weight:bold; font-size:13px; letter-spacing:1px; color:#ffd54a; text-shadow:0 2px 6px #000; pointer-events:none; text-align:center; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="msg"></div>
<script>
const cv=document.getElementById('game'), ctx=cv.getContext('2d'), msgEl=document.getElementById('msg');
const FIELD=new Image(); FIELD.src='pinfield.png';
const CHAIR=new Image(); CHAIR.src='chair.png';
function ready(im){ return im&&im.complete&&im.naturalWidth>0; }

// ---- layout (fractions of the field image, from analysis) ----
const BUMPERS=[[0.50,0.265],[0.395,0.31],[0.605,0.31],[0.50,0.346],[0.424,0.40],[0.574,0.40]];
const SLINGS=[[0.205,0.66],[0.655,0.66]];
const MEGA=[0.757,0.256], CHAIRP=[0.285,0.60];
const FLIP_L=[0.40,0.83], FLIP_R=[0.60,0.83];
const LAUNCH_X=0.865;

let CW=0,CH=0,DPR=1,S=1;
function px(fx){ return fx*CW; } function py(fy){ return fy*CH; }
function sz(){ const r=document.getElementById('wrap').getBoundingClientRect(); DPR=Math.min(2,window.devicePixelRatio||1);
  let ar=961/1637,w=r.width,h=w/ar; if(h>r.height){h=r.height;w=h*ar;}
  cv.style.width=w+'px'; cv.style.height=h+'px'; CW=Math.round(w*DPR); CH=Math.round(h*DPR); cv.width=CW; cv.height=CH; S=CW/961;
}
sz();

let M,engine,world,ball=null,flipL,flipR,flipLc,flipRc,chairBody,launchPower=0,launching=false;
let score=0,best=0,balls=3,state='loading',megaFlash=0,chairFlash=0,bumperFlash={};
try{ best=parseInt(localStorage.getItem('qu33phPinballBest')||'0',10)||0; }catch(e){}
const R_BALL=()=>CW*0.026, R_BUMP=()=>CW*0.058;

function boot(){ M=window.Matter; if(!M){ setTimeout(boot,60); return; } setup(); state='ready'; }
boot();

function wallSeg(x1,y1,x2,y2,th){ const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);
  return M.Bodies.rectangle(mx,my,len,th||CW*0.02,{isStatic:true,angle:ang,friction:0,restitution:0.2,label:'wall'}); }

function setup(){
  engine=M.Engine.create(); world=engine.world; engine.gravity.y=1.0;
  const parts=[];
  // outer play-area walls (approximate the neon field outline; fine-tune later)
  const L=px(0.135), Rr=px(0.815), T=py(0.215), Bt=py(0.875);
  parts.push(wallSeg(L,T,L,Bt));                 // left
  parts.push(wallSeg(Rr,py(0.30),Rr,Bt));        // right inner (left of launch lane)
  parts.push(wallSeg(L,T,Rr,T));                 // top
  // upper arch funnel toward bumpers
  parts.push(wallSeg(L,py(0.30),px(0.32),py(0.235)));
  parts.push(wallSeg(Rr,py(0.30),px(0.68),py(0.235)));
  // bottom angled walls toward the drain (gap in the middle)
  parts.push(wallSeg(L,Bt,px(0.34),py(0.955)));
  parts.push(wallSeg(Rr,Bt,px(0.66),py(0.955)));
  // launch lane (right channel)
  parts.push(wallSeg(px(LAUNCH_X-0.045),py(0.30),px(LAUNCH_X-0.045),py(0.90)));  // divider
  parts.push(wallSeg(px(0.90),py(0.24),px(0.90),py(0.90)));                       // outer right
  // one-way lip at top of launch lane so the ball rolls into play
  parts.push(wallSeg(px(LAUNCH_X-0.045),py(0.30),px(0.80),py(0.245)));

  // bumpers
  BUMPERS.forEach((b,i)=>{ const bd=M.Bodies.circle(px(b[0]),py(b[1]),R_BUMP(),{isStatic:true,restitution:1.35,label:'bumper',bidx:i}); parts.push(bd); });
  // slingshots (triangles)
  SLINGS.forEach((s,i)=>{ const w=CW*0.075; const tri=M.Bodies.polygon(px(s[0]),py(s[1]),3,w,{isStatic:true,restitution:1.4,angle:(i?-0.5:0.5),label:'sling'}); parts.push(tri); });
  // chair target
  chairBody=M.Bodies.rectangle(px(CHAIRP[0]),py(CHAIRP[1]),CW*0.10,CW*0.10,{isStatic:true,restitution:0.4,label:'chair'}); parts.push(chairBody);

  // flippers (dynamic, pivoted)
  const flen=CW*0.15, fth=CW*0.035;
  flipL=M.Bodies.rectangle(px(FLIP_L[0])+flen*0.35,py(FLIP_L[1]),flen,fth,{density:0.02,label:'flipL'});
  flipR=M.Bodies.rectangle(px(FLIP_R[0])-flen*0.35,py(FLIP_R[1]),flen,fth,{density:0.02,label:'flipR'});
  flipLc=M.Constraint.create({pointA:{x:px(FLIP_L[0]),y:py(FLIP_L[1])},bodyB:flipL,pointB:{x:-flen*0.42,y:0},stiffness:1,length:0});
  flipRc=M.Constraint.create({pointA:{x:px(FLIP_R[0]),y:py(FLIP_R[1])},bodyB:flipR,pointB:{x:flen*0.42,y:0},stiffness:1,length:0});
  parts.push(flipL,flipR,flipLc,flipRc);

  M.Composite.add(world,parts);
  M.Events.on(engine,'collisionStart',onHit);
  newBall();
}
flipRest();
function flipRest(){}

function newBall(){
  if(ball){ M.Composite.remove(world,ball); }
  ball=M.Bodies.circle(px(LAUNCH_X),py(0.86),R_BALL(),{restitution:0.35,friction:0.02,frictionAir:0.006,density:0.02,label:'ball'});
  M.Composite.add(world,ball); launchPower=0; launching=false; state='ready';
}
function onHit(ev){
  for(const p of ev.pairs){
    const labs=[p.bodyA.label,p.bodyB.label];
    if(labs.includes('ball')){
      if(labs.includes('bumper')){ const bd=p.bodyA.label==='bumper'?p.bodyA:p.bodyB; score+=100; bumperFlash[bd.bidx]=10; kick(bd,ball,CW*0.14); }
      else if(labs.includes('sling')){ score+=50; }
      else if(labs.includes('chair')){ score+=250; chairFlash=18; fireToMega(); }
    }
  }
}
function kick(from,b,power){ const dx=b.position.x-from.position.x, dy=b.position.y-from.position.y, d=Math.hypot(dx,dy)||1; M.Body.setVelocity(b,{x:b.velocity.x+dx/d*power*0.3, y:b.velocity.y+dy/d*power*0.3}); }
function fireToMega(){ if(!ball)return; const dx=px(MEGA[0])-ball.position.x, dy=py(MEGA[1])-ball.position.y, d=Math.hypot(dx,dy)||1; M.Body.setVelocity(ball,{x:dx/d*CW*0.05, y:dy/d*CW*0.05}); }

// ---- input: left half = left flipper, right half = right flipper; launch lane = pull/release ----
let pressL=false,pressR=false;
function down(e){ if(state==='over'){ if(overReady){ restart(); } return; }
  const r=cv.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width;
  if(state==='ready' && !launching){ launching=true; return; }        // start charging launch
  if(x<0.5) pressL=true; else pressR=true;
}
function up(e){ const r=cv.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width;
  if(state==='ready' && launching){ // release launch
    M.Body.setVelocity(ball,{x:0,y:-(CW*0.05 + launchPower*CW*0.05)}); state='play'; launching=false; return; }
  if(x<0.5) pressL=false; else pressR=false;
}
cv.addEventListener('pointerdown',down); window.addEventListener('pointerup',up);
window.addEventListener('pointercancel',()=>{pressL=pressR=false;});

let overReady=false;
function restart(){ score=0; balls=3; state='ready'; overReady=false; newBall(); }
function loseBall(){ balls--; if(balls<=0){ state='over'; overReady=false; setTimeout(()=>overReady=true,700); if(score>best){best=score; try{localStorage.setItem('qu33phPinballBest',best);}catch(e){}} } else { newBall(); } }

function flipTo(fb,fc,rest,active,press){ const target=press?active:rest; const cur=fb.angle;
  M.Body.setAngularVelocity(fb, (target-cur)*0.9); }

function update(){
  if(state!=='play' && state!=='ready' && state!=='over') return;
  if(state==='ready' && launching){ launchPower=Math.min(1,launchPower+0.03); }
  // flippers
  if(flipL){ flipTo(flipL,flipLc,0.35,-0.5,pressL); flipTo(flipR,flipRc,-0.35,0.5,pressR); }
  M.Engine.update(engine,1000/60);
  if(megaFlash>0)megaFlash--; if(chairFlash>0)chairFlash--; for(const k in bumperFlash){ if(bumperFlash[k]>0)bumperFlash[k]--; }
  if(ball){
    // mega hit
    if(Math.hypot(ball.position.x-px(MEGA[0]),ball.position.y-py(MEGA[1]))<CW*0.05){ score+=500; megaFlash=25; M.Body.setPosition(ball,{x:px(LAUNCH_X),y:py(0.55)}); M.Body.setVelocity(ball,{x:0,y:2}); }
    // drain
    if(ball.position.y>py(0.93)) loseBall();
    if(ball.position.x<-50||ball.position.x>CW+50||ball.position.y>CH+80) loseBall();
  }
}

function drawBody(b){ ctx.save(); ctx.translate(b.position.x,b.position.y); ctx.rotate(b.angle);
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=2;
  const v=b.vertices; ctx.beginPath(); ctx.moveTo(v[0].x-b.position.x,v[0].y-b.position.y); for(let i=1;i<v.length;i++)ctx.lineTo(v[i].x-b.position.x,v[i].y-b.position.y); ctx.closePath(); ctx.restore(); }

function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  if(ready(FIELD)) ctx.drawImage(FIELD,0,0,CW,CH); else { ctx.fillStyle='#0a0f1c'; ctx.fillRect(0,0,CW,CH); }
  if(state==='loading'){ ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold '+Math.round(CW*0.045)+'px Helvetica'; ctx.fillText('loading…',CW/2,CH/2); requestAnimationFrame(draw); return; }

  // flippers
  [flipL,flipR].forEach(fb=>{ if(!fb)return; ctx.save(); ctx.translate(fb.position.x,fb.position.y); ctx.rotate(fb.angle);
    ctx.fillStyle='#3a63c8'; ctx.strokeStyle='#8fb4ff'; ctx.lineWidth=3; const w=CW*0.15,h=CW*0.035;
    ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,h/2); ctx.fill(); ctx.stroke(); ctx.restore(); });
  // chair
  if(ready(CHAIR)){ const s=CW*0.12; ctx.save(); if(chairFlash>0){ctx.shadowColor='#ff3b45';ctx.shadowBlur=chairFlash*2;} ctx.drawImage(CHAIR,px(CHAIRP[0])-s/2,py(CHAIRP[1])-s/2,s,s); ctx.restore(); }
  // bumper flash rings
  BUMPERS.forEach((b,i)=>{ if(bumperFlash[i]>0){ ctx.strokeStyle='rgba(255,255,255,'+(bumperFlash[i]/10)+')'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(px(b[0]),py(b[1]),R_BUMP(),0,7); ctx.stroke(); } });
  // mega flash
  if(megaFlash>0){ ctx.strokeStyle='rgba(255,60,60,'+(megaFlash/25)+')'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(px(MEGA[0]),py(MEGA[1]),CW*0.07,0,7); ctx.stroke(); }
  // ball
  if(ball){ const r=R_BALL(), bx=ball.position.x, by=ball.position.y;
    const g=ctx.createRadialGradient(bx-r*0.35,by-r*0.35,r*0.1,bx,by,r); g.addColorStop(0,'#ff8a90'); g.addColorStop(0.5,'#ff3b45'); g.addColorStop(1,'#a00'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(bx,by,r,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(bx-r*0.32,by-r*0.32,r*0.22,0,7); ctx.fill(); }

  // HUD
  ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.05)+'px Helvetica'; ctx.shadowColor='#000'; ctx.shadowBlur=6;
  ctx.fillText(score, CW*0.05, CH*0.055);
  ctx.textAlign='right'; ctx.fillText('BALLS '+balls, CW*0.95, CH*0.055); ctx.shadowBlur=0;
  msgEl.innerText = state==='ready' ? 'HOLD to charge · release to launch' : '';

  if(state==='ready' && launching){ ctx.fillStyle='#ffd54a'; ctx.fillRect(px(0.90)-CW*0.02, py(0.88)-launchPower*CH*0.5, CW*0.015, launchPower*CH*0.5); }
  if(state==='over'){ ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CW,CH); ctx.textAlign='center'; ctx.fillStyle='#ffd54a'; ctx.font='bold '+Math.round(CW*0.1)+'px Helvetica'; ctx.fillText('GAME OVER',CW/2,CH*0.45); ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(CW*0.06)+'px Helvetica'; ctx.fillText(score,CW/2,CH*0.53); ctx.font='bold '+Math.round(CW*0.04)+'px Helvetica'; ctx.fillText('BEST '+best,CW/2,CH*0.58); if(overReady) ctx.fillText('tap to play again',CW/2,CH*0.65); }
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize',()=>{ sz(); });
loop();
</script>
</body>
</html>
